<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>適應體育教學工具箱｜Roger Pan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root { --green:#0d4d43; --bg:#f4f6f5; --card:#ffffff; --ink:#22312d; --sub:#5a6a64; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:"Segoe UI","Microsoft JhengHei",system-ui,sans-serif; background:var(--bg); color:var(--ink); padding:24px 16px 60px; }
  .wrap { max-width:880px; margin:0 auto; }
  h1 { font-size:1.75rem; color:var(--green); margin-bottom:6px; }
  .tagline { color:var(--sub); font-size:1.02rem; margin-bottom:28px; }
  h2 { font-size:1.2rem; color:var(--green); margin:30px 0 14px; padding-left:10px; border-left:4px solid var(--green); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:14px; }
  .card { background:var(--card); border-radius:12px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.07); display:flex; flex-direction:column; gap:8px; }
  .card b { font-size:1.12rem; }
  .card p { font-size:.95rem; line-height:1.7; color:var(--sub); flex:1; }
  .row { display:flex; align-items:center; gap:10px; }
  a.btn { display:inline-block; background:var(--green); color:#fff; text-decoration:none; padding:8px 14px; border-radius:8px; font-size:.9rem; }
  a.btn.off { background:#b9c4c0; pointer-events:none; }
  .qr { width:74px; height:74px; flex:0 0 74px; }
  .qr img, .qr canvas { width:74px !important; height:74px !important; }
  .note { margin-top:34px; font-size:.95rem; color:var(--sub); line-height:1.85; }
  .copy { margin-top:18px; padding-top:14px; border-top:1px solid #dde3e1; font-size:.92rem; color:var(--sub); line-height:1.8; }
</style>
</head>
<body>
<div class="wrap">
  <h1>適應體育教學工具箱</h1>
  <div class="tagline">融合式體育・適應體育師資培育互動工具｜手機、平板、電腦皆可使用</div>

  <h2>學習與評量工具（作答會收集，供課程與研究使用）</h2>
  <div class="grid" id="appsScriptTools"></div>

  <h2>自學工具</h2>
  <div class="grid" id="selfStudyTools"></div>

  <h2>教學遊戲</h2>
  <div class="grid" id="gameTools"></div>

  <h2>課堂互動小工具</h2>
  <div class="grid" id="classTools"></div>

  <div class="note">
    行動裝置掃描 QR code 即可直接開啟工具。<br>
    部分工具會送出作答，僅供教學回饋與學術研究使用。不會收集姓名或完整學號。
  </div>

  <div class="copy">
    © 潘正宸　臺灣師範大學體育與運動科學系<br>
    本站工具採 CC BY-NC-ND 4.0 授權：歡迎使用與分享，請標示作者，不得用於商業用途，不得改作。
  </div>
</div>

<script>
// ===== 工具清單（部署後把 url 填入即可；留空會顯示「即將上線」） =====
const APPS_SCRIPT_TOOLS = [
  { name:"調整判讀學習工具", desc:"UDL／DI／STEP 結構調整與語言框架判讀，對照專家判定看一致率。", url:"https://script.google.com/macros/s/AKfycbxt_S_nyaJtj8yoBWDSJNOYROjf6fGPPrNmfWgdDX-vkeVH8cRVU-eqtbQxTHF2vKKO/exec" },
  { name:"IEP 適應體育檢核", desc:"IEP 體育課程品質檢核，含分區診斷與判讀線索。", url:"https://script.google.com/macros/s/AKfycbwFDtFkWkYpWK85vuAkIieUeyIT6sl5SSFOU9XX8jtYUHPOcdPKyVY6JIpFNzRoKhSMCA/exec" },
  { name:"LIRSPE 融合式體育評量", desc:"融合式體育課堂觀察評量，資料自動彙整。", url:"https://script.google.com/macros/s/AKfycbyKEOA6GeWbvoyrSAWxP4cfbhCBCVCo7kctAQ52A49cxPHZQXPl1KMfdCrwICCQoSwRTQ/exec" },
  { name:"UDL-DI-STEP 三層規劃器", desc:"從課程設計到活動調整的三層教學規劃。", url:"https://script.google.com/macros/s/AKfycbxOK84uc2ph3_2ocjqf0P-EnBrqpnTmigEpw3yX2uVrQ5xFm5eO0kyC3R5CbEhN8RpR/exec" },
  { name:"UDL-CDT 教學靈感工具", desc:"輸入體育單元，AI 生成全班取向的教學設計與教學目標。", url:"https://script.google.com/macros/s/AKfycbzWTWP5eVuxfQoQ0V09y0iqrRzeqz_2mNU-S2jL_gYhxwcFS1rZjGIWWGPHjmB1XRx1OA/exec" },
  { name:"這節課的感受（課前課後對照）", desc:"PAAS 十二題，課前填一次、課後再填一次，看這節課把學生的感受帶往哪個方向：起勁想動、放鬆安穩、難受挫折、累了沒力。預設不上傳，學生按下「送出給老師」才會送出（學號後四碼、課程、單元與作答，不含姓名與完整學號）。", url:"tools/paas-lesson-affect.html" },
];
const SELF_STUDY_TOOLS = [
  { name:"適應體育個案自學（中文版）", desc:"個案情境自學與判斷練習。", url:"tools/ape-selfstudy-zh.html" },
  { name:"APE Case Self-Study (EMI)", desc:"English-medium case-based self-study.", url:"tools/ape-selfstudy-emi.html" },
  { name:"IEP 體育課程品質檢核（師培版）", desc:"演講／課堂用單機版檢核練習。", url:"tools/iep-quality-check.html" },
  { name:"STEP 調整卡（師培思考鷹架）", desc:"選運動 × UDL 三透鏡，練習用「全班皆可選」設計融合式體育課，附反思提問。", url:"tools/step-adaptation-cards.html" },
  { name:"適應性身體活動個案自學（中文版）", desc:"25 個走出校門的批判思考個案：權利政策、社區轉銜、健康行為、競技帕拉、醫療倫理、觀賞平權。延伸文獻附 DOI 連結。", url:"tools/apa-selfstudy-zh.html" },
  { name:"APA Case Self-Study (EMI)", desc:"25 critical-thinking cases beyond the school gate: rights & policy, community, health behavior, Para sport, ethics, spectatorship.", url:"tools/apa-selfstudy-emi.html" },
];
const GAME_TOOLS = [
  { name:"調整判讀挑戰", desc:"六個現場案例，每案限時選出三個支持策略，守住有意義的參與、安全與歸屬感，結束後依你踩過的陷阱給回饋。僅供教學討論，非正式評量。", url:"tools/adaptation-challenge.html" },
  { name:"IEP 找碴", desc:"三份虛構 IEP 體育摘要，限時標出寫壞的句子：不可測目標、目標偷換、祝福式轉銜、未經調整的全校檢測。結束後依漏掉的類型給判讀線索。", url:"tools/iep-spot-challenge.html" },
  { name:"同儕小教練（學生版＋師培版）", desc:"協助不是代勞。學生版扮演小老師陪同學練排球 13 幕；師培版從招募到輪替建置同儕指導制度 10 幕。附中英對照句型，結尾自動結算自我檢查表。", url:"tools/peer-coach-story.html" },
  { name:"無障礙偵察隊", desc:"三個校園場景（走廊、體育館、操場）藏著 18 個環境障礙，限時找出來。每個障礙附「誰被擋住了」與「怎麼改」。該被克服的是環境，不是身體。", url:"tools/barrier-scout.html" },
  { name:"調整補給站（迷宮）", desc:"你是體育老師，在校園裡收集六種調整策略，帶回體育課部署，同時繞開五種做壞的做法。全班參與度與教師能量兩條儀表即時變動。公開版，另站。", url:"https://rogerp3201.github.io/adaptation-maze/" },
  { name:"帶好這一班（即時版）", desc:"同一個班，但時間會自己走。十八週約一分鐘，七個事件突然彈出、倒數六秒，不選就自己壞掉。開學前的準備會長出原本不存在的選項；四張調整卡用拖的丟給全班或三位學生。適合研習開場與體感教學。", url:"tools/class-sim-live.html" },
  { name:"帶好這一班（學期模擬）", desc:"帶 26 人的班級走完 18 週。開學先選兩項準備（視覺提示、分層挑戰站、同儕小老師、多元評量），看它們在學期中的關鍵時刻派上用場。含兩難回合與學期軌跡回顧，適合師培與深度研習。", url:"tools/class-sim.html" },
];
const CLASS_TOOLS = [
  { name:"帕拉演講互動", desc:"分級師與標題翻轉互動。", url:"tools/para-interactive.html" },
  { name:"平均的謊言（演講版）", desc:"演講演示：一場「成功」的活動，平均值上升，但有人被推往反方向。講者按鍵推進。", url:"tools/average-lie.html" },
  { name:"平均的謊言（互動版）", desc:"你來設計一堂投籃課。照班級平均設計，報表很好看，但把平均攤開來，有人整節課投不到兩球，有人太簡單等於沒上。公開版，另站。", url:"https://rogerp3201.github.io/average-lie/" },
  { name:"抽案輪盤", desc:"課堂抽案討論輪盤。", url:"tools/case-roulette.html" },
  { name:"肌力體能選擇板", desc:"肌力體能課選擇板。", url:"tools/strength-choice-board.html" },
  { name:"體適能紀錄（數位版）", desc:"體適能檢測數位紀錄。", url:"tools/fitness-record.html" },
  { name:"自覺用力量表（Borg CR10）", desc:"運動後用臉譜量表回報疲累程度，可記錄與朗讀。", url:"tools/rpe-borg-scale.html" },
  { name:"視覺計時器（分站輪換）", desc:"循環訓練大字倒數＋顏色＋提示音，自動輪換分站。", url:"tools/station-timer.html" },
  { name:"動作分解 First-Then", desc:"把動作拆成一步步，現在做／接下來，逐步完成。", url:"tools/first-then-sequencer.html" },
];

function render(listId, tools){
  const box = document.getElementById(listId);
  tools.forEach((t, i) => {
    const card = document.createElement("div");
    card.className = "card";
    const live = !!t.url;
    card.innerHTML = `<b>${t.name}</b><p>${t.desc}</p>
      <div class="row">
        <a class="btn ${live ? "" : "off"}" href="${t.url || "#"}" target="_blank" rel="noopener">${live ? "開啟工具" : "即將上線"}</a>
        <div class="qr" id="qr-${listId}-${i}"></div>
      </div>`;
    box.appendChild(card);
    if (live) {
      const abs = new URL(t.url, location.href).href;
      new QRCode(document.getElementById(`qr-${listId}-${i}`), { text: abs, width: 74, height: 74, correctLevel: QRCode.CorrectLevel.M });
    }
  });
}
render("appsScriptTools", APPS_SCRIPT_TOOLS);
render("selfStudyTools", SELF_STUDY_TOOLS);
render("gameTools", GAME_TOOLS);
render("classTools", CLASS_TOOLS);
</script>
</body>
</html>
