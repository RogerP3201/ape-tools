<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>自覺用力量表 Borg CR10</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f2f4f7;color:#16202b;min-height:100vh;padding-bottom:40px}
header{background:linear-gradient(135deg,#173F63,#0F766E);color:#fff;padding:20px 18px;text-align:center}
h1{font-size:1.35rem;font-weight:900;letter-spacing:.04em}
header p{font-size:.82rem;opacity:.9;margin-top:5px}
.wrap{max-width:640px;margin:0 auto;padding:14px}
.act{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.act label{font-size:.82rem;font-weight:900;color:#5b6773;white-space:nowrap}
.act input{flex:1;font:inherit;padding:9px 12px;border:1.5px solid #e0e4e9;border-radius:10px;background:#fff}
.q{font-size:1rem;font-weight:900;color:#1F4E79;margin:4px 2px 10px}
.scale{display:flex;flex-direction:column;gap:7px}
.lvl{display:flex;align-items:center;gap:12px;padding:8px 12px;border:2px solid transparent;border-radius:14px;background:#fff;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:.12s}
.lvl:hover{transform:translateX(2px)}
.lvl.on{border-color:#16202b;box-shadow:0 3px 12px rgba(0,0,0,.18)}
.lvl svg{flex:0 0 46px;width:46px;height:46px}
.num{flex:0 0 40px;text-align:center;font-size:1.7rem;font-weight:900;color:#fff;border-radius:10px;padding:6px 0}
.word{font-size:1.05rem;font-weight:900}
.bar{flex:1;height:12px;border-radius:6px;background:#eef2f6;overflow:hidden}
.bar>i{display:block;height:100%}
.pick{position:sticky;bottom:0;margin-top:14px;background:#fff;border:1px solid #e5e9ee;border-radius:16px;padding:14px;box-shadow:0 -4px 16px rgba(0,0,0,.08);text-align:center}
.pick .big{font-size:1.15rem;font-weight:900}
.pick .sub{font-size:.8rem;color:#5b6773;margin-top:2px}
.row{display:flex;gap:8px;margin-top:12px}
.row button{flex:1;font:inherit;font-weight:900;font-size:1rem;padding:12px;border-radius:12px;border:none;cursor:pointer}
.save{background:#0F766E;color:#fff}.save:disabled{background:#cfd8dd;cursor:default}
.ghost{background:#fff;color:#5b6773;border:1.5px solid #e0e4e9!important}
.hist{margin-top:20px}
.hist h2{font-size:.95rem;color:#4a564f;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.hist h2 button{font:inherit;font-size:.72rem;font-weight:900;color:#B91C1C;background:none;border:none;cursor:pointer}
.item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e5e9ee;border-radius:10px;padding:8px 12px;margin-bottom:6px;font-size:.85rem}
.dot{width:14px;height:14px;border-radius:50%;flex:0 0 14px}
.item .d{color:#8a97a0;margin-left:auto;font-size:.75rem;white-space:nowrap}
.empty{color:#9aa39d;font-size:.82rem;text-align:center;padding:14px}
.spk{position:absolute;top:16px;right:14px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:999px;padding:7px 14px;font:inherit;font-size:.78rem;font-weight:900;cursor:pointer}
@media print{header .spk,.act,.pick,.row,.hist h2 button{display:none}body{background:#fff}}
</style></head><body>
<header>
<button class="spk" id="spk" onclick="toggleSpeak()">🔊 語音開</button>
<h1>自覺用力量表</h1><p>Borg CR10・運動時你覺得「多累」？點一下最符合的一格</p>
</header>
<div class="wrap">
<div class="act"><label>活動</label><input id="act" placeholder="例：肌力菜單、跑步、輪椅推進…（可留白）"></div>
<div class="q">你現在覺得多累？</div>
<div class="scale" id="scale"></div>
<div class="pick" id="pick" style="display:none">
  <div class="big" id="pbig"></div><div class="sub" id="psub"></div>
  <div class="row">
    <button class="ghost" onclick="clearPick()">重選</button>
    <button class="save" id="savebtn" onclick="saveLog()">＋ 記錄這次</button>
  </div>
</div>
<div class="hist">
  <h2>我的紀錄 <span><button onclick="exportRpeCSV()">⬇ 匯出 CSV</button> <button onclick="clearHist()">清空</button></span></h2>
  <div id="hist"></div>
</div>
</div>
<script>
const LV=[
 {n:0,w:"完全不費力",c:"#15803D"},
 {n:1,w:"非常輕鬆",c:"#3E8E4E"},
 {n:2,w:"輕鬆",c:"#4F9A3E"},
 {n:3,w:"中等",c:"#7FA61E"},
 {n:4,w:"有點吃力",c:"#B08A0E"},
 {n:5,w:"吃力",c:"#C77A15"},
 {n:6,w:"很吃力",c:"#CF6A18"},
 {n:7,w:"非常吃力",c:"#D2551E"},
 {n:8,w:"很累",c:"#C63A22"},
 {n:9,w:"快到極限",c:"#B91C1C"},
 {n:10,w:"竭盡全力",c:"#8F1414"}
];
let sel=null, speakOn=true;
let log=JSON.parse(localStorage.getItem("rpe_log")||"[]");
function face(n,c){
  // mouth control: smile(low) -> frown(high)
  const mc=40-(n/10)*17;               // 40 smile .. 23 frown
  const brow=n>=6?`<path d="M15 18 L21 20" stroke="${c}" stroke-width="2.4" stroke-linecap="round"/><path d="M33 18 L27 20" stroke="${c}" stroke-width="2.4" stroke-linecap="round"/>`:"";
  const sweat=n>=8?`<path d="M37 15 q3 5 0 8 q-3 -3 0 -8" fill="#8a97a0"/>`:"";
  return `<svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="24" cy="24" r="20" fill="#fff" stroke="${c}" stroke-width="3"/><circle cx="18" cy="22" r="2.4" fill="${c}"/><circle cx="30" cy="22" r="2.4" fill="${c}"/><path d="M16 32 Q24 ${mc} 32 32" fill="none" stroke="${c}" stroke-width="3" stroke-linecap="round"/>${brow}${sweat}</svg>`;
}
function say(t){ if(!speakOn)return; try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="zh-TW";u.rate=.95;speechSynthesis.speak(u);}catch(e){} }
function toggleSpeak(){speakOn=!speakOn;document.getElementById("spk").textContent=speakOn?"🔊 語音開":"🔇 語音關";if(!speakOn)speechSynthesis.cancel();}
function buildScale(){
  const s=document.getElementById("scale");
  s.innerHTML=LV.map(l=>`<div class="lvl" data-n="${l.n}" onclick="pick(${l.n})">
    ${face(l.n,l.c)}
    <span class="num" style="background:${l.c}">${l.n}</span>
    <span class="word" style="color:${l.c}">${l.w}</span>
    <span class="bar"><i style="width:${(l.n/10)*100}%;background:${l.c}"></i></span>
  </div>`).join("");
}
function pick(n){
  sel=n; const l=LV[n];
  document.querySelectorAll(".lvl").forEach(e=>e.classList.toggle("on",+e.dataset.n===n));
  document.getElementById("pick").style.display="block";
  document.getElementById("pbig").innerHTML=`你選了 <span style="color:${l.c}">${n}　${l.w}</span>`;
  document.getElementById("psub").textContent="正確嗎？可以按「記錄這次」存起來，或重選。";
  say(`${n}，${l.w}`);
}
function clearPick(){sel=null;document.querySelectorAll(".lvl").forEach(e=>e.classList.remove("on"));document.getElementById("pick").style.display="none";}
function saveLog(){
  if(sel===null)return;
  const l=LV[sel];const now=new Date();
  log.unshift({n:sel,w:l.w,c:l.c,act:document.getElementById("act").value.trim(),
    d:now.toLocaleDateString("zh-TW"),t:now.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})});
  localStorage.setItem("rpe_log",JSON.stringify(log.slice(0,200)));
  say("已記錄"); clearPick(); renderHist();
}
function renderHist(){
  const h=document.getElementById("hist");
  if(!log.length){h.innerHTML='<div class="empty">還沒有紀錄。做完運動後點一格再按「記錄這次」。</div>';return;}
  h.innerHTML=log.map(x=>`<div class="item"><span class="dot" style="background:${x.c}"></span>
    <b style="color:${x.c}">${x.n}</b> ${x.w}${x.act?'　·　'+x.act:''}
    <span class="d">${x.d} ${x.t}</span></div>`).join("");
}
function clearHist(){ if(confirm("確定清空所有紀錄？")){log=[];localStorage.setItem("rpe_log","[]");renderHist();} }
function exportRpeCSV(){
  if(!log.length){ alert("還沒有紀錄可以匯出"); return; }
  const head=["日期","時間","分數","描述","活動"];
  const rows=[head.join(",")].concat(log.map(x=>[x.d,x.t,x.n,x.w,x.act||""].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(",")));
  const blob=new Blob(["﻿"+rows.join("\n")],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="自覺用力量表_紀錄.csv"; a.click();
}
buildScale(); renderHist();
</script><div style="position:fixed;left:0;right:0;bottom:0;z-index:9999;pointer-events:none;padding:6px 10px;text-align:center;font-size:10.5px;line-height:1.5;color:#8a9aa5;opacity:.7;font-family:'Microsoft JhengHei',system-ui,sans-serif">

</div>
</body></html>
