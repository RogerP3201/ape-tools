的缺陷是結構性的：你的答案有沒有把體育老師的問題「前置」（會前書面提問單）？", "「維持行走耐力、避免碰撞」必須翻成籃球單元的具體設計——翻不出來，團隊建議就只是空話。", "無口語學生的意願需要載體：溝通輔具進體育課、建立「累」與「不舒服」的訊號約定——誰負責教？"]}, {"no": 21, "title": "兩位老師與一場罷打——衝突的三個層次", "cat": "專業協作與支持人力", "source": "", "reading": null, "scenario": ["桃園市立青溪高中的體育科由兩位風格迥異的老師撐起：年輕的戴老師採運動教育模式，讓學生分隊、輪任裁判與教練，強調自主；資深的老駱老師走紀律路線，隊形、口令、標準動作。兩人在科會議上多次交鋒，「你那套是放縱」「你那套是軍訓」，最後演變成互不使用對方整理的器材室。", "衝突延燒到學生層：戴老師班上的排球賽季，有學障與 ADHD 的立群在擔任裁判時誤判連連，遭隊長怒嗆「你去計分就好」，立群摔了哨子，兩隊學生在場上對峙互罵，其中一隊集體拒絕再出賽。學務處把兩位老師找去，主任只說了一句：「體育科的事，你們自己解決。」"], "uni": ["本案有三層衝突（教師—教師、學生—學生、師生制度）——它們如何互相餵養？先解哪一層？", "立群的誤判事件裡，隊長、立群、戴老師各自的「合理性」是什麼？運動教育模式把學生推上裁判角色時，該配什麼支持？", "請為戴老師設計一個處理「罷賽」的完整流程：當下、隔天、賽季規則的修改。", "兩位老師的教學哲學衝突有沒有「對錯」？科內的專業歧異該用什麼機制處理，而不是靠器材室冷戰？"], "grad": [["Conflict in this case operates at interpersonal, pedagogical, and organizational levels. Apply a conflict-resolution framework (e.g., interest-based negotiation) to design the facilitated conversation the department head refused to hold.", "本案的衝突同時在人際、教學與組織層次運作。請運用衝突解決架構（如利益基礎協商）設計那場主任拒絕主持的協調會談。"], ["Sport Education deliberately distributes authority to students (referee, coach roles), which increases both learning opportunity and conflict exposure for students with disabilities. What does the model's research base say about scaffolding these roles?", "運動教育模式刻意把權力分配給學生（裁判、教練角色），這同時增加了身障學生的學習機會與衝突暴露。該模式的研究基礎對這些角色的鷹架有何建議？"], ["Teacher-to-teacher philosophical conflict is rarely studied in PE departments. Propose a qualitative case study design for investigating how PE departments in Taiwan negotiate pedagogical disagreement, attending to reflexivity given your insider status.", "體育科內教師間的哲學衝突很少被研究。請提出一個質性個案研究設計，探討臺灣的體育科如何協商教學歧異，並處理你作為圈內人的反身性。"]], "enTitle": "Two Teachers and a Strike: Three Levels of Conflict", "enSummary": "Two teachers' philosophies — sport education versus military-style discipline — escalate into a departmental cold war, while a student referee with LD triggers an on-court strike. Administration's answer: 'Sort it out yourselves.'", "enScenario": ["The PE department at Qingxi High School in Taoyuan is carried by two teachers with opposite philosophies: young Mr. Tai runs sport education — student-led teams, rotating referee and coach roles, autonomy; senior Mr. Lo runs discipline — formations, commands, standard technique. They clash at every department meeting (“your way is indulgence” — “yours is military drill”), until they no longer use each other's side of the equipment room.", "The conflict spreads to the students. During Mr. Tai's volleyball season, Li-chun — a student with a learning disability and attention deficits — makes repeated wrong calls as referee, and the team captain snaps: “Just go keep score.” Li-chun hurls the whistle to the floor; the two teams square off shouting; one team refuses to play for the rest of the season. The dean of student affairs summons both teachers and says exactly one sentence: “PE department business — settle it yourselves.”"], "after": ["三層衝突（師師、生生、制度）互相餵養：你的答案先動哪一層？說得出理由嗎？", "立群的誤判是支持問題不是能力問題：裁判角色的鷹架（簡化判準、雙裁判制、暫停求助權）你設計了嗎？", "「你們自己解決」是制度的缺席：科內專業歧異需要機制（共同備課、觀課回饋），不是等誰說服誰。"]}, {"no": 22, "title": "坐上輪椅之後——一次「成功」的失能模擬？", "cat": "態度與社會再現", "source": "議題探究", "reading": "本案為自編議題探究個案，無對應教科書章節；延伸文獻見本案文末。", "scenario": ["北部某大學的適應體育課，教師安排了一次輪椅體驗活動：學生分組乘坐競速輪椅完成接力與定點投籃，活動結束後撰寫反思心得。多數心得寫著「很感動」「身障者真的好辛苦」「我們要珍惜自己擁有的」。一位學生小安寫道：「我以後在路上看到坐輪椅的人，會覺得他們好可憐，出門一定很危險。」", "學期末，教師以態度量表進行前後測，全班平均分數顯著上升，教師在課程成果報告中將活動列為亮點。但助教整理資料時發現：全班有超過兩成學生的態度分數不升反降，其中幾位甚至由正向轉為負向。教師感到困惑——活動看起來明明很成功，學生也都說很有收穫。"], "uni": ["小安的心得是「有同理心」的表現嗎？同理（empathy）與憐憫（pity）差在哪裡？", "如果你是這門課的老師，看到「全班平均上升、但兩成學生下降」，你會如何解讀這次活動的成效？平均數說了什麼、又藏了什麼？", "這次活動讓學生體驗到的是「身心障礙」，還是「第一次用不熟悉的器材」？兩者有什麼不同？", "你自己參加過類似體驗活動嗎？回想你當時的感受，比較接近「原來他們也可以做到很多事」還是「還好我不是這樣」？"], "uniAct": ["兩階段投票：先請學生為「輪椅體驗是好的教學活動」表態（同意／不同意／看條件），閱讀個案後再投一次，請改變立場者說明原因。", "改造設計工作坊：分組把個案中的活動重新設計成「較不會產生反效果」的版本，各組必須明確指出自己動了哪個環節（活動前的框架說明、活動本身、事後反思引導），並說明理由。"], "grad": ["Nario-Redmond 等人主張模擬讓參與者體驗到的是「剛失能的第一天」而非身障者的日常適應與能動性——這個批判動搖了模擬教學的哪個核心假設？", "本個案中量化平均上升、卻有次群體反向變化。就研究方法而言，只報告平均效果的模擬研究可能系統性遺漏了什麼？這對介入研究的分析策略（如異質性分析、反應者分析）有何意涵？", "「有害的模擬」與「建設性的模擬」之區分，文獻指向事後反思與 debriefing 的品質。從接觸理論（intergroup contact theory）的最適條件來看，模擬體驗缺了哪些條件？debrief 補得回來嗎？", "若你要為此爭議設計一個實證研究來檢驗「反思引導品質」是否為調節變項，你的設計、測量與分析會長什麼樣子？"], "gradTask": ["閱讀 Silverman 等人（2015）與 Gathercoal 等人（2017），整理兩者對「模擬何時有害、何時有益」的條件論述，寫一頁對照備忘錄。", "以本個案為素材，草擬一段可放入研究計畫「研究動機」的論述：為什麼台灣的適應體育課程需要本土的失能模擬效果研究？"], "guide": ["學生最常見的反應是「活動立意良善，所以效果一定是好的」——引導重點在於把「意圖」與「效果」分開，並讓學生看到證據（兩成下降）與直覺的落差。", "討論容易滑向「所以以後都不要辦體驗活動」的全盤否定——把方向拉回條件式思考：什麼設計條件下模擬有建設性？專家引導、事前框架、結構化反思是文獻指出的關鍵。", "提醒學生留意「感動」在教學評鑑中的誘惑：心得寫得越感人，越可能是憐憫框架在運作。"], "refs": [["Nario-Redmond, Gospodinov, & Cobb (2017). Crip for a day: The unintended negative consequences of disability simulations. Rehabilitation Psychology.", "https://doi.org/10.1037/rep0000127", "模擬引發憐憫與焦慮的代表性實證批判。"], ["Ma & Hsieh (2022). Meta-analysis of mobility disability simulation programs on attitudes. PLoS ONE.", "https://doi.org/10.1371/journal.pone.0269357", "統合分析：行動障礙模擬對恐懼／焦慮為大效果量。"], ["Silverman, Gwinn, & Van Boven (2015). Stumbling in their shoes. Social Psychological and Personality Science.", "https://doi.org/10.1177/1948550614559650", "模擬降低對身障者能力評價的實驗證據。"], ["Gathercoal et al. (2017). Nurturing constructive change: simulation + debriefing + reflection.", "https://doi.org/10.4081/qrmh.2017.6391", "區分有害與建設性模擬：反思與 debrief 是關鍵。"], ["French (1992). Simulation exercises in disability awareness training: A critique.", "https://doi.org/10.1080/02674649266780261", "最早期的系統性批判，適合作為歷史脈絡。"]], "enTitle": "After Sitting in the Wheelchair: A “Successful” Disability Simulation?", "enSummary": "A wheelchair-experience day produces moving reflections and a significant rise in mean attitude scores — and a fifth of students whose attitudes quietly worsen, including one who now finds wheelchair users 'pitiful.' Was the activity a success?", "enScenario": ["In a university adapted physical education course in northern Taiwan, the instructor runs a wheelchair-experience activity: student groups complete relays and spot-shooting in racing wheelchairs, then write reflections afterwards. Most reflections read “so moving,” “people with disabilities have it so hard,” “we should cherish what we have.” One student, Hsiao-an, writes: “From now on, when I see a wheelchair user on the street, I'll feel they are pitiful — going out must be so dangerous for them.”", "At the end of the term, the instructor administers a pre-post attitude scale: the class mean rises significantly, and the activity is listed as a highlight in the course report. But while organizing the data, the teaching assistant notices something: more than one-fifth of the students' attitude scores went down, and several flipped from positive to negative. The instructor is puzzled — the activity certainly looked like a success, and the students all said they got so much out of it."]}, {"no": 23, "title": "「你有什麼藉口？」——一支勵志影片引發的爭論", "cat": "態度與社會再現", "source": "議題探究", "reading": "本案為自編議題探究個案，無對應教科書章節；延伸文獻見本案文末。", "scenario": ["系學會為身心障礙宣導週製作了一支影片：帕運選手的訓練畫面配上激昂配樂，結尾打出標語——「他們都做得到，你有什麼藉口？」影片在社群媒體上獲得大量轉發，留言一片「好感動」「太勵志了」。", "系上一位使用輪椅的學生代表卻在會議上表示不舒服：「為什麼我們一定要很勵志？我只是來上學，不是來激勵你們的。」學會幹部感到委屈：「我們明明是正面宣傳，是在讚美他們，哪裡有錯？」指導老師決定把這場爭論帶進課堂。"], "uni": ["「他們都做得到，你有什麼藉口」這句話的預設觀眾是誰？身障學生看到這句話時，被放在什麼位置？", "讚美怎麼會變成傷害？試著區分「以成就為中心」與「以克服障礙為中心」的兩種報導方式，各舉一個例子。", "學會幹部說「我們是正面宣傳」——意圖良善能不能豁免再現的責任？這跟個案一（失能模擬）的「意圖 vs 效果」有什麼共通結構？", "如果重拍這支影片，保留帕運選手素材，你會怎麼改標語與剪輯，使它「以運動為中心」而非「以感動為中心」？"], "uniAct": ["再現分析任務：蒐集三則台灣媒體的帕運或身障運動報導，用「勵志框架／運動框架／醫療框架」分類標題與導言，統計哪種框架最多。", "重寫工作坊：把個案影片的腳本重寫成運動員本人會認可的版本，播放（或朗讀）給全班，投票哪一版「既尊重又有傳播力」。"], "grad": ["Silva 與 Howe 指出 supercrip 敘事製造「成就症候群」——身障者的成功被敘述為「儘管有障礙仍然成功」。這個敘事結構如何同時抬高個別選手、貶低整體身障社群？", "實證上，Jang 等人（2025）發現勵志框架引發憐憫（下行比較情緒）、成就框架引發欽佩（上行比較情緒），且後者帶來更高的品牌真實性與支持意圖——情緒機制的證據如何把批判理論的主張轉譯成可操作的傳播準則？", "Bartsch 等人（2018）卻發現同理與感動（elevation）能促進對帕運的興趣與去污名——這與 inspiration porn 批判之間的張力如何調和？「有效的感動」與「有害的感動」界線在哪？", "Pappous 等人（2025）顯示運動員本人想要「就談運動」的報導。若以參與式取徑讓運動員主導自我再現（如社群媒體），研究者與媒體的角色該如何重新定位？"], "gradTask": ["以 Rees 等人（2019）的系統性回顧為基礎，設計一份可用於台灣媒體內容分析的編碼架構（框架類別、單位、信度程序），並試編五則本地報導。", "撰寫一頁「給體育署與媒體的帕運報導指引」草案，每條建議須註明對應的實證來源。"], "guide": ["多數學生會站在學會幹部那邊（「這明明是好意」）——與個案一相同的「意圖／效果」分離練習在此再度出現，可明確點出兩案的同構性，強化遷移。", "避免讓討論變成「以後都不能讚美身障運動員」——關鍵區分是：讚美其運動成就（跟讚美任何運動員一樣）沒有問題，把其存在本身當勵志素材才是問題。", "碩士班版的張力點（Jang vs Bartsch）是刻意保留的：兩篇都是好研究、結論方向卻不同，讓學生練習在真實的證據衝突中定位自己的研究問題。"], "refs": [["Silva & Howe (2012). The (in)validity of supercrip representation of Paralympian athletes. Journal of Sport & Social Issues.", "https://doi.org/10.1177/0193723511433865", "supercrip 批判的奠基文獻，成就症候群概念的出處。"], ["McGillivray et al. (2019). Repurposing the (super)crip: Media representations of disability at the Rio 2016 Paralympic Games. Communication & Sport.", "https://doi.org/10.1177/2167479519853496", "supercrip 與國族、性別化、軍事化論述的交織。"], ["Rees, Robinson, & Shields (2019). Media portrayal of elite athletes with disability — a systematic review. Disability and Rehabilitation.", "https://doi.org/10.1080/09638288.2017.1397775", "系統性回顧：能見度低、supercrip 與醫療化框架並存。"], ["Pappous et al. (2025). 'It should just be about sport!': Italian athletes' perspectives on Paralympic media coverage.", "https://doi.org/10.3389/fspor.2025.1640762", "運動員本人的再現偏好與社群媒體自我再現。"], ["Jang et al. (2025). Beyond inspiration porn: Effects of message framing on brand authenticity. Journal of Business Ethics.", "https://doi.org/10.1007/s10551-025-06062-1", "實驗證據：勵志框架引發憐憫、成就框架引發欽佩。"], ["Bartsch et al. (2018). Inspired by the Paralympics: Effects of empathy on audience interest and destigmatization. Communication Research.", "https://doi.org/10.1177/0093650215626984", "對照證據：同理與感動的去污名潛力（憐憫仍為負向）。"]], "enTitle": "“What's Your Excuse?”: An Inspirational Video Backfires", "enSummary": "A student association's inspirational Paralympic video — 'they can do it, what's your excuse?' — goes viral, and deeply upsets the one wheelchair-using student it claims to honor. The organizers feel wronged: weren't they being positive?", "enScenario": ["For disability awareness week, the student association produces a video: Paralympic training footage cut to soaring music, ending with the slogan — “They can do it. What's your excuse?” The video takes off on social media, with comments glowing: “so moving,” “so inspiring.”", "The department's one wheelchair-using student representative says at the council meeting that the video made her deeply uncomfortable: “Why must we always be inspiring? I'm just here to go to school — not to motivate you.” The association officers feel wronged: “It's positive publicity. We were praising them — what's wrong with that?” The faculty advisor decides to bring the dispute into the classroom."]}, {"no": 24, "title": "該不該全面推動 UDL？——熱潮、證據與課程委員會的辯論", "cat": "制度、政策與證據", "source": "議題探究", "reading": "本案為自編議題探究個案，無對應教科書章節；延伸文獻見本案文末。", "scenario": ["某師資培育大學的課程委員會上，一位年輕教師提案：將通用學習設計（UDL）全面納入系上師培課程，並列入教學評鑑指標。他的簡報寫著：「UDL 是奠基於神經科學的實證架構，國際趨勢，CAST 3.0 已於 2024 年發布。」", "資深的林教授舉手反對。她引用文獻指出：統合分析顯示 UDL 對「學習歷程」的改善有支持，但對「學習成效」的證據不足；也有學者逐篇檢視 CAST 官網引用的研究後發現，多數引用其實無法支持其宣稱，「以神經科學為基礎」的說法查無對應實證。提案教師反駁：「等證據完備再行動，弱勢學生等不起。」會議主席看著兩造，必須做出決定。"], "uni": ["「UDL 是有實證基礎的」——這句話可以拆成哪幾個不同強度的宣稱（有理論依據／歷程有效／成效有效／優於其他做法）？個案中兩位教師各自在講哪一種？", "「弱勢學生等不起」是一個好論證嗎？它在什麼條件下成立、什麼條件下變成迴避檢驗的藉口？", "如果一個架構「定義模糊到怎麼做都算符合」，這對教師是彈性還是負擔？對研究者又意味著什麼？", "你自己在系上修過的課程中，有哪些做法其實符合 UDL 原則？它們有效嗎？你怎麼知道？"], "uniAct": ["證據分級任務：發給各組五條「支持 UDL 的敘述」（混入不同強度的宣稱），請學生排出證據強度序列並說明判準。", "迷你辯論：「本系應將 UDL 列入教學評鑑指標」，正反方各三分鐘，評審組的任務不是選邊，而是指出雙方各用了哪種證據與哪種修辭。"], "grad": ["Capp（2017）的統合分析結論是「改善學習歷程、但教育成效未獲證實」——歷程與成效的區分為什麼關鍵？一個只有歷程證據的架構，在政策上該被如何對待？", "Boysen（2024）逐篇檢視 CAST 引用的研究，發現多數無法支持其宣稱。這種「引用鏈稽核」作為一種學術批判方法，和一般的文獻回顧差在哪？你的研究領域裡有沒有值得做同樣稽核的架構？", "Zhang 等人（2024）指出 UDL 研究的核心困境是介入設計與 UDL checkpoints 之間缺乏明確對應——這是可以用更好的研究設計解決的問題，還是架構本身不可檢驗（unfalsifiable）的病徵？", "King-Sears 等人（2023）的統合分析得到中度正效果（g = 0.43），與 Murphy（2020）「沒有嚴謹證據」的結論並存。兩個看似矛盾的結論如何同時為真？這對你閱讀統合分析的方式有何提醒？"], "gradTask": ["任選一個你熟悉的教育或運動科學架構（如 TGfU、SEL、動作教育），模仿 Boysen 的做法抽查其官方論述引用的三篇文獻，檢驗引用是否支持宣稱，寫成兩頁稽核筆記。", "為課程委員會主席起草一頁決策備忘錄：在承認證據現況的前提下，提出一個「有條件推動」方案（含試辦、測量與退場條件）。"], "guide": ["本個案的目標不是讓學生反對 UDL，而是練習把「架構的價值主張」與「實證宣稱」分開評價——UDL 的融合價值可以成立，同時其證據宣稱需要被誠實對待。", "學生（尤其修過特教課程者）可能有防衛反應，覺得批評 UDL 就是反融合——明確區分「批判架構的證據論述」與「反對融合教育」是教師需要主動立起的鷹架。", "碩士班版的隱藏目標是方法學素養：歷程／成效之分、統合分析異質性、引用鏈稽核，都是可遷移到任何領域的裝備。"], "refs": [["Capp (2017). The effectiveness of universal design for learning: a meta-analysis 2013–2016. International Journal of Inclusive Education.", "https://doi.org/10.1080/13603116.2017.1325074", "最常被引用的結論：歷程有效、成效未證實。"], ["Murphy (2020). Belief without evidence? A policy research note on Universal Design for Learning. Policy Futures in Education.", "https://doi.org/10.1177/1478210320940206", "最尖銳的政策批判：稱 UDL 為未證實的信念。"], ["Boysen (2024). A critical analysis of the research evidence behind CAST's UDL guidelines. Policy Futures in Education.", "https://doi.org/10.1177/14782103241255428", "引用鏈稽核：CAST 官網引用多數不支持其宣稱。"], ["King-Sears et al. (2023). Achievement of learners receiving UDL instruction: A meta-analysis. Teaching and Teacher Education.", "https://doi.org/10.1016/j.tate.2022.103956", "較新的統合分析：中度正效果（g = 0.43）。"], ["Zhang et al. (2024). Unraveling challenges with the implementation of UDL: A systematic literature review. Educational Psychology Review.", "https://doi.org/10.1007/s10648-024-09860-7", "實施研究的系統性檢視：checkpoints 對應不明是核心病徵。"], ["Anastasiou et al. (2024). A critical analysis of theoretical underpinnings of UDL. Exceptionality.", "https://doi.org/10.1080/09362835.2024.2426801", "理論層批判：多元呈現原則可能與認知負荷理論衝突。"]], "enTitle": "Should We Mandate UDL? Hype, Evidence and a Committee Debate", "enSummary": "A curriculum committee debates making UDL a mandatory indicator of teaching quality: 'evidence-based and neuroscience-grounded' claims versus meta-analyses showing process gains but unproven outcomes, and audits finding the cited studies don't support the claims.", "enScenario": ["At a teacher-education university's curriculum committee, a young faculty member proposes embedding UDL across the teacher-preparation program and adding it to the teaching-evaluation indicators. His slide reads: “UDL is an evidence-based framework grounded in neuroscience — an international trend; CAST released version 3.0 in 2024.”", "Senior Professor Lin raises her hand to object, citing the literature: meta-analyses support UDL's effects on the learning process but find insufficient evidence for learning outcomes, and the framework's fuzzy definition makes it hard to test; scholars who audited the studies cited on CAST's own website found that most citations do not actually support its claims, and the “neuroscience-based” label has no corresponding empirical trail. The proposer fires back: “If we wait for the evidence to be complete, disadvantaged students cannot wait.” The chair looks at both sides, knowing a decision must be made."]}, {"no": 25, "title": "公平的分級？——一場全國賽後的分級爭議", "cat": "制度、政策與證據", "source": "議題探究", "reading": "本案為自編議題探究個案，無對應教科書章節；延伸文獻見本案文末。", "scenario": ["全國身心障礙游泳錦標賽結束後，教練圈流傳一則耳語：某位奪金選手在分級鑑定時「游得比平常慢很多」，比賽時卻判若兩人。一位 S8 級選手的家長正式向大會申訴：「我的孩子永遠贏不了那位功能明顯比較好的對手，這對認真訓練的孩子公平嗎？」", "大會的分級師是兩位資深志工，其中一位私下坦言：分級訓練時數有限、又缺乏標準化工具，「有些個案我們也只能憑經驗判斷。而且就算懷疑有人裝，我們能怎麼辦？」體育署委託的檢討會議上，有人主張引進國際帕委會的實證分級（evidence-based classification），有人認為國內選手人數太少、分太細會沒有比賽可比，也有人主張重點應放在故意誤報（intentional misrepresentation）的罰則。"], "uni": ["帕拉分級想做到的事（讓損傷不決定勝負、讓訓練與才能決定勝負）與一般運動的量級制有什麼異同？", "「裝得比較差」在帕拉運動中為什麼比一般運動的作弊（如禁藥）更難抓？這跟損傷本身的可變性有什麼關係？", "家長的申訴合理嗎？如果你是大會，你需要哪些資訊才能判斷這是分級誤差、還是故意誤報？", "國內選手人數少、分級分太細就沒有對手——在「分級精確」與「有意義的比賽」之間，你會怎麼取捨？"], "uniAct": ["分級模擬法庭：三組分別擔任申訴方、被申訴選手方、分級委員會，就個案進行聽證，委員會需公開裁決理由，全班再檢視裁決依據了哪些原則。", "制度設計工作坊：每組提出一項「明年就能上路」的國內分級制度改善措施（如分級過程錄影、選手教育、申訴機制），並說明成本與副作用。"], "grad": ["Tweedy 與 Vanlandewijck 的 IPC 立場聲明將分級目的明確化為「最小化合格損傷對比賽結果的影響」——這個目的陳述為什麼是實證分級的前提？沒有它，分級研究會怎樣迷航？", "McNamee 等人區分背景公平、程序公平與結果公平——用這三層分析本個案：家長申訴的是哪一層？分級師人力困境是哪一層？三層衝突時哪層優先？", "Howe 與 Jones 批判 IPC 將分級權從障礙運動組織收編的過程「去賦權」了實踐社群；Powis 等人則呈現視障運動員對分級制度的不信任與流言文化。制度正當性（legitimacy）與制度效度（validity）的關係是什麼？只修效度救得回正當性嗎？", "Gowans 等人指認故意誤報的六個結構性成因（專業化壓力、志工分級師、訓練不足、選手不理解程序、低裁罰率等）。若把 IM 理解為制度產物而非個人道德瑕疵，防治策略的設計邏輯會如何改變？"], "gradTask": ["閱讀 IPC 立場聲明與 Kons（2025）的帕拉柔道分級改革分析，撰寫兩頁備忘錄：台灣的全國身障運動賽會若要往實證分級靠近，最小可行的第一步是什麼？", "以「分級即測量」為題，比較分級效度問題與你熟悉的心理計量效度架構（內容、效標、建構效度），找出可相互借用的概念。"], "guide": ["學生容易把爭議簡化為「抓出作弊的人」——引導重點是把視角從個人道德拉到制度設計：低裁罰率、志工人力、模糊程序如何系統性地製造誘因。", "「分級永遠不完美」容易導向犬儒（反正都不公平）——用「夠公平」的工程思維（在資源約束下最小化不公平）取代「完美公平」的想像。", "碩士班版可連結測量理論：分級本質上是效度問題，這條橋能讓量化背景的學生迅速進入哲學討論。"], "refs": [["Tweedy & Vanlandewijck (2009). IPC position stand — background and scientific principles of classification. British Journal of Sports Medicine.", "https://doi.org/10.1136/bjsm.2009.065060", "實證分級的奠基文件，目的陳述的原點。"], ["McNamee, Parnell, & Vanlandewijck (2021). Fairness, technology and the ethics of Paralympic sport classification. European Journal of Sport Science.", "https://doi.org/10.1080/17461391.2021.1961022", "背景／程序／結果三層公平的分析架構。"], ["Howe & Jones (2006). Classification of disabled athletes: (Dis)empowering the Paralympic practice community. Sociology of Sport Journal.", "https://doi.org/10.1123/ssj.23.1.29", "社會學批判：分級權力收編與實踐社群的去賦權。"], ["Powis & Macbeth (2020). 'We know who is a cheat and who is not. But what can you do?'. International Review for the Sociology of Sport.", "https://doi.org/10.1177/1012690218825209", "運動員視角：不信任、流言與身分標籤。"], ["Gowans et al. (2025). Athletes, support staff, and classifiers opinions on intentional misrepresentation in Para sport.", "https://doi.org/10.1177/10126902251406919", "故意誤報的六個結構性主題。"], ["Kons (2025). The classification system in Para judo: transitions, performance outcomes, and future challenges. APAQ.", "https://doi.org/10.1123/apaq.2025-0089", "分級改革的實例：B1–B3 到 J1/J2 的轉換與代價。"]], "enTitle": "Fair Classification? A Controversy After the National Games", "enSummary": "Whispers of intentional misrepresentation at a national para-swimming meet, a parent's formal appeal, and volunteer classifiers with limited training expose how fragile fairness is when classification is the constitution of the sport.", "enScenario": ["After the national para-swimming championships, a rumor circulates in coaching circles: a gold medalist “swam far below his usual level” during classification testing, then looked like a different athlete on race day. The parent of an S8 swimmer files a formal appeal with the organizers: “My child can never beat an opponent whose function is obviously better. Is that fair to a kid who trains honestly?”", "The meet's classifiers are two senior volunteers; one admits privately that training hours are limited and standardized tools are lacking — “some cases we can only judge by experience. And even if we suspect someone is faking, what can we actually do?” At the sports administration's review meeting, one camp proposes adopting the IPC's evidence-based classification; another warns that with so few domestic athletes, finer classes would leave no one to race; a third argues the real priority is sanctions for intentional misrepresentation."]}, {"no": 26, "title": "一日帕拉，之後呢？——校園帕拉運動日的推展兩難", "cat": "制度、政策與證據", "source": "臺灣在地議題", "reading": "搭配閱讀：潘正宸、Legg (2025)。長期發展模式在身心障礙運動的應用：從理論到實踐。大專體育學刊，27(1)；另可對照本集個案 10 與「批判性思考個案集」個案一（失能模擬）、個案五（supercrip）。", "scenario": ["運動部與教育局合作的「校園帕拉運動日」巡迴到雲林縣的斗六國中：一個上午，全校輪流體驗硬地滾球、坐式排球與盲人門球，還請來一位帕運銅牌選手演講。活動照片當天就登上縣府新聞稿，體育組長把它列入年度亮點成果。承辦的體育教師黃暐婷老師卻在活動後陷入思考。", "她注意到三件事。第一，全校唯一使用輪椅的學生柏均，整個上午被安排在司令台「擔任頒獎嘉賓」——所有人都在體驗身障運動，唯一的身障學生卻沒有下場。第二，一般生的體驗興奮而短暫，隔週的體育課一切如常，有學生在坐式排球體驗後說「還好我不用真的這樣打球」。第三，選手演講的高潮是「我失去雙腿，但我沒有失去夢想」，台下老師頻頻拭淚。黃老師想在下學期把硬地滾球納入正式課程單元、讓柏均以選手身分帶同學入門，卻被提醒：「帕拉運動日是運動部的計畫，課程是課綱的事，不要混在一起。」"], "uni": ["「全校都在體驗身障運動，唯一的身障學生在頒獎」——這個畫面哪裡出了問題？活動設計的哪個環節讓柏均變成了裝飾？", "一日體驗、選手勵志演講、納入課程單元——三種帕拉運動教育的「劑量」與可能效果各是什麼？「還好我不用真的這樣打球」這句話是警訊嗎？", "「活動歸運動部、課程歸課綱」的切法對學校端造成什麼困難？黃老師想做的事需要誰點頭？", "如果讓柏均以「硬地滾球選手」身分帶全班入門，對他、對同學各可能發生什麼？需要哪些配套避免變成另一種展示？"], "grad": [["Paralympic school day research suggests single-dose exposure produces short-lived or even counterproductive attitude effects, while multi-week curricular integration shows more durable change. Synthesize this dose-response evidence and design the follow-up curriculum Ms. Huang envisions.", "帕拉運動學校日的研究顯示：單次暴露的態度效果短暫、甚至可能反效果，多週的課程整合則有較持久的改變。請整合這個劑量—反應證據，並設計黃老師想做的後續課程。"], ["The medal-winner's speech exemplifies the supercrip/inspiration framing. Given that Paralympic education inevitably uses athlete narratives, what narrative design principles could preserve motivational power while avoiding objectification?", "銅牌選手的演講是典型的 supercrip／勵志框架。既然帕拉運動教育難免使用選手敘事，哪些敘事設計原則能保留感染力、又避免對象化？"], ["Pan and Legg (2025) apply long-term development models to disability sport. Use that framework to critique the one-off school-day model, and propose how school-based Paralympic education could function as the “awareness and first involvement” stage of a development pathway.", "潘正宸與 Legg（2025）將長期發展模式應用於身心障礙運動。請以該架構批判一次性學校日模式，並提出校園帕拉運動教育如何成為發展路徑中「覺察與首次參與」的階段。"]], "enTitle": "One Day of Para Sport — Then What?", "enSummary": "A one-day Paralympic experience event wins headlines while the school's only wheelchair user spends the morning handing out medals on stage. The teacher who wants to turn the day into a curriculum unit is told: 'events are the sports ministry's business; curriculum is the guidelines'.'", "enScenario": ["The “Campus Para Sports Day” — a joint program of the sports ministry and the county education bureau — arrives at Douliu Junior High in Yunlin: one morning in which the whole school rotates through boccia, sitting volleyball and goalball, plus a talk by a Paralympic bronze medalist. The photos make the county's press release the same day, and the PE section chief logs the event as an annual highlight. Ms. Huang, the teacher who organized it, is left thinking.", "She noticed three things. First, Po-chun — the school's only student who uses a wheelchair — spent the entire morning “presenting medals” on the podium: everyone experienced disability sport except the one disabled student. Second, the excitement was short-lived; PE the following week went on as always, and one student said after the sitting-volleyball tryout, “Glad I don't have to actually play like that.” Third, the medalist's talk peaked at “I lost my legs, but I never lost my dream,” and teachers in the audience kept wiping their eyes. Ms. Huang wants to build boccia into next semester's formal curriculum and have Po-chun introduce the sport to his classmates as an athlete — and is warned: “The Para Sports Day is the ministry's program; curriculum belongs to the guidelines. Don't mix them up.”"], "after": ["一日活動的三個翻車點你都抓到了嗎：唯一身障學生的位置、單次體驗的劑量與消退、勵志敘事的框架？", "「活動歸部會、課程歸課綱」是假對立：好方案讓活動變成課程的入口，而不是課程的替代。", "讓柏均以選手身分帶全班入門是高潛力設計，但需要配套：他本人的意願、事前準備、角色是教學者不是展示品。"]}, {"no": 27, "title": "畢業那天，運動就結束了——適應體育與適應運動的斷裂帶", "cat": "制度、政策與證據", "source": "臺灣在地議題", "reading": "搭配閱讀：潘正宸（2020）。談家長參與個別化教育計畫會議的適應體育課程品質檢核。身心障礙研究，18(1)，19-28；並對照本集個案 17（轉銜計畫裡的動作目標）。", "scenario": ["嘉義市立嘉華高中三年級的定宇是痙攣型腦性麻痺學生，三年來在體育教師吳若彤老師的課程調整下，從迴避運動變成羽球社的固定班底，還在校內賽打進八強。畢業前的 IEP 轉銜會議上，媽媽問了一個問題：「他畢業之後，要去哪裡繼續打球？」會議室安靜了幾秒。吳老師只知道市區有身障桌球隊；輔導室的轉銜計畫欄位裡有升學、就業、生活自理——沒有任何一格是「運動」。", "吳老師會後認真查了資源：縣市身障運動資源中心的課程以長者與復健取向為主；羽球協會的球館「原則上歡迎」但沒有教練帶過腦麻選手；學校問體育處，體育處說身障運動業務屬中央的運動部管；打電話到相關窗口，對方說學生還在學、應屬教育端。半年後同學會，定宇告訴吳老師，他畢業後沒有再拿過球拍。吳老師想起定宇高一時她寫下的課程目標：「培養終身運動習慣」。"], "uni": ["「培養終身運動習慣」是幾乎每份體育課程計畫都會寫的目標——定宇的故事顯示這個目標的達成缺了哪些制度環節？", "適應體育（APE）、適應運動（adapted sports）、適應性身體活動（APA）三個概念的關係是什麼？定宇畢業前後分別落在哪個範疇、歸誰負責？", "轉銜計畫有升學、就業、生活自理，卻沒有「運動」欄位——如果要加，這一欄該由誰填寫、填什麼內容？", "吳老師在現行制度下還能為定宇做什麼？請列出三個畢業前就能啟動的「搭橋」行動。"], "grad": [["IFAPA positions APE as the school-based subset of lifespan APA, while adapted sports form a parallel subset — yet governance in Taiwan splits these across ministries. Analyze De-yu's case as an accountability gap: who is responsible for identifying, providing, and answering for his post-school activity needs?", "IFAPA 將 APE 定位為全生命週期 APA 的學校本位子範疇，適應運動則是平行的子範疇——但臺灣的治理把它們切給不同部會。請把定宇的個案當成問責缺口來分析：他離校後的活動需求，由誰辨識、誰提供、誰負責？"], ["Systems that assign school-based and community-based provision to different ministries (e.g., several European countries) consistently face transition failures unless they invest heavily in bridging mechanisms. What bridging mechanisms does the comparative evidence support, and which are feasible in Taiwan's current structure?", "把學校本位與社區本位服務分屬不同部會的制度（如若干歐洲國家），除非大量投資於串連機制，否則一致地面臨轉銜失敗。比較性證據支持哪些串連機制？在臺灣現行結構下哪些可行？"], ["Design a longitudinal study tracking post-school physical activity participation of Taiwanese students who received APE services, structured as a functional continuum from APE to adapted sports. What would constitute evidence that the continuum is broken versus bridged?", "請設計一個縱貫研究，以「APE 到適應運動的功能性連續光譜」為架構，追蹤接受過適應體育服務的臺灣學生離校後的身體活動參與。什麼樣的證據能顯示光譜是斷裂的、或是被搭起來的？"]], "enTitle": "The Day You Graduate, Sport Ends: The APE–Adapted Sport Gap", "enSummary": "A graduating student with CP who found badminton through three years of adapted PE has nowhere to play after graduation. Ministries point at each other, the transition plan has no 'sport' field, and 'lifelong physical activity' dies at the school gate.", "enScenario": ["Ting-yu, a senior with spastic cerebral palsy at Chiahua High School in Chiayi, went from avoiding exercise to becoming a regular in the badminton club — even reaching the intramural quarterfinals — thanks to three years of course adaptations by his PE teacher, Ms. Wu. At the graduation-transition IEP meeting, his mother asks one question: “After he graduates, where does he go to keep playing?” The room falls silent for several seconds. Ms. Wu knows only of a wheelchair table-tennis team in the city; the transition plan's fields cover further study, employment and daily living — there is no field for “sport.”", "After the meeting, Ms. Wu does her homework: the county's disability sports resource center runs mostly elder-oriented, rehabilitation-style programs; the badminton association's gym “welcomes everyone in principle” but has no coach who has ever worked with a player with CP; the school asks the county sports office, which says disability sport is the central sports ministry's business; the ministry's contact window says a student still in school belongs to the education side. At the class reunion six months after graduation, Ting-yu tells Ms. Wu he has not picked up a racket since. She remembers the course goal she wrote for him in his first year: “develop lifelong exercise habits.”"], "after": ["「終身運動習慣」的斷點不在定宇身上：你的答案有沒有指認制度環節——轉銜欄位、跨部會窗口、社區教練量能？", "APE 與適應運動是同一條光譜：你的搭橋行動有沒有在畢業之前就啟動（社區試訪、共同訓練、交接文件）？", "問責三問：誰辨識需求、誰提供服務、都找不到時誰負責回答——你的方案回答了哪一問？"]}, {"no": 28, "title": "背對場地的助手", "enTitle": "The Assistant Who Must Face Away", "enSummary": "In a class bocce tournament, the student assisting a classmate with severe physical disability keeps peeking at the court and nudging the ramp. The opposing team protests. The official rule — assistants face away from the field — turns out to be a whole philosophy of helping, written into sport law.", "cat": "融合經驗與同儕支持", "source": "議題探究", "reading": "搭配閱讀：帕拉運動教育單元第 4 節（地板滾球）；同儕指導訓練包「協助不是代勞」。", "scenario": ["班際地板滾球賽，重度肢體障礙的阿德用斜坡出球，同學小威擔任他的協助員：扶斜坡、放球。比到關鍵一局，小威越幫越起勁，一邊瞄場上一邊悄悄把斜坡往左挪了兩公分。對隊立刻抗議：「這球是誰打的？」", "老師拿出正式規則：在帕拉地板滾球裡，協助員必須全程背對場地，不得觀看戰局，只能依選手的指令操作。小威很委屈：「我是在幫他贏耶。」阿德沉默了一下，說了一句讓全班安靜下來的話：「你幫我贏的那一球，就不是我的球了。」"], "enScenario": ["In the class bocce tournament, A-de, who has a severe physical disability, releases the ball down a ramp, with classmate Hsiao-wei as his assistant: steadying the ramp, placing the ball. At match point, Hsiao-wei gets carried away — glancing at the court, he quietly nudges the ramp two centimeters to the left. The opposing team protests instantly: \"Whose shot was that?\"", "The teacher brings out the official rule: in Paralympic boccia, the assistant must face away from the field at all times, may not watch the play, and acts only on the athlete's instructions. Hsiao-wei is hurt: \"I was helping him win.\" A-de is quiet for a moment, then says the sentence that silences the room: \"The shot you helped me win is no longer my shot.\""], "uni": ["「協助員必須背對場地」這條規則在保護什麼？把它保護的東西說到最具體。", "小威的錯誤跟「熱心」有什麼關係？善意在什麼時刻越過了界線？", "阿德那句「就不是我的球了」，說的是輸贏還是別的東西？", "把這條規則翻譯到日常：同儕協助寫作業、推輪椅、點餐時，「背對場地」的等價原則是什麼？"], "uniAct": ["體驗活動：兩人一組玩背對場地的斜坡出球（紙箱斜坡即可），操作員只能聽指令。事後記錄「最想回頭看的那一刻」，那就是代勞的衝動。", "規則轉譯：為班級的同儕協助訂三條「背對場地式」守則（聽指令、先詢問、不代決），貼在教室。"], "grad": [["Boccia's assistant rule is a rare case of anti-paternalism codified into sport law: autonomy is protected by structurally blinding the helper. Analyze this design and identify one other setting (education, rehabilitation, guardianship) where an equivalent structural safeguard could be engineered.", "地板滾球的協助員規則是「反家長主義被寫進運動規則」的罕見例子：用結構性的「看不見」來保護自主。請分析這個設計，並找出另一個場域（教育、復健、監護）可以工程化等價防線的例子。"], ["Assistance that improves outcomes but transfers decision-making is efficient and corrosive at once. Using self-determination constructs, explain why athletes may rationally prefer worse outcomes that remain their own.", "能改善結果、卻轉移了決定權的協助，同時是高效的與腐蝕性的。請用自我決定的構念解釋：為什麼選手可能理性地偏好「比較差、但屬於自己」的結果？"]], "gradTask": ["以本案為引，撰寫一頁「協助的界線」工作坊教案（40 分鐘）：背對場地體驗、阿德語錄討論、日常轉譯三守則，附評量方式。"], "guide": ["先讓小威被理解：他沒有惡意，他只是把「幫他」預設成「幫他贏」。這個預設正是整個單元要拆的東西。", "阿德的話是課眼：所有權（ownership）比結果重要。可以追問全班：你願意用「自己輸」換「被幫著贏」嗎？什麼時候願意、什麼時候不願意？", "與同儕指導訓練包並用時，這一案是「制度版」：訓練包教的是個人修養（先問、不代勞），本案展示規則如何把修養變成不可違反的結構。"]}, {"no": 29, "title": "全班都矇上眼睛之後", "enTitle": "After the Whole Class Puts On Blindfolds", "enSummary": "A PE teacher runs a goalball unit with every student blindfolded, and a parent complains it's a gimmick that mocks blindness. The teacher's defense hinges on a distinction most people have never made: simulating disability versus learning a sport on equal terms.", "cat": "課程與教學設計", "source": "議題探究", "reading": "搭配閱讀：帕拉運動教育單元第 5 節（感官取向帕拉運動）與第 6 節（反向整合）；本平台個案 22（失能模擬）。", "scenario": ["體育課上盲人門球單元，全班統一戴上遮眼罩，靠鈴鐺球的聲音防守進攻。學生玩得投入，影片傳到班級群組後，一位家長來電投訴：「讓看得見的孩子矇眼睛在地上滾，這不是在消費視障者嗎？跟之前說不好的『失能體驗』有什麼兩樣？」", "老師沒有急著辯解，先承認這個質疑有一半是對的：如果這堂課的目標是「體驗看不見有多辛苦」，那它確實就是失能模擬。但她的教案寫的是另一件事：學會一項正式運動的技術：聽聲辨位、橫身封擋、三人聯防。遮眼不是為了體驗損失，是這項運動的比賽條件，全班戴上它，是為了讓所有人站上同一個起跑線。「我們不是在扮演視障者，我們在打視障者的運動。這項運動，恰好人人平等。」"], "enScenario": ["In the goalball unit, the entire class wears blindfolds, attacking and defending by the sound of the belled ball. The students are absorbed; then a video reaches the class group chat and a parent calls to complain: \"Making sighted kids roll around blindfolded — isn't that mocking blind people? How is this different from those disability simulations you said were bad?\"", "The teacher doesn't rush to defend herself. She first concedes that half the objection is right: if the lesson's goal were to experience how hard it is to be blind, it would indeed be a disability simulation. But her lesson plan says something else: learning the techniques of a real sport — locating by sound, full-body blocking, three-player defense. The blindfold is not there to simulate loss; it is the sport's condition of play, and when the whole class wears it, everyone stands on the same starting line. \"We are not playing at being blind. We are playing a blind sport. And this sport happens to make everyone equal.\""], "uni": ["「失能模擬」和「打視障者的運動」差在哪裡？用課程目標、活動結構、事後感想三個層面比較。", "同樣是遮眼，為什麼一個被批評、一個被辯護？關鍵變項是什麼？", "家長的投訴合理嗎？如果影片配的文字是「體驗視障者的辛苦」，老師的辯護還成立嗎？", "「反向整合」（非障礙者參與身障運動）為什麼能創造平等互動？它跟「讓他也玩一下」的融合差在哪？"], "uniAct": ["教案體檢：拿一份「障礙體驗活動」教案，用本案的判準（目標、結構、感想引導）判定它是模擬還是運動學習，提出修改。", "感想對比：goalball 課後收集學生心得，分類統計「原來他們好辛苦」與「這運動好難好好玩」兩類比例，討論這個比例反映教學設計的什麼。"], "grad": [["Disability simulation research documents pity and distancing effects, while reverse integration claims equal-status contact. Specify the design features (goal framing, competence experience, duration, debrief) that theoretically flip an activity from one to the other, and design a study to test the boundary.", "失能模擬研究記錄了憐憫與疏離效應，反向整合則宣稱平等地位的接觸。請指出理論上讓活動從一端翻到另一端的設計特徵（目標框架、勝任經驗、時長、事後引導），並設計一個檢驗這條界線的研究。"], ["The teacher's defense rests on the sport's own integrity: goalball is a sport, not an empathy device. Discuss the risks when Para sports are imported into schools primarily as attitude-change tools, drawing on the concern that instrumentalizing a sport erases its athletes.", "老師的辯護立基於這項運動自身的完整性：門球是運動，不是同理心教具。請討論帕拉運動被學校主要當成「態度改變工具」引進時的風險，包含「工具化一項運動會抹除它的運動員」這層顧慮。"]], "gradTask": ["撰寫一頁「帕拉運動單元的家長說明書」：一段課程目標、一段與失能體驗的區別、一段孩子會學到的具體技術，語言以家長第一次讀就懂為標準。"], "guide": ["本案是個案 22（失能模擬）的鏡像題：22 教「這樣做有問題」，本案教「怎樣做沒問題」。兩案並排，學生才不會學成「遮眼＝禁忌」的教條。", "判準可以收斂成一句：活動結束時，學生記得的是「他們的辛苦」還是「這項運動的技術」？前者是模擬，後者是運動學習。", "老師「先承認一半」的回應方式本身就是教材：面對再現爭議，防衛升高衝突，區分才能對話。可讓學生演練這段家長電話。"]}, {"no": 30, "title": "用英語上的融合課", "enTitle": "An Inclusive PE Class, Taught in English", "enSummary": "Bilingual policy arrives in PE: the observed class must run in English. But one student's IEP specifies simplified Mandarin instructions with visual cues. When policy language and support language collide, whose class is it?", "cat": "課程與教學設計", "source": "臺灣在地議題", "reading": "搭配閱讀：學習落後者之雙語教學策略（潘正宸，2022，運動百靈果 Bilingual-PE）；同儕指導訓練包之中英對照句型。", "scenario": ["學校推雙語課程，體育課被選為觀課場次，行政的期待很明確：課堂用語以英語為主。班上的自閉症學生小安，IEP 裡白紙黑字寫著：指令需簡化、搭配視覺提示、使用他熟悉的中文關鍵詞。", "觀課那天，老師全程英語，小安從第二個活動開始就跟不上，站在原地轉圈。課後檢討會上出現兩種聲音：委員說「雙語量能還可以再提升」；特教老師則指著 IEP 問：「這份文件在這堂課裡，效力排第幾？」老師夾在中間，其實她知道一套做法：關鍵指令雙語並置、手勢與圖卡本來就是跨語言的、同儕小老師可以用中文複述。但觀課的評分表上，沒有任何一格叫做「為誰調整了語言」。"], "enScenario": ["The school rolls out bilingual education, and PE is chosen for a formal observation; the administration's expectation is explicit: classroom language primarily in English. In the same class is Hsiao-an, an autistic student whose IEP states in black and white: simplified instructions, visual cues, familiar Mandarin keywords.", "On observation day the teacher goes full English. By the second activity Hsiao-an has lost the thread and stands spinning in place. At the debrief, two voices emerge: the committee notes \"room to increase bilingual delivery,\" while the special educator points at the IEP and asks, \"Where does this document rank in that classroom?\" The teacher, caught in between, actually knows a workable playbook: key commands doubled in both languages, gestures and picture cards that cross any language, a peer tutor repeating in Mandarin. But the observation rubric has no box labeled \"adapted language for whom.\""], "uni": ["EMI 政策與 IEP 在這堂課裡各自要求什麼？衝突是真衝突，還是執行方式造成的假衝突？", "「手勢與圖卡是跨語言的」這句話對雙語體育課意味著什麼機會？", "觀課評分表沒有「為誰調整語言」這一格，會如何形塑老師的課堂決策？", "替這位老師設計下一堂雙語融合課的語言配置：哪些話用英語、哪些雙語並置、哪些保留中文？"], "uniAct": ["句型工具箱：從同儕指導訓練包的中英對照句型出發，為一個體育單元做一頁「雙語指令卡」（英語句＋中文關鍵詞＋手勢圖）。", "評分表增修：替雙語觀課評分表草擬兩個新指標，讓「語言的可及性」被看見與計分。"], "grad": [["EMI research warns of content loss for lower-proficiency learners; UDL argues multimodal representation benefits all. Synthesize the two literatures into design principles for bilingual PE that treats language itself as a dimension requiring universal design.", "EMI 研究警告低語言能力學習者的內容折損；UDL 主張多模態表徵惠及全班。請把兩批文獻整合成雙語體育課的設計原則，把語言本身當成需要通用設計的向度。"], ["When two legal-institutional documents (a language policy and an IEP) issue conflicting instructions to one classroom, how should priority be theorized? Discuss with reference to the hierarchy of rights protection versus administrative initiatives.", "當兩份制度文件（語言政策與 IEP）對同一間教室發出衝突指令，優先性該如何理論化？請從「權利保障」與「行政倡議」的位階差異討論。"]], "gradTask": ["撰寫一頁「雙語適應體育教學指引」草案：三個分層（全英語可行、雙語並置、必須母語）的判斷準則與示例句，供全校體育科使用。"], "guide": ["先立住一個事實：IEP 是具法律效力的個別化文件，行政倡議不能凌駕。但別讓討論停在位階，重點是兩者其實可以同時滿足。", "「評分表沒有那一格」是制度細節裡的魔鬼：評什麼，老師就教什麼。改一張表，比十次宣導有效。", "小安轉圈的畫面提醒：語言也是一種可及性。無障礙不只坡道與字幕，還包含「聽得懂今天要做什麼」。"]}, {"no": 31, "title": "拿體育課去換治療", "enTitle": "Trading PE for Therapy", "enSummary": "A physical therapist can only come during third period — which is PE. The school says fine: he's getting rehab, that covers it. One document quietly disagrees: the curriculum, which lists learning outcomes no therapy session teaches.", "cat": "制度、政策與證據", "source": "臺灣在地議題", "reading": "搭配閱讀：APA 疆域開場三節（APE 是教育的一支）；推動適應運動之政策與實務指南。", "scenario": ["腦性麻痺的宇軒每週有一次物理治療，治療師能到校的時段只有星期三第三節，正好是體育課。行政的安排順理成章：「反正他體育課也做不了什麼，去復健剛好。」家長也同意：治療看得到進步，體育課看不到。", "只有特教老師在會議上提出異議。她把課綱攤開：體育課有它的學習目標：動作技能、規則理解、團隊參與，這些是教育目標，物理治療一項都不教。「復健讓他的身體更有能力，體育課教他用這個身體去學習與生活。用治療換掉體育課，等於宣告他只需要被修理，不需要被教育。」會議室安靜了幾秒，行政問了一個誠實的問題：「可是治療師真的只有那個時段，你要我怎麼辦？」"], "enScenario": ["Yu-hsuan, who has cerebral palsy, receives physical therapy once a week. The therapist's only available slot is Wednesday third period — exactly PE. The administration's arrangement seems natural: \"He can't do much in PE anyway; rehab is a perfect swap.\" His parents agree: therapy shows progress, PE doesn't.", "Only the special educator objects. She lays the curriculum on the table: PE has its own learning outcomes — motor skills, rule comprehension, team participation. These are educational goals, and physical therapy teaches none of them. \"Rehab makes his body more capable. PE teaches him to use that body to learn and to live. Swapping PE for therapy declares that he only needs fixing, not educating.\" The room is silent for a few seconds. Then the administrator asks an honest question: \"But the therapist really only has that slot. What do you want me to do?\""], "uni": ["物理治療和體育課的目標各是什麼？列成兩欄，找出「治療不教、只有體育課教」的三件事。", "「反正他體育課也做不了什麼」這句話透露了什麼？問題出在孩子，還是出在那堂課的設計？", "家長「治療看得到進步」的判斷怎麼來的？體育課的進步為什麼比較難被看見？這能改變嗎？", "行政的問題是誠實的：時段真的衝突。請提出至少三種不犧牲體育課的排法。"], "uniAct": ["目標對照表：訪談或查閱資料，完成「物理治療 vs 適應體育」目標對照表（各五項），標出零重疊區。", "排課實作：拿一張真實的週課表，練習安排每週一次到校治療而不動體育課，寫出你動了什麼、跟誰協調。"], "grad": [["The therapy-education boundary echoes the medical versus social-educational model divide. Analyze why related services in special education law are defined as supporting access to education, not replacing it, and what this implies for scheduling authority.", "治療與教育的邊界呼應醫療模式與社會教育模式的分野。請分析特殊教育法制中「相關服務」為何被定義為支持而非取代教育，這對排課的權限意味著什麼。"], ["The parents' preference for visible therapeutic gains over invisible educational ones is an evidence-legibility problem. How should adapted PE make its outcomes legible to families without reducing education to measurable fragments?", "家長偏好「看得見的治療進步」勝過「看不見的教育收穫」，是證據可讀性的問題。適應體育該如何讓成果對家庭可讀，又不把教育化約成可測量的碎片？"]], "gradTask": ["草擬一份「到校治療排課原則」給特推會：治療不得固定取代同一門課、輪替機制、家長溝通說明範本，各附一句理由。"], "guide": ["核心區分一句話：復健修理身體，教育使用身體。兩者都重要，所以誰也不能吃掉誰。", "「反正他也做不了什麼」值得回馬槍：如果體育課真的讓他無事可做，該修的是課，不是把他送走。這一案跟課程設計類的個案是同一枚硬幣。", "行政的兩難要認真接：資源稀缺是真的。好答案不是譴責，是輪替設計＋讓體育課的價值被看見，讓「換掉它」不再是最省事的選項。"]}]};
const MODE = "zh";
const KEY = "ape_"+MODE+"_";
const CATS = DATA.cats, CC = DATA.catColor;
const CHECKS = ["我引用了情境中的具體證據","我指出了可檢驗的主張或隱含假設","我考慮了缺席者的聲音"];
let filter = "";
const C = c => "#"+CC[c];
const CATEN={"課程與教學設計":"Curriculum & Instructional Design","評估與個別化文件":"Assessment & Individualized Documentation","融合經驗與同儕支持":"Inclusion Experiences & Peer Support","專業協作與支持人力":"Professional Collaboration & Support Personnel","態度與社會再現":"Attitudes & Social Representation","制度、政策與證據":"Systems, Policy & Evidence"};
const SRCEN={"臺灣在地議題":"Taiwan-specific issue","議題探究":"Issue deep-dive"};
const L = t => MODE==="en" ? (CATEN[t]||SRCEN[t]||t) : t;

function store(no){ try{return JSON.parse(localStorage.getItem(KEY+no)||"{}")}catch(e){return{}} }
function save(no,o){ localStorage.setItem(KEY+no, JSON.stringify(o)); }
function answered(no){ const s=store(no); return Object.values(s.a||{}).filter(v=>v&&v.trim().length>=15).length; }
function isDone(no){ const s=store(no); return (s.second||"").trim().length>=15; }
function esc(t){ return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

function renderHome(){
  const chips=document.getElementById("chips"); chips.innerHTML="";
  const mk=(label,val)=>{const b=document.createElement("button");b.className="chip"+(filter===val?" on":"");
    if(filter===val){const col=val?C(val):"#3a4652";b.style.background=col;b.style.borderColor=col;}
    b.textContent=label;b.onclick=()=>{filter=val;renderHome();};chips.appendChild(b);};
  mk("全部",""); CATS.forEach(c=>mk(L(c),c));
  const kw=(document.getElementById("q").value||"").trim().toLowerCase();
  const g=document.getElementById("grid"); g.innerHTML="";
  let prog=0, stars=0;
  DATA.cases.forEach(c=>{
    if(isDone(c.no)) stars++; else if(answered(c.no)>0) prog++;
    if(filter && c.cat!==filter) return;
    const hay=(c.title+" "+(c.enTitle||"")+" "+c.cat+" "+c.scenario.join(" ")).toLowerCase();
    if(kw && !hay.includes(kw)) return;
    const col=C(c.cat);
    const badge = isDone(c.no)? '<span class="star">★ 完成</span>' : (answered(c.no)>0? '<span class="done">✓ '+answered(c.no)+'</span>' : '');
    const el=document.createElement("div"); el.className="card";
    el.innerHTML='<div class="ribbon" style="background:'+col+'"></div><div class="inner">'
      +'<span class="no" style="background:'+col+'">個案 '+c.no+'</span>'
      +'<h3>'+(MODE==="en"?c.enTitle:c.title)+'</h3>'
      +'<div class="src"><span>'+L(c.cat)+'</span>'+badge+'</div></div>';
    el.onclick=()=>openCase(c.no); g.appendChild(el);
  });
  const total=DATA.cases.length;
  document.getElementById("prog").textContent=stars+" ★ · "+prog+" ✓ · "+total+" 個案";
  document.getElementById("pfill").style.width=((stars+prog*0.5)/total*100)+"%";
  document.getElementById("statdone").textContent=prog+stars;
  document.getElementById("statstar").textContent=stars;
}

function stepBar(no){
  const s=store(no);
  const st=[true,(s.first||"").trim().length>=15, answered(no)>0, isDone(no)];
  const names=["讀情境","寫下第一判斷","作答與自評","對照後修訂"];
  return '<div class="steps">'+names.map((n,i)=>'<div class="step'+(st[i]?' on':'')+'"><b>'+(i+1)+'</b>'+n+'</div>').join('')+'</div>';
}

function openCase(no){
  const c=DATA.cases.find(x=>x.no===no);
  const s=store(no); s.a=s.a||{}; s.chk=s.chk||{};
  const col=C(c.cat);
  let h='<div class="casebar"><button class="btn ghost" onclick="goHome()">← 回列表</button><span class="save" id="sv">已儲存 ✓</span></div>';
  h+='<div class="casehead" style="background:linear-gradient(135deg,'+col+'ee,'+col+'99)">'
    +'<div class="kicker">個案 '+c.no+'　·　'+L(c.cat)+(c.source?'　·　'+L(c.source):'')+'</div>'
    +'<h1>'+(MODE==="en"?c.enTitle:c.title)+'</h1>'
    +'</div>';
  h+='<div id="stepbar">'+stepBar(no)+'</div>';
  if(c.reading) h+='<div class="reading" style="border-left-color:'+col+'">'+c.reading+'</div>';
  if(MODE==="en"){
    h+='<div class="sec" style="color:'+col+'"><h2>SCENARIO</h2><div class="story" style="color:var(--ink)">'
      +c.enScenario.map(p=>'<p>'+p+'</p>').join('')
      +'</div><details><summary>中文原文</summary><div class="story" style="color:var(--ink)">'+c.scenario.map(p=>'<p>'+p+'</p>').join('')+'</div></details></div>';
  } else {
    h+='<div class="sec" style="color:'+col+'"><h2>個案情境</h2><div class="story" style="color:var(--ink)">'+c.scenario.map(p=>'<p>'+p+'</p>').join('')+'</div></div>';
  }
  h+='<div class="sec" style="color:'+col+'"><h2>第二步：寫下你的第一判斷</h2><div style="color:var(--ink)"><div class="fourq">批判性思考四問　① 主張是什麼？可檢驗嗎　② 證據是什麼？品質如何　③ 隱含什麼假設？　④ 誰的聲音缺席？</div>'
    +'<p style="font-size:.87rem;color:var(--sub);margin-bottom:10px">先別看題目——用三到五句話寫下：你認為問題出在哪？誰該負責？（寫滿 15 字解鎖討論題。之後你會回來修訂它。）</p>'
    +'<textarea id="first" oninput="onFirst('+no+')">'+esc(s.first)+'</textarea></div></div>';
  const qs = MODE==="en"? c.grad : c.uni;
  h+='<div class="sec" style="color:'+col+'"><h2>第三步：討論題（作答後用檢核清單自評）</h2><div style="color:var(--ink)"><div id="ln"></div><div id="qwrap">';
  qs.forEach((q,i)=>{
    const en=Array.isArray(q)?q[0]:q, zh=Array.isArray(q)?q[1]:null;
    h+='<div class="q" id="q'+i+'"><div class="qt"><span class="qnum" style="background:'+col+'">'+(i+1)+'</span>'+en+'</div>';
    if(MODE==="en"&&zh) h+='<button class="togglezh" onclick="document.getElementById(\'q'+i+'\').classList.toggle(\'showzh\')">中文對照</button><div class="zh">'+zh+'</div>';
    h+='<textarea oninput="onAns('+no+','+i+',this)">'+esc(s.a[i])+'</textarea>';
    h+='<div class="checks" id="chk'+i+'">'+CHECKS.map((t,j)=>{
      const on=(s.chk[i]||[])[j];
      return '<label class="'+(on?'ok':'')+'"><input type="checkbox" '+(on?'checked':'')+' onchange="onChk('+no+','+i+','+j+',this)">'+t+'</label>';
    }).join('')+'</div></div>';
  });
  h+='</div></div></div>';
  const extra = MODE==="en"? c.gradTask : c.uniAct;
  if(extra) h+='<div class="sec act" style="color:'+col+'"><h2>課堂活動構想</h2><div style="color:var(--ink)">'+extra.map(t=>'<p>'+t+'</p>').join('')+'</div></div>';
  const fb = c.guide || c.after;
  if(fb) h+='<div class="sec aft" style="color:'+col+'"><h2>第四步：對照要點（先想，再看）</h2><div style="color:var(--ink)"><div id="gln"></div><div id="gwrap">'+fb.map(t=>'<p style="border-left-color:'+col+'">'+t+'</p>').join('')+'</div></div></div>';
  h+='<div class="sec" style="color:'+col+'"><h2>第五步：修訂你的判斷</h2><div style="color:var(--ink)"><div id="sln"></div><div id="swrap">'
    +'<p style="font-size:.87rem;color:var(--sub);margin-bottom:10px">對照要點之後，回看你在第二步寫的第一判斷：你的立場改變了嗎？哪裡變了、為什麼？寫下修訂版（15 字以上，本案即標記完成 ★）。</p>'
    +'<textarea id="second" oninput="onSecond('+no+')">'+esc(s.second)+'</textarea></div></div></div>';
  if(c.refs) h+='<div class="sec refs" style="color:'+col+'"><h2>延伸文獻（點標題開啟）</h2><ul style="padding-left:18px;color:var(--ink)">'+c.refs.map(r=>'<li><a href="'+r[1]+'" target="_blank">'+r[0]+'</a><br><span style="color:var(--sub)">'+r[2]+'</span></li>').join('')+'</ul></div>';
  h+='<div class="navnext">'+(no>1?'<button class="btn ghost" onclick="openCase('+(no-1)+')">← 個案 '+(no-1)+'</button>':'<span></span>')
    +(no<DATA.cases.length?'<button class="btn" style="background:'+col+'" onclick="openCase('+(no+1)+')">個案 '+(no+1)+' →</button>':'<span></span>')+'</div>';
  document.getElementById("case").innerHTML=h;
  document.getElementById("home").classList.add("hide");
  document.getElementById("case").classList.add("show");
  window.scrollTo(0,0); applyLocks(no);
}
function goHome(){ document.getElementById("home").classList.remove("hide"); document.getElementById("case").classList.remove("show"); renderHome(); window.scrollTo(0,0); }
function flash(){ const el=document.getElementById("sv"); el.classList.add("on"); clearTimeout(window._ft); window._ft=setTimeout(()=>el.classList.remove("on"),1200); }
function refreshSteps(no){ document.getElementById("stepbar").innerHTML=stepBar(no); }
function onFirst(no){ const s=store(no); s.first=document.getElementById("first").value; save(no,s); flash(); applyLocks(no); }
function onAns(no,i,el){ const s=store(no); s.a=s.a||{}; s.a[i]=el.value; save(no,s); flash(); applyLocks(no); }
function onChk(no,i,j,el){ const s=store(no); s.chk=s.chk||{}; s.chk[i]=s.chk[i]||[]; s.chk[i][j]=el.checked; save(no,s); el.parentElement.classList.toggle("ok",el.checked); flash(); }
function onSecond(no){ const s=store(no); s.second=document.getElementById("second").value; save(no,s); flash(); applyLocks(no); }
function applyLocks(no){
  const s=store(no);
  const okFirst=(s.first||"").trim().length>=15;
  const qwrap=document.getElementById("qwrap"), ln=document.getElementById("ln");
  if(qwrap){ qwrap.classList.toggle("locked",!okFirst); ln.innerHTML=okFirst?"":'<div class="lockcard">🔒<div>請先在上方寫下你的第一判斷（至少 15 字）——先有立場，再被挑戰。</div></div>'; }
  const okQ=answered(no)>=1;
  const gwrap=document.getElementById("gwrap"), gln=document.getElementById("gln");
  if(gwrap){ gwrap.classList.toggle("locked",!okQ); gln.innerHTML=okQ?"":'<div class="lockcard">🔒<div>至少完整回答一題討論題（15 字以上）才能解鎖對照要點——先想，再看。</div></div>'; }
  const swrap=document.getElementById("swrap"), sln=document.getElementById("sln");
  if(swrap){ swrap.classList.toggle("locked",!okQ); sln.innerHTML=okQ?"":'<div class="lockcard">🔒<div>完成至少一題作答並看過對照要點後，回來這裡修訂你的判斷。</div></div>'; }
  refreshSteps(no);
}
function exportNotes(){
  let md="# 適應體育批判性思考個案・自學平台 — 我的筆記\n\n";
  DATA.cases.forEach(c=>{
    const s=store(c.no); if(!s.first && !Object.values(s.a||{}).some(v=>v&&v.trim()) && !s.second) return;
    md+="## 個案 "+c.no+"｜"+(MODE==="en"?c.enTitle:c.title)+"\n\n";
    if(s.first) md+="### 第二步：寫下你的第一判斷\n"+s.first+"\n\n";
    const qs=MODE==="en"?c.grad:c.uni;
    qs.forEach((q,i)=>{ const t=Array.isArray(q)?q[0]:q;
      if(s.a&&s.a[i]&&s.a[i].trim()){
        md+="### Q"+(i+1)+". "+t+"\n\n"+s.a[i]+"\n\n";
        const ck=(s.chk&&s.chk[i])||[]; const done=CHECKS.filter((x,j)=>ck[j]);
        if(done.length) md+="自評通過: "+done.join("；")+"\n\n";
      }});
    if(s.second) md+="### 第五步：修訂你的判斷\n"+s.second+"\n\n";
  });
  const blob=new Blob([md],{type:"text/markdown"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="適應體育個案筆記.md"; a.click();
}
renderHome();
const _mh=location.hash.match(/case-(\d+)/);
if(_mh){const _n=parseInt(_mh[1]);if(DATA.cases.some(c=>c.no===_n))openCase(_n);}
