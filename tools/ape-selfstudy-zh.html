<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>適應體育批判性思考個案・自學平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
<style>
:root{--ink:#16202b;--sub:#5b6773;--faint:#8b97a3;--bg:#f2f4f7;--card:#fff;--line:#e5e9ee;--acc:#1F4E79;
--shadow-s:0 1px 2px rgba(22,32,43,.06),0 1px 3px rgba(22,32,43,.08);
--shadow-m:0 8px 24px rgba(22,32,43,.10),0 2px 6px rgba(22,32,43,.06);--r:16px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.85;-webkit-font-smoothing:antialiased}
.hero{background:linear-gradient(135deg,#173F63 0%,#1F4E79 45%,#0F766E 100%);position:relative;overflow:hidden;color:#fff;padding:54px 20px 46px;text-align:center}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 15% 20%,rgba(255,255,255,.10),transparent 42%),radial-gradient(circle at 85% 75%,rgba(255,255,255,.08),transparent 40%)}
.hero h1{position:relative;font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(1.5rem,4.5vw,2.3rem);letter-spacing:.04em;margin-bottom:10px}
.hero .sub{position:relative;font-size:.95rem;opacity:.92;max-width:640px;margin:0 auto 26px}
.stats{position:relative;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.14);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:10px 22px;min-width:104px}
.stat b{display:block;font-size:1.5rem;font-weight:900;line-height:1.2}
.stat span{font-size:.72rem;opacity:.85;letter-spacing:.08em}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px 40px}
.controls{display:flex;flex-direction:column;gap:14px;margin:-30px auto 22px;position:relative;z-index:2;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-m);padding:18px}
.rowsplit{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:12px;padding:9px 14px;background:#fafbfc}
.search input{border:none;outline:none;background:none;font:inherit;width:100%;font-size:.92rem}
.pbar{height:8px;border-radius:99px;background:#e9edf1;overflow:hidden;flex:1;min-width:140px}
.pbar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#1F4E79,#0F766E);transition:width .5s ease}
.pmeta{font-size:.8rem;color:var(--sub);white-space:nowrap}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:6px 15px;font-size:.83rem;cursor:pointer;font-weight:500;color:var(--sub);transition:all .15s}
.chip:hover{border-color:var(--faint)}
.chip.on{color:#fff;box-shadow:var(--shadow-s)}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:12px;padding:9px 20px;font:inherit;font-size:.88rem;font-weight:700;cursor:pointer;background:var(--acc);color:#fff;box-shadow:var(--shadow-s);transition:transform .12s,box-shadow .12s}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-m)}
.btn.ghost{background:#fff;color:var(--acc);border:1.5px solid var(--acc)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card{background:var(--card);border-radius:var(--r);cursor:pointer;box-shadow:var(--shadow-s);overflow:hidden;transition:transform .16s,box-shadow .16s;border:1px solid var(--line)}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-m)}
.card .ribbon{height:5px}
.card .inner{padding:15px 16px 14px}
.card .no{font-weight:900;font-size:.72rem;color:#fff;border-radius:7px;padding:2px 9px;display:inline-block;letter-spacing:.06em}
.card h3{font-size:.97rem;line-height:1.55;margin:9px 0 8px;font-weight:700}
.card .src{font-size:.73rem;color:var(--faint);display:flex;justify-content:space-between;align-items:center}
.card .done{color:#15803D;font-weight:900;font-size:.85rem}
.card .star{color:#B45309;font-weight:900;font-size:.85rem}
.case{display:none;animation:fadein .35s ease}
.case.show{display:block}
.home.hide{display:none}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.casebar{position:sticky;top:0;z-index:5;background:rgba(242,244,247,.92);backdrop-filter:blur(8px);display:flex;justify-content:space-between;align-items:center;padding:10px 0;margin-bottom:6px}
.save{font-size:.78rem;color:#15803D;font-weight:700;opacity:0;transition:opacity .4s}
.save.on{opacity:1}
.casehead{border-radius:var(--r);color:#fff;padding:26px 24px;margin-bottom:14px;box-shadow:var(--shadow-m);position:relative;overflow:hidden}
.casehead::after{content:"";position:absolute;right:-30px;top:-30px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.10)}
.casehead .kicker{font-size:.78rem;letter-spacing:.12em;opacity:.9;font-weight:700;margin-bottom:8px}
.casehead h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(1.15rem,3.2vw,1.6rem);line-height:1.55}
.casehead .meta{font-size:.8rem;margin-top:12px;opacity:.92}
.steps{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 14px}
.step{flex:1;min-width:120px;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:7px 10px;font-size:.74rem;color:var(--faint);display:flex;align-items:center;gap:6px}
.step b{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#e4e8ec;color:var(--sub);font-size:.7rem;flex:none}
.step.on{border-color:#15803D;color:#15803D;background:#F2FBF4}
.step.on b{background:#15803D;color:#fff}
.reading{font-size:.8rem;color:var(--sub);background:#fff;border:1px solid var(--line);border-left-width:5px;padding:10px 14px;margin:0 0 14px;border-radius:10px}
.sec{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;margin:16px 0;box-shadow:var(--shadow-s)}
.sec h2{font-size:.95rem;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:900}
.sec h2::before{content:"";width:8px;height:8px;border-radius:2px;background:currentColor;transform:rotate(45deg)}
.story p{margin-bottom:14px;text-align:justify;font-size:.97rem;line-height:2.0;color:#222c37}
.story p:first-of-type::first-letter{font-family:"Noto Serif TC",serif;font-size:2.6em;font-weight:900;float:left;line-height:1;padding:4px 8px 0 0}
details{margin-top:8px}
details summary{cursor:pointer;color:var(--sub);font-size:.85rem;font-weight:700}
details .story{margin-top:10px}
textarea{width:100%;min-height:96px;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font:inherit;font-size:.93rem;resize:vertical;background:#fafbfc;transition:border .15s,box-shadow .15s}
textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(31,78,121,.12);background:#fff}
.q{margin-bottom:24px}
.q .qt{font-weight:700;margin-bottom:8px;line-height:1.7}
.q .qnum{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:8px;color:#fff;font-size:.75rem;font-weight:900;margin-right:8px;vertical-align:2px}
.q .zh{color:var(--sub);font-size:.88rem;margin:6px 0 8px;display:none;background:#f6f8fa;border-radius:10px;padding:10px 14px}
.q.showzh .zh{display:block}
.togglezh{font-size:.75rem;border:1px solid var(--line);background:#fff;border-radius:99px;padding:3px 12px;cursor:pointer;color:var(--sub);margin-bottom:8px}
.checks{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.checks label{display:flex;align-items:center;gap:6px;font-size:.76rem;color:var(--sub);background:#f6f8fa;border:1px solid var(--line);border-radius:99px;padding:4px 12px;cursor:pointer;transition:all .15s}
.checks label.ok{background:#F2FBF4;border-color:#15803D;color:#15803D;font-weight:700}
.checks input{accent-color:#15803D}
.lockcard{border:1.5px dashed #d8b45a;background:#FFFBEF;color:#8a6d1a;border-radius:12px;padding:14px 16px;font-size:.87rem;display:flex;gap:10px;align-items:flex-start;margin-bottom:14px}
.locked{filter:blur(5px);pointer-events:none;user-select:none}
.fourq{font-size:.82rem;background:linear-gradient(135deg,#FFF8E7,#FDF3D8);border:1px solid #F0DFAE;border-radius:12px;padding:12px 16px;margin-bottom:14px;color:#7a5b12;line-height:1.9}
.aft p{background:#f6f8fa;border-left:4px solid currentColor;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:.9rem;color:#222c37}
.refs a{color:var(--acc);font-weight:500;text-decoration:none;border-bottom:1px solid rgba(31,78,121,.3)}
.refs li{margin-bottom:12px;font-size:.88rem;line-height:1.75}
.act p{background:#f6f8fa;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:.9rem}
.navnext{display:flex;justify-content:space-between;gap:10px;margin:22px 0}
footer{color:var(--faint);font-size:.75rem;text-align:center;padding:30px 16px}
@media(max-width:560px){.grid{grid-template-columns:1fr}.hero{padding:40px 16px 36px}.sec{padding:17px}}
@media print{.hero,.controls,.casebar,.btn,footer{display:none}.sec{box-shadow:none;border:1px solid #ccc}}
</style>
</head>
<body>
<div class="hero"><h1>適應體育批判性思考個案・自學平台</h1><div class="sub">31 個臺灣情境個案｜五步學習路徑：讀情境 → 寫判斷 → 作答自評 → 對照要點 → 修訂立場</div>
<div class="stats"><div class="stat"><b>31</b><span>個案</span></div><div class="stat"><b>6</b><span>分類</span></div><div class="stat"><b id="statdone">0</b><span>進行中＋完成</span></div><div class="stat"><b id="statstar">0</b><span>已完成 ★</span></div></div></div>
<div class="wrap">
<div id="home" class="home">
  <div class="controls">
    <div class="rowsplit"><div class="search">🔍 <input id="q" placeholder="搜尋個案（標題、內文、關鍵詞）…" oninput="renderHome()"></div>
    <button class="btn ghost" onclick="exportNotes()">⬇ 匯出筆記</button></div>
    <div class="rowsplit"><div class="pbar"><i id="pfill" style="width:0%"></i></div><span class="pmeta" id="prog"></span></div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="grid" id="grid"></div>
</div>
<div id="case" class="case"></div>
</div>
<footer>原創教材・筆記僅存於你自己的瀏覽器（localStorage），清除瀏覽資料前請先匯出</footer>
<script>
const DATA = {"cats": ["課程與教學設計", "評估與個別化文件", "融合經驗與同儕支持", "專業協作與支持人力", "態度與社會再現", "制度、政策與證據"], "catColor": {"課程與教學設計": "1F4E79", "評估與個別化文件": "0F766E", "融合經驗與同儕支持": "15803D", "專業協作與支持人力": "B45309", "態度與社會再現": "7E22CE", "制度、政策與證據": "B91C1C"}, "cases": [{"no": 1, "title": "三個框架，還是一條路徑？——師培生的 UDL、DI 與 STEP", "cat": "課程與教學設計", "source": "臺灣在地議題", "reading": "搭配閱讀：潘正宸、林靜萍、掌慶維（投稿中）。全方位課程設計、差異化教學與 STEP 調整在適應體育中的應用：敘事性文獻回顧。（未出版稿件，正式刊出後補書目）；Griful-Freixenet et al. (2020) 之 UDL 與 DI 系統性回顧；van Munster et al. (2019) 之體育課堂個案研究。", "scenario": ["師大體育系的適應體育課上，三個框架各占一週：第九週 UDL、第十週 DI、第十一週 STEP，各考一次小考。期末的融合式體育教案設計，師培生宇軒在「教學策略」欄位並列寫下「採用 UDL、DI 與 STEP」，實習指導的高老師只批了一行字：「這三個是什麼關係？你是同時用三套，還是其實只用了一套？」", "小組討論瞬間分裂成三派。佳穎說她讀到的文獻寫 DI 是落實 UDL 的具體策略，「所以寫 UDL 就夠了，DI 是它的一部分」；家豪反駁，UDL 是事前設計、DI 是事後反應，「兩個哲學根本衝突，選一個就好」；最資深的學長丟出一句：「你們去現場看看，老師們哪管這些——就是 STEP 改一改器材和場地，好用就好，UDL 那是寫計畫用的。」宇軒越聽越混亂：三種說法好像都有道理，但如果都對，他的教案到底該怎麼寫？高老師聽完三派爭論，在白板上畫了三條橫線，說：「你們吵的不是誰對誰錯——你們吵的是同一件事的三個樓層。下週上課前，把你們的排球教案拆開來，每一個教學決定標上它住在幾樓。」"], "uni": ["把你自己寫過的一份教案攤開：哪些決定是「設計單元時就做的」（如提供多種參與方式）？哪些是「上課中看狀況做的」（如臨時分組）？哪些是「改動作情境的」（如縮小場地、換輕量球）？三類決定分別對應哪個框架？", "佳穎（從屬說）、家豪（不相容說）、學長（現場實用說）各自站在哪個樓層看問題？用「課程設計—教學實施—活動調整」的層級重新描述，三派的衝突還存在嗎？", "學長說「STEP 好用就好，管它背後是什麼」——STEP 沒有上位理論支撐時，調整決策可能出什麼問題？（提示：想想「為一個人改」與「為全班設計」的差別，以及調整被學生經驗為分隔的風險。）", "臺灣體育課「全班做同一活動、用同一標準評量」的傳統，與哪個樓層的衝突最大？請舉一個具體例子說明這個張力如何在教案中被處理。"], "grad": [["Griful-Freixenet et al. (2020) found three competing interpretations of the UDL-DI relationship (complementary 37%, subordinate 48%, incompatible 15%). Pan et al. propose reframing these as differences in operational level rather than conceptual conflict. Evaluate this reframing: what does it resolve, and what might it obscure?", "Griful-Freixenet 等（2020）發現 UDL 與 DI 關係存在三種競爭性詮釋（互補 37%、從屬 48%、不相容 15%）。潘正宸等主張把三種詮釋重新定位為運作層次的差異而非概念衝突。請評價這個重構：它解決了什麼？又可能遮蔽了什麼？"], ["van Munster et al. (2019) observed that PE teachers most often adopted reactive DI approaches rather than proactive UDL design. Combined with STEP's near-absence from peer-reviewed research despite its dominance in practice, what does this reveal about the theory-practice translation gap in APE - and where should teacher education intervene in that gap?", "van Munster 等（2019）觀察到體育教師最常採取反應式的 DI 取向而非前瞻式的 UDL 設計。加上 STEP 在實務中最普及、在同儕審查文獻中卻近乎缺席，這揭示了適應體育理論—實務轉譯落差的什麼樣貌？師資培育應該介入這個落差的哪個位置？"], ["The hierarchical integration framework is explicitly a conceptual proposal awaiting empirical validation. Design a study testing whether teaching the three frameworks as an integrated hierarchy (versus as separate units) produces better instructional decision-making among preservice PE teachers. Specify outcomes, comparison conditions, and how you would measure decision quality.", "層級式整合架構明白宣告是待實證檢驗的概念性提議。請設計一個研究，檢驗「以整合層級教三框架」相對於「分開單元教」是否讓體育師培生做出更好的教學決策。請具體說明結果變項、比較條件，以及你如何測量決策品質。"], ["Wen and Cai (2024) identify growth mindset as the strongest predictor of DI implementation, mediated by flexible grouping and curriculum differentiation. What does this imply about the balance between technical training (frameworks, STEP skills) and belief change in PETE programs - and how would you design the belief-change component without it becoming indoctrination?", "Wen 與 Cai（2024）指出成長型心態是 DI 實施的最強預測因子，透過彈性分組與課程差異化產生中介效果。這對師培方案中「技術訓練（框架、STEP 技巧）」與「信念轉化」的配比有何意涵？你會如何設計信念轉化的成分、又不讓它變成灌輸？"]], "enTitle": "Three Frameworks or One Pathway? UDL, DI and STEP for Preservice Teachers", "enSummary": "A preservice PE student lists UDL, DI and STEP side by side in his lesson plan. Three classmates offer three conflicting accounts of how the frameworks relate, until the mentor reframes them as three floors of one building and asks the class to tag every instructional decision with the floor it lives on.", "enScenario": ["In the adapted physical education course at a teacher-education university in Taipei, the three frameworks each get one week: UDL in week nine, DI in week ten, STEP in week eleven — each with its own quiz. For the final inclusive-PE lesson-plan assignment, preservice student Yu-hsuan writes “UDL, DI and STEP” side by side in the teaching-strategies box. His practicum mentor, Ms. Kao, returns it with a single comment: “What is the relationship among these three? Are you actually using three systems at once — or really just one?”", "The group discussion immediately splits three ways. Chia-ying says the literature describes DI as the concrete strategy for implementing UDL — “so writing UDL is enough; DI is part of it.” Chia-hao objects: UDL is proactive design, DI is reactive adjustment — “the two philosophies conflict; pick one.” The most senior student throws in: “Go watch real classrooms. Teachers don't care about any of this — they just tweak equipment and space with STEP. Whatever works. UDL is for writing proposals.” Yu-hsuan is more confused than ever: all three sound reasonable, but if they are all right, how should he write his plan? Ms. Kao listens, draws three horizontal lines on the whiteboard, and says: “You are not arguing about who is right — you are arguing about three floors of the same building. Before next class, take your volleyball lesson plan apart and label every instructional decision with the floor it lives on.”"], "after": ["常見答案停在「三個都用」——關鍵是說出每個教學決定發生在哪一層：單元設計時（UDL）、課中回應差異時（DI）、改動作情境時（STEP）。", "檢查你有沒有把「從屬說／不相容說」當成對錯之爭：三派其實是站在不同樓層描述現象，層級化之後衝突大多消解。", "進階挑戰：你的教案裡有沒有一個決定其實橫跨兩層？層級是分析工具，不是鐵籠。", "還有一件三派都沒提到的事：他們吵的全是處方，沒有人問診斷。這個學生到底是在哪一步斷掉的？工作分析（把一個動作拆成一連串可觀察的行為）不是第四個框架，它是量尺，位在三個框架的下面。先診斷斷點，再決定要用 UDL 事前鋪好多條路，還是用 STEP 現場轉旋鈕。沒有診斷的調整，就是憑感覺調。"]}, {"no": 2, "title": "還不會單腳跳的孩子——小一動作評估之後", "cat": "課程與教學設計", "source": "", "reading": null, "scenario": ["臺北市文山區的萬芳國小一年級，芯瑜是個人緣極好的女孩，下課總是笑著追大家——只是總追不上。她跑步時手肘打直、全腳掌著地，單腳跳三下就失去平衡，接球時會把臉撇開。導師轉介後，學校安排了跨專業的動作評估，結論是明顯的粗大動作發展落後，尚未達特教鑑定門檻，建議「班級內支持並追蹤」。", "體育課由師培大學來的實習教師蘇柏宇負責大部分教學。蘇老師充滿熱情，把評估報告的每一項弱點都列成了「訓練菜單」，打算利用晨光時間幫芯瑜「補課」。指導的陳老師看了搖頭：「你把她當成一張缺陷清單了。她才七歲，最重要的是她還喜不喜歡動。」蘇老師很困惑：不針對弱點練習，落後要怎麼追上？"], "uni": ["「缺陷清單式」的訓練菜單有什麼問題？陳老師說「最重要的是她還喜不喜歡動」的理據是什麼？", "尚未達鑑定門檻、又明顯落後——這個灰色地帶的孩子在制度裡容易掉進什麼縫隙？班級內支持可以長什麼樣？", "請把「單腳跳、接球」的練習藏進全班都在玩的遊戲裡——設計兩個活動，說明芯瑜在其中得到什麼、其他孩子得到什麼。", "晨光時間一對一「補課」有什麼社會代價？什麼情境下個別練習仍是合理的？"], "grad": [["Early motor delay predicts later physical activity disengagement, with proficiency and perceived competence as mediating mechanisms (cf. Stodden's developmental model). Explain the model and its implications for intervening with Hsin-yu now versus later.", "早期動作落後預測日後身體活動的疏離，動作精熟度與知覺能力是中介機制（參考 Stodden 的發展模型）。請說明該模型及其對「現在介入 vs 以後介入」的意涵。"], ["Deficit-driven remediation and interest-driven mastery climates represent two intervention philosophies for young children with motor delays. Compare their evidence, and design a hybrid the intern could implement in morning sessions without stigmatizing the child.", "缺陷驅動的補救與興趣驅動的精熟氣候，是動作落後幼童介入的兩種哲學。請比較其證據，並設計一個實習教師能在晨光時間執行、又不標籤化孩子的混合方案。"], ["Sub-threshold children (“delayed but not eligible”) are systematically under-served. Using Taiwan's identification system as context, propose a tiered (RTI-like) motor support model for early primary grades.", "「落後但未達鑑定門檻」的孩子被系統性地忽略。請以臺灣的鑑定制度為脈絡，為國小低年級提出一個階層式（類 RTI）的動作支持模式。"]], "enTitle": "The Child Who Can't Hop Yet: After the First-Grade Motor Assessment", "enSummary": "A well-liked first-grader shows clear gross-motor delays but falls below the eligibility threshold. An enthusiastic intern converts her assessment report into a deficit-driven drill menu, and his mentor pushes back: at seven, what matters most is whether she still loves to move.", "enScenario": ["At Wanfang Elementary in Taipei's Wenshan District, first-grader Hsin-yu is hugely popular — at recess she laughingly chases everyone, only she never catches anyone. She runs with elbows locked and lands flat-footed; hopping on one foot, she loses balance after three hops; when a ball comes, she turns her face away. After the homeroom teacher's referral, the school arranged a cross-disciplinary motor assessment. The conclusion: clear gross-motor developmental delay, yet below the threshold for special-education eligibility — “classroom-based support and follow-up” recommended.", "Most of the PE teaching falls to Su Po-yu, a student teacher from the teacher-education university. Full of enthusiasm, he converts every weakness in the assessment report into a “training menu” and plans to drill Hsin-yu one-on-one during morning homeroom time. His mentor shakes his head: “You have turned her into a checklist of deficits. She is seven. What matters most is whether she still loves to move.” Su is genuinely puzzled: if we don't target the weaknesses, how will she ever catch up?"], "after": ["「加強訓練」與「保護動機」不是二選一：關鍵在練習藏在哪裡（全班都在玩的遊戲）與誰看得見（不被標定為補救對象）。", "如果你的答案只開了訓練菜單，回想：七歲孩子中止參與的最常見原因不是動作差，是「感覺自己不行」。", "灰色地帶（未達鑑定門檻）是制度縫隙：你的方案有沒有回答「誰持續追蹤、多久檢視一次」？"]}, {"no": 3, "title": "有時是隊友，有時是空氣——小樂的兩種星期三", "cat": "課程與教學設計", "source": "", "reading": null, "scenario": ["基隆市立中正國中二年級的小樂是唐氏症學生，開朗愛跳舞，週末參加特奧滾球。她的體育課卻呈現兩種樣貌。糟的日子：男女分組打籃球鬥牛，女生組人數奇數，小樂自動變成「多出來的那個」，她在場邊自己唱歌轉圈，任課的代課老師沒有制止、也沒有介入，一節課她沒有碰到球。", "好的日子：正式的體育老師簡老師用分站設計排球課，發球站讓每個人自選距離，小樂選了最近的線，發球過網時全站的人替她歡呼，同組的雅琪主動跟她擊掌約定「下次退一步」。同一個小樂、同一群同學，為什麼是兩種世界？導師在期末回饋單看到兩極的同儕評語：「我喜歡跟她一組」與「她會拖累比賽」並存。"], "uni": ["兩種星期三的差異不在小樂——請具體指出課程設計的哪些決定（分組方式、任務結構、教師介入）造成了差異？", "「自選發球距離」為什麼是好設計？它跟「為小樂一個人降低標準」差在哪？", "「她會拖累比賽」的同儕態度從哪裡來？競賽結構如何餵養這種態度？可以怎麼改？", "代課老師的「不制止也不介入」是中立嗎？教師的無作為在融合裡是什麼？"], "grad": [["Peer attitudes toward classmates with intellectual disabilities are malleable and strongly conditioned by task structure (cooperative vs. competitive). Synthesize the contact-theory and cooperative-learning evidence relevant to this case.", "同儕對智能障礙同學的態度是可塑的，且深受任務結構（合作 vs 競爭）制約。請整合與本案相關的接觸理論與合作學習證據。"], ["The “two Wednesdays” contrast suggests within-student variance is largely instruction-driven. What observational methodology could quantify this claim (e.g., systematic observation of opportunities to respond), and what would a convincing dataset look like?", "「兩種星期三」的對比顯示學生內變異大多由教學驅動。什麼觀察方法能量化這個主張（如反應機會的系統性觀察）？一組有說服力的資料長什麼樣？"], ["Special Olympics participation gives Hsiao-le athletic identity invisible at school. Discuss how community sport capital could be deliberately imported into school PE, and what research exists on such school–community bridging.", "特奧參與給了小樂在學校裡看不見的運動員身分。請討論如何刻意把社區運動資本引入學校體育課，以及這類學校—社區橋接的研究現況。"]], "enTitle": "Sometimes a Teammate, Sometimes Invisible: Hsiao-le's Two Wednesdays", "enSummary": "A junior-high girl with Down syndrome experiences two entirely different PE classes: sidelined during boys-versus-girls pickup basketball under a passive substitute, and thriving in station-based volleyball where every student chooses their own challenge level.", "enScenario": ["Hsiao-le, a second-year junior-high student with Down syndrome in Keelung, is cheerful, loves dancing, and plays boccia in Special Olympics on weekends. Her PE classes come in two versions. On the bad days: boys-versus-girls pickup basketball, an odd number of girls, and Hsiao-le automatically becomes “the extra one.” She sings and twirls by herself on the sideline; the substitute teacher neither stops her nor steps in. That entire period, she never touches a ball.", "On the good days: the regular teacher, Mr. Chien, runs a station-based volleyball lesson in which the serving station lets every student choose their own distance. Hsiao-le picks the closest line, and when her serve clears the net the whole station cheers; her teammate Ya-chi high-fives her and makes a pact — “next time, one step back.” The same girl, the same classmates — why two different worlds? At term's end the homeroom teacher reads polarized peer feedback: “I like being in her group” sits right next to “she drags the game down.”"], "after": ["兩種星期三的差別不在小樂身上——你的答案有沒有指認出三個設計變因：分組方式、任務結構、教師是否介入？", "「自選發球距離」的關鍵是全班都在選，而不是為她一人降標準——檢查你的設計屬於哪一種。", "同儕態度是課程結構的產物：競爭結構餵養「拖累比賽」敘事，合作與自選挑戰結構餵養互助敘事。"]}, {"no": 4, "title": "「體育課就是讓他們社會化」——沒有準備的融合時段", "cat": "課程與教學設計", "source": "", "reading": null, "scenario": ["新北市三重區的重陽國小新設自閉症集中式特教班，六位學生大部分時間在特教班上課，但行政決定「藝能科」——體育、音樂、美勞——採融合方式進原班。教務主任在期初會議上說明理由：「體育課就是讓他們跟一般生社會化。」體育教師洪韻婷老師會後追問有沒有相關支持，得到的答案是「特教班會派助理員跟課」。", "開學第三週，狀況接連爆發：無口語的浩浩受不了哨音，一聽到就衝出球場；另一位學生每節課堅持沿著球場邊線走完四圈才肯加入；原班學生開始抱怨「為什麼他們可以不排隊」。洪老師觀察到，六位學生的「社會化」在她的課堂上實際發生的樣子是：站在人群外圍，由助理員牽著完成動作。她想起研習學過的結構化教學與視覺支持，但沒有人給她這六位學生的任何個別資訊——她連浩浩的增強物是什麼都不知道。"], "uni": ["「體育課就是讓他們社會化」這句話對體育課、對自閉症學生、對社會化本身，各有什麼誤解？", "「派助理員跟課」為什麼不等於支持？融合時段的成功需要哪些事前準備（資訊、環境、同儕、課程）？", "哨音、繞場四圈、不排隊——請分別從感官、常規、彈性的角度解讀這三個行為，並各給一個課堂回應。", "原班學生的「不公平」抱怨要怎麼處理？公平＝相同，還是公平＝各取所需？這要怎麼跟國小學生說？"], "grad": [["The “specials as socialization” policy places the burden of inclusion on the least-informed teacher. Analyze this as an organizational decoupling problem: the school signals inclusion while decoupling it from resources and information flow.", "「藝能科拿來社會化」的政策把融合的重擔放在資訊最少的教師身上。請把它當成組織的「脫鉤」問題來分析：學校宣示融合，卻讓它與資源及資訊流脫鉤。"], ["Evidence-based practices for learners with ASD in PE (visual schedules, structured environments, sensory accommodations, peer-mediated interventions) are well documented. Prioritize a first-semester implementation sequence for Ms. Hung and justify the ordering.", "自閉症學習者在體育課的實證實務（視覺時間表、結構化環境、感官調整、同儕中介介入）已有充分文獻。請為洪老師排出第一學期的實施順序並說明理由。"], ["Socialization is claimed as the goal but never measured. Operationalize “social outcomes of integrated PE” for these six students and design a pre–post measurement plan a school could actually run.", "「社會化」被宣稱為目標卻從未被測量。請為這六位學生把「融合式體育的社會性成果」操作化，並設計一個學校真的做得起來的前後測計畫。"]], "enTitle": "“PE Is for Socialization”: An Unprepared Integration Period", "enSummary": "A school assigns its new self-contained autism class to join regular PE 'for socialization' with no student information, no preparation and one aide. The teacher faces sensory meltdowns, rigid routines and classmates' fairness complaints, and realizes 'socialization' is happening only at the margins.", "enScenario": ["Chongyang Elementary in New Taipei City has just opened a self-contained class for six autistic students, who spend most of the day there but join regular classes for the “arts” subjects — PE, music, art. At the opening staff meeting the director of academic affairs explains the rationale in one line: “PE is where they socialize with typical kids.” When PE teacher Ms. Hung asks what support will come with them, the answer is: “The special-education class will send an aide along.”", "By week three the incidents pile up: Hao-hao, who is nonverbal, cannot bear the whistle and bolts from the court every time it blows; another student insists on walking the boundary lines four full laps before joining anything; classmates begin complaining that “they get to skip lining up.” Ms. Hung observes what “socialization” actually looks like in her class: six students standing at the edge of the crowd, guided through the motions by an aide. She remembers structured teaching and visual supports from a workshop — but nobody has given her any individual information about these six students. She does not even know what Hao-hao's reinforcers are."], "after": ["「社會化」沒有被定義與測量時只是行政修辭——你的答案有沒有把它操作化成可觀察的目標？", "支持不等於派一個大人站旁邊：學生資訊（增強物、感官特性）、環境調整（哨音替代）、同儕準備，缺一不可。", "回應「不公平」抱怨的關鍵：公平是各取所需，且規則要事前與全班建立，而不是事後辯護。"]}, {"no": 5, "title": "要不要向全班說明？——書涵的腦性麻痺與她的隱私", "cat": "課程與教學設計", "source": "", "reading": null, "scenario": ["桃園市立大有國中一年級的書涵是痙攣型腦性麻痺學生，步態明顯，體適能偏低，小學曾因走路姿勢被同學模仿嘲笑。上了國中，媽媽在 IEP 會議中主動提出：「我希望體育老師幫忙，讓書涵有機會向全班說明自己的狀況，這樣同學才不會亂猜。」", "體育教師徐健豪老師陷入兩難。他認同「說明」可能減少誤解，也想藉機教全班認識腦性麻痺；但他也擔心：這等於要一個十三歲的孩子在全班面前「出櫃」自己的障礙——如果書涵其實不想呢？如果說明之後反而被貼上更牢的標籤呢？他私下問書涵的意見，她低頭想了很久，說：「如果是老師講，我會很尷尬。如果是我自己講……我不知道要講什麼。」徐老師還要同時處理另一件事：書涵的安全考量（避免跌倒與碰撞）與她「想跟大家一起打羽球」的意願。"], "uni": ["媽媽、書涵、徐老師三方對「說明」的想像各是什麼？書涵那句「我不知道要講什麼」透露了什麼？", "「向全班說明障礙」有哪些可能的形式（老師講、本人講、融入課程講、不特別講）？各自的風險與效益？", "安全與參與的兩難：羽球單元中，哪些調整能同時回應「避免跌倒碰撞」與「跟大家一起打」？", "如果最後書涵選擇「不說明」，老師還能透過什麼方式降低同儕的誤解與模仿嘲笑？"], "grad": [["Disability disclosure in school settings sits at the intersection of privacy rights, self-determination, and stigma management. Whose decision should disclosure be, and what does the (limited) literature on disability disclosure among adolescents suggest about supporting that decision?", "校園中的障礙揭露處在隱私權、自我決定與污名管理的交會點。揭露應該是誰的決定？青少年障礙揭露的（有限）文獻對支持這個決定有何建議？"], ["“Dignity of risk” versus duty of care is the underlying ethical tension in Shu-han's badminton participation. Construct an ethically defensible participation decision process, specifying the student's role in it.", "「冒險的尊嚴」與照顧義務是書涵羽球參與背後的倫理張力。請建構一個倫理上站得住腳的參與決策程序，並明確界定學生在其中的角色。"], ["Curriculum-embedded disability awareness (teaching about CP through the sport unit itself, without spotlighting a student) is an alternative to person-focused disclosure. Design such a unit and discuss how you would evaluate its effects on peer attitudes without exposing Shu-han.", "「課程內嵌的障礙認識」（透過運動單元本身教腦性麻痺、不聚焦特定學生）是人物式揭露的替代方案。請設計這樣的單元，並討論如何在不暴露書涵的前提下評估其對同儕態度的效果。"]], "enTitle": "To Disclose or Not: Shu-han's Cerebral Palsy and Her Privacy", "enSummary": "A mother asks the PE teacher to help her daughter with cerebral palsy explain her condition to classmates. The teacher weighs disclosure formats, privacy, the girl's own hesitation, and how to honor both safety concerns and her wish to play badminton with everyone.", "enScenario": ["Shu-han, a seventh-grader in Taoyuan with spastic cerebral palsy, walks with a visible gait and scores low on fitness tests. In elementary school, classmates mimicked her walk. At the IEP meeting her mother makes a request: “I hope the PE teacher can help Shu-han explain her condition to the class, so the students stop guessing.”", "PE teacher Mr. Hsu is torn. He agrees that explanation might reduce misunderstanding, and it could become a lesson on cerebral palsy for the whole class; but he also worries: this asks a thirteen-year-old to “come out” about her disability in front of everyone. What if she doesn't actually want to? What if the label sticks harder afterwards? He asks Shu-han privately. She thinks for a long time, head down, and says: “If the teacher explains it, I'll be embarrassed. If I explain it myself… I don't know what to say.” Meanwhile, Mr. Hsu must also reconcile the safety notes (avoid falls and collisions) with the one thing she has asked for: “I want to play badminton with everyone.”"], "after": ["揭露的決定權排序是本案核心：你的答案把書涵本人放在第幾順位？", "「說明」不只兩種形式：老師講、本人講、課程內嵌（教障礙主題不指人）、不說明但處理模仿行為——你考慮了幾種？", "安全與參與不是取捨而是設計問題：具體到羽球的規則、場地、輪替方式，你的調整是「為她一人」還是「為全班」？"]}, {"no": 6, "title": "我只當過特奧志工——重度腦麻雙胞胎轉入之後", "cat": "課程與教學設計", "source": "", "reading": null, "scenario": ["屏東縣枋寮的僑德國小，下學期將轉入一對十歲雙胞胎兄弟——兩人皆為重度痙攣型腦性麻痺合併中度智能障礙，一位使用擺位輪椅，一位以助行器短距離行走，並有癲癇病史。體育教師鄭凱文老師的特教經驗只有大學時當過特奧桌球志工，看到轉銜資料的當晚，他的第一個念頭是：「萬一在我的課上受傷、癲癇發作怎麼辦？」", "兄弟倆的媽媽在轉銜會議上懇切地說：「前一間學校的體育課，他們兩個永遠在教室看影片。我只希望他們可以流汗、可以玩。」鄭老師答應了，卻不知道從何著手：擺位輪椅上的哥哥能做什麼「運動」？痙攣型的張力在活動中要注意什麼？癲癇的活動禁忌是什麼？學校護理師給他一張藥單，物理治療師的到校服務要下學期才排得到。"], "uni": ["鄭老師的恐懼（受傷、癲癇、責任）合理嗎？恐懼驅動的課程決定通常長什麼樣？「看影片的體育課」是怎麼來的？", "「可以流汗、可以玩」——把媽媽的期待轉成兩兄弟各自的第一個月課程目標，你會寫什麼？", "在治療師到位前，鄭老師可以動用哪些既有資源（護理師、特教老師、媽媽本人、轉銜資料）建立安全底線？", "擺位輪椅上的學生「動」的可能性有哪些？請列出五種不需離開輪椅的中高強度活動構想。"], "grad": [["Teacher fear and liability concerns are among the strongest predictors of exclusionary practice for students with severe physical disabilities. What does the literature say about the actual injury risk profile in adapted PE, and how should risk communication to teachers be designed?", "教師的恐懼與責任顧慮是重度肢體障礙學生被排除的最強預測因子之一。文獻對適應體育的實際傷害風險樣貌怎麼說？對教師的風險溝通該如何設計？"], ["For children with GMFCS IV–V spastic CP, exercise research supports meaningful trainability (e.g., of cardiorespiratory fitness and function). Summarize the evidence and translate it into programming principles for a generalist school context.", "對 GMFCS IV–V 級痙攣型腦麻兒童，運動研究支持其具有意義的可訓練性（如心肺適能與功能）。請摘要證據，並轉譯為一般學校情境的課程設計原則。"], ["Twins with near-identical diagnoses will still differ in preferences, tolerance, and response. Critique diagnosis-based programming and propose an N-of-1 oriented alternative for this case.", "診斷幾乎相同的雙胞胎仍會在偏好、耐受與反應上不同。請批判以診斷為本的課程設計，並為本案提出以 N-of-1 為導向的替代方案。"]], "enTitle": "“I Was Only a Special Olympics Volunteer”: Twins with Severe Spastic CP", "enSummary": "Twin ten-year-old brothers with severe spastic CP, intellectual disability and epilepsy transfer in. A teacher whose only disability experience is Special Olympics volunteering must move from fear and liability to a program in which, as their mother asks, 'they can sweat and play.'", "enScenario": ["Chiao-de Elementary in Fangliao, Pingtung, will receive twin ten-year-old brothers next term — both with severe spastic cerebral palsy and moderate intellectual disability; one uses a positioning wheelchair, the other walks short distances with a walker, and both have a history of epilepsy. PE teacher Mr. Cheng's only special-needs experience is volunteering at a Special Olympics table-tennis event in college. The night the transfer file arrives, his first thought is: “What if one of them gets hurt — or has a seizure — in my class?”", "At the transition meeting the boys' mother pleads: “At their last school, PE meant watching videos in the classroom. All I want is for them to sweat and to play.” Mr. Cheng promises — then realizes he has no idea where to start. What counts as “exercise” for the brother in the positioning wheelchair? What should he watch for with spastic muscle tone during activity? What are the exercise precautions for epilepsy? The school nurse hands him a medication list; the physical therapist's school visit cannot be scheduled until next semester."], "after": ["恐懼驅動的課程＝最低風險也最低學習：你的答案有沒有同時把「不受傷」和「有學習」當成目標？", "「可以流汗、可以玩」其實可操作：強度指標、笑聲、選擇權——試著把它寫成第一個月的具體目標。", "治療師到位前資訊缺口可以先補：護理師的用藥表、媽媽的日常經驗、轉銜資料——你的答案動用了哪些？"]}, {"no": 7, "title": "整併之後——為集中式特教班從零建立適應體育課程", "cat": "課程與教學設計", "source": "", "reading": null, "scenario": ["桃園市因少子化進行學校整併，鄰校唯一的重度障礙集中式特教班遷入文欣國小。任教二十年的體育教師張國樑老師教學經驗豐富，帶過唐氏症、ADHD、輕度肢障的融合班學生都游刃有餘——但新班級完全不同：兩位無口語的自閉症學生、一位使用電動輪椅的多重障礙學生、兩位需要抽痰與管灌的腦性麻痺學生。", "學校排給這個班每週兩節「適應體育課」，卻沒有任何課程綱要範例、沒有評估工具、器材室裡只有標準尺寸的球具。張老師翻遍健體領域課綱，發現學習內容全是以一般生為想像。特教班導師對他說：「以前的學校就是讓他們在墊子上滾一滾、聽音樂拉拉筋。」張老師不想這樣教，但他承認：「我連從哪裡開始評估都不知道。」"], "uni": ["張老師「帶過輕度障礙就等於會教重度障礙」的預設在哪裡失效了？重度與極重度學生的體育課，目標本質上有何不同？", "「墊上滾一滾、聽音樂拉筋」為什麼不能算是適應體育課程？一個「課程」至少需要哪些成分（目標、評估、進程、教學策略）？", "請為這個班設計第一個月的課程輪廓：你會先評估什麼？第一個教學單元選什麼？為什麼？", "課綱以一般生為想像時，第一線教師可以怎麼「轉化」課綱而不是放棄課綱？"], "grad": [["Curriculum for students with severe/profound disabilities often shifts from sport-skill acquisition to functional movement, health, and enjoyment. On what normative and empirical grounds should this shift be justified — and where is the risk of lowered expectations?", "重度障礙學生的課程常從運動技能習得轉向功能性動作、健康與樂趣。這個轉向的規範性與實證基礎是什麼？「降低期待」的風險又藏在哪裡？"], ["Taiwan's national PE curriculum guidelines presume a nondisabled learner. Compare possible adaptation logics (accommodation, modification, alternative curriculum) and their implications for IEP goal writing in this case.", "臺灣健體課綱預設的是非障礙學習者。請比較可能的轉化邏輯（調整、修改、替代課程）及其對本案 IEP 目標撰寫的意涵。"], ["If you were to document this program-building process as a practitioner research study, what design would preserve both rigor and usefulness for other schools facing consolidation?", "若要把這段課程建置歷程做成教學實踐研究，什麼樣的設計能兼顧嚴謹性、又對其他面臨整併的學校有用？"]], "enTitle": "After the School Merger: Building an APE Program from Zero", "enSummary": "After a district merger, a veteran PE teacher inherits a self-contained class of students with severe and multiple disabilities. There is no curriculum guide, no assessment tool and no suitable equipment — and 'rolling on mats to music' is not a curriculum.", "enScenario": ["Because of falling enrollment, Taoyuan is consolidating schools, and the neighboring school's self-contained class for students with severe disabilities has moved into Wenxin Elementary. Mr. Chang, a PE teacher with twenty years of experience, has handled students with Down syndrome, ADHD and mild physical disabilities in inclusive classes with ease — but this class is different: two nonverbal autistic students, one student with multiple disabilities using a power wheelchair, and two students with cerebral palsy who need suctioning and tube feeding.", "The school schedules two “adapted PE” periods a week for this class — with no curriculum examples, no assessment tools, and an equipment room stocked only with standard-size balls. Combing the national health-and-PE curriculum guidelines, Mr. Chang finds every learning item imagined for typically developing students. The special-education homeroom teacher tells him: “At the old school they just rolled around on mats and stretched to music.” Mr. Chang refuses to teach that way — but admits: “I don't even know where to begin assessing.”"], "after": ["「墊上滾一滾」的問題不在活動本身，在沒有目標、評估與進程——你的答案有沒有補上這三件事？", "評估從哪開始：功能性動作（移位、抓握、姿勢維持）與喜好（什麼讓他動起來），優先於課綱項目。", "課綱不是障礙而是素材：轉化（替代目標、替代表現方式）是專業，直接放棄課綱才是失守。"]}, {"no": 8, "title": "五十個學生與一座風雨操場——初任教師的常規戰爭", "cat": "課程與教學設計", "source": "", "reading": null, "scenario": ["臺南市立大灣高中的初任代理教師林士堯老師，每週有三個時段要與資深的郭教練「併堂」——兩班合計近五十人擠在風雨操場。林老師重視學習節奏：進場換裝、自由活動、雙聲哨集合、器材歸位，他都建立了明確流程。郭教練的風格是發球讓學生自己玩，自己在旁邊看手機，「高中生了，別管太多」。", "併堂時災難就來了：林老師集合講解時，郭教練那半場還在鬥牛，籃球不時滾進來；班上幾位過動與學障學生在吵雜中完全接收不到指令，衝突與告狀不斷；一位自閉症學生因為受不了聲音開始搗住耳朵尖叫，郭教練遠遠喊了一句「帶他去旁邊冷靜」。林老師下課後在辦公室被郭教練拍拍肩：「年輕人，你太緊繃了。」"], "uni": ["林老師的常規系統（流程、訊號、歸位）各自在管理什麼？五十人併堂讓哪些環節失效？", "「高中生了，別管太多」是一種教育哲學還是一種放棄？兩位老師的差異是風格問題還是專業問題？", "吵雜環境對過動、學障、自閉症學生的影響各是什麼？「帶去旁邊冷靜」處理了什麼、迴避了什麼？", "權力不對等（初任代理 vs 資深教練）下，林老師有哪些現實可行的行動選項？各有什麼代價？"], "grad": [["Academic Learning Time in PE (ALT-PE) is a classic indicator of instructional quality. Analyze how the co-teaching arrangement in this case suppresses ALT-PE, and for which student subgroups the loss is largest.", "體育課學業學習時間（ALT-PE）是教學品質的經典指標。請分析本案的併堂安排如何壓縮 ALT-PE，以及哪些學生次群體的損失最大。"], ["Behavior management for students with ADHD, LD, and ASD in noisy group settings requires antecedent (environmental) rather than consequent strategies. Specify the antecedent modifications this gym needs, grounded in the behavioral literature.", "在吵雜團體情境中，ADHD、學障與自閉症學生的行為管理需要「前事（環境）策略」而非「後果策略」。請依行為文獻具體指出這座球場需要的前事調整。"], ["Novice–veteran co-teaching conflicts are structural, not personal. Drawing on teacher socialization research, what induction and scheduling policies would prevent this scenario from recurring?", "初任—資深共任教學的衝突是結構性而非個人性的。根據教師社會化研究，哪些導入制度與排課政策能避免這種情境重演？"]], "enTitle": "Fifty Students, One Covered Court: A Novice Teacher's Battle for Routines", "enSummary": "A novice teacher's carefully built routines collapse when two classes — fifty students — share one covered court with a veteran coach who 'lets kids play.' Students with ADHD, learning disabilities and autism absorb most of the cost of the noise and chaos.", "enScenario": ["Mr. Lin, a first-year substitute teacher at Dawan High School in Tainan, shares three weekly time slots with the veteran Coach Kuo — two classes, nearly fifty students, one covered court. Mr. Lin cares about learning rhythm: entry and changing routines, free practice, a double-whistle assembly signal, equipment return — all clearly established. Coach Kuo's style is to toss out the balls and watch his phone from the sideline: “They're high-schoolers. Don't micromanage.”", "Shared periods are a disaster: while Mr. Lin gathers his class for instruction, the pickup game on Coach Kuo's half keeps running and balls keep rolling in; his students with ADHD and learning disabilities receive nothing through the noise; conflicts and tattling never stop. One autistic student, overwhelmed by the sound, covers his ears and starts screaming — Coach Kuo calls across the court, “Take him to the side to calm down.” After class, the coach pats Mr. Lin on the shoulder in the office: “Kid, you're too uptight.”"], "after": ["你的答案處理的是哪一層：物理環境（分區、隔音）、制度（併堂排課）、人際（初任與資深的權力）？好答案三層都有動作。", "前事（環境）策略優先於後果策略：重新設計噪音、空間與訊號，比「更嚴格管教」更有效也更公平。", "常規的目的不是控制而是可預測性——這對 ADHD 與自閉症學生尤其是支持，不是束縛。"]}, {"no": 9, "title": "先投籃還是先排隊？——集中式特教班的增強設計", "cat": "課程與教學設計", "source": "", "reading": null, "scenario": ["臺南市永康區的復興國小集中式特教班，體育課由適應體育背景的鍾旻軒老師任教，搭配助理員周姐。班上的自閉症學生齊齊熱愛投籃，卻總在轉換活動時趴地不起；另一位智能障礙學生芳芳只要做對動作就會看向大人等待反應，沒得到回應就漸漸停止嘗試。周姐的管理方式只有一種：提高音量數「一、二、三！」，齊齊被數到三就尖叫，芳芳則越來越安靜。", "鍾老師重新設計了系統：把投籃安排在完成轉換之後（「先收好呼拉圈，就去投籃」）；為芳芳建立固定的具體讚美與擊掌；為全班做了視覺化的集點板，集滿五枚兌換「自選活動五分鐘」。三週後行為明顯改善，周姐卻不以為然：「這是賄賂吧？以後沒有獎品他們就不動了。」"], "uni": ["「先收呼拉圈，就去投籃」用的是什麼原理？它跟「收好呼拉圈就給你貼紙」有什麼本質差異？", "芳芳「做對就看向大人」透露她的行為由什麼維持？增強的「立即性」與「具體性」為什麼關鍵？", "周姐的「數到三」為什麼對齊齊是火上加油？同一策略為什麼讓芳芳越來越安靜？", "「這是賄賂」是最常見的質疑——請用增強的褪除（fading）與自然增強的概念回應周姐。"], "grad": [["Distinguish the Premack principle, token economies, and social reinforcement as used in this case, and evaluate the evidence for each in physical activity settings for students with developmental disabilities.", "請區分本案中使用的 Premack 原則、代幣制度與社會性增強，並評估各自在發展障礙學生身體活動情境中的證據。"], ["The “bribery” objection reflects a genuine theoretical debate about extrinsic reinforcement and intrinsic motivation (e.g., undermining effects). How does the self-determination theory literature qualify — not simply refute — behavioral practice in APE?", "「賄賂」的質疑反映外在增強與內在動機的真實理論爭論（如侵蝕效應）。自我決定理論的文獻如何「限定」——而不只是反駁——適應體育中的行為取向實務？"], ["Design a single-case experimental study (e.g., multiple baseline across behaviors) to evaluate Mr. Chung's reinforcement package, including a planned fading phase. What would count as socially valid outcomes?", "請設計一個單一受試實驗（如跨行為多基線）評估鍾老師的增強方案，並納入計畫性褪除階段。什麼樣的結果才算具有社會效度？"]], "enTitle": "Shoot First or Line Up First? Reinforcement Design in a Self-Contained Class", "enSummary": "In a self-contained class, the teacher rebuilds transitions with the Premack principle, specific praise and a visual point board. Behavior improves in three weeks, and the aide objects: 'Isn't this bribery? They'll never move without prizes again.'", "enScenario": ["In the self-contained class at Fuxing Elementary in Tainan's Yongkang District, PE is taught by Mr. Chung, who has an adapted-PE background, working with the aide Ms. Chou. Chi-chi, an autistic student who loves shooting baskets, drops to the floor at every activity transition; Fang-fang, a student with intellectual disability, looks to an adult after every correct movement — and gradually stops trying when no response comes. Ms. Chou has exactly one management tool: counting loudly, “One! Two! Three!” Chi-chi screams by the count of three; Fang-fang grows quieter and quieter.", "Mr. Chung redesigns the system: shooting baskets is scheduled to follow transitions (“put the hoops away first, then you get to shoot”); Fang-fang receives consistent, specific praise and a high-five; the whole class gets a visual point board — five points buys “five minutes of free choice.” Three weeks later, behavior has clearly improved. Ms. Chou is unimpressed: “Isn't this bribery? Once the prizes stop, they'll never move again.”"], "after": ["先分清楚 Premack（活動排序：先收拾才投籃）與代幣（象徵交換：集點換自選）——兩者的褪除方式不同。", "回應「賄賂」質疑的關鍵字是褪除計畫與自然增強：從設計之初就寫進去，而不是被質疑才補。", "芳芳「做對就看大人」提醒我們：增強的終點是把回饋來源從大人轉移到活動本身與同儕。"]}, {"no": 10, "title": "測出來的是動作，還是語言？——TGMD-3 與新住民家庭", "cat": "評估與個別化文件", "source": "", "reading": null, "scenario": ["新北市新莊區的思賢國小，八歲的阿福是自閉症學生，媽媽來自越南，家中主要說越南語。阿福的 IEP 上有語言治療與職能治療，卻沒有任何動作領域目標——特教組的說法是「體育課跟著上就好，不用寫進 IEP」。體育教師范雅筑老師觀察到阿福投擲不會轉體、接球會閃躲，決定用 TGMD-3 做評估，為 IEP 會議準備資料。", "施測當天狀況百出：阿福聽不懂「助跑之後單腳跳」的指導語，范老師示範後他做出來了，但她不確定「示範後才會做」在計分上怎麼處理；測到一半阿福開始拍手繞圈，媽媽在旁邊急著用越南語喊他。范老師看著紀錄表想：這些分數到底反映了阿福的動作能力，還是他的語言理解、他的注意力、以及這個對他而言全然陌生的施測情境？"], "uni": ["「體育跟著上就好，不用寫進 IEP」這個說法有什麼問題？動作領域目標寫進 IEP 會改變什麼？", "TGMD-3 的指導語聽不懂、示範後才會做——這些狀況威脅到測驗的什麼？分數還能用嗎？該怎麼用？", "范老師還可以用哪些方式補足單一測驗的不足（觀察、課程本位評量、家長訪談）？各能補到什麼？", "文化與語言背景如何影響動作評估的公平性？替阿福施測時，有哪些具體的調整是「合理調整」而非「污染測驗」？"], "grad": [["Standardized motor assessments like the TGMD-3 assume shared language, testing culture, and attentional compliance. Drawing on validity theory, which specific inferences from Ah-Fu's scores are threatened, and which remain defensible?", "TGMD-3 這類標準化動作評估預設了共通的語言、測驗文化與注意力配合。從效度理論來看，阿福分數所支持的哪些推論受到威脅？哪些仍站得住腳？"], ["The TGMD-3 has published norms from several countries. What are the psychometric and ethical considerations in applying foreign norms to Taiwanese children, and to bilingual immigrant families in particular?", "TGMD-3 已有多國常模。將國外常模套用在臺灣兒童、尤其是雙語新住民家庭的孩子身上，涉及哪些心理計量與倫理考量？"], ["Propose an assessment battery for writing Ah-Fu's motor-domain IEP goals that triangulates standardized testing with ecological assessment. How would you present conflicting results to the IEP team?", "請提出一套能結合標準化測驗與生態評量的評估組合，用於撰寫阿福的動作領域 IEP 目標。若結果彼此矛盾，你會如何向 IEP 團隊呈現？"]], "enTitle": "Measuring Movement or Language? TGMD-3 and an Immigrant Family", "enSummary": "A TGMD-3 assessment of an autistic boy from a Vietnamese-speaking family goes sideways: instructions are not understood, demonstration changes the scores, and the teacher wonders what the numbers measure — motor skill, language, attention, or the strangeness of the testing situation.", "enScenario": ["At Sixian Elementary in New Taipei's Xinzhuang District, eight-year-old Ah-fu is an autistic student; his mother is from Vietnam and the family speaks Vietnamese at home. His IEP includes speech and occupational therapy but not a single motor-domain goal — the special-education office's position is “he just follows the regular PE class; no need to write it into the IEP.” PE teacher Ms. Fan has noticed that Ah-fu throws without trunk rotation and dodges instead of catching, so she decides to administer the TGMD-3 to prepare evidence for the IEP meeting.", "Test day is chaos: Ah-fu does not understand the instruction “run up and hop”; after Ms. Fan demonstrates, he performs it — but she is unsure how “performed only after demonstration” should be scored. Halfway through, Ah-fu starts clapping and circling, while his mother anxiously calls to him in Vietnamese from the sideline. Staring at the record sheet, Ms. Fan wonders: do these scores reflect Ah-fu's motor ability — or his language comprehension, his attention, and the sheer strangeness of the testing situation?"], "after": ["你的答案有沒有區分「分數無效」與「分數需要小心詮釋」？「示範後才會做」本身就是重要的教學資訊。", "單一測驗不足時的三角驗證：課程本位觀察、家長訪談（用母語進行）、遊戲情境評估——你用了幾個？", "合理調整與污染測驗的分界：改變作答與理解方式通常可以，改變所測的構念就不行。"]}, {"no": 11, "title": "800 公尺與免測單——體適能檢測週的兩難", "cat": "評估與個別化文件", "source": "", "reading": null, "scenario": ["高雄市明華國中的體適能檢測週，全校依國民體適能常模施測並登錄系統。國二的宗翰是痙攣型腦性麻痺學生（GMFCS II），導師直接幫他辦了「免測」，理由是安全。宗翰卻私下問體育教師李孟儒老師：「老師，我可以測嗎？我想知道我的成績。」李老師一時語塞——讓他測 800 公尺，常模對他毫無意義，跑出成績登錄系統還會被標成「待加強」；不測，等於告訴他體適能與他無關。", "同一週，剛從花蓮轉來的體重過重學生小晏在仰臥起坐測驗被同學圍觀嘲笑，隔天就請假。李老師想起研習聽過的身心障礙學生體適能評估工具（如 Brockport 體適能測驗）採個別化標準，但學校系統只吃全國常模。他開始質疑：這場檢測週到底在測什麼、為誰而測？"], "uni": ["「免測」保護了宗翰的什麼、又剝奪了他的什麼？有沒有第三條路？", "常模參照與效標／個人參照的體適能評估，邏輯差在哪？對身障學生各自意味著什麼？", "小晏的經驗顯示體適能檢測的什麼副作用？檢測的公開性（圍觀、排名、獎章）該如何設計？", "如果系統只吃全國常模，第一線教師在班級層次還能做哪些「平行的」個人化評估與回饋？"], "grad": [["Health-related fitness testing for students with disabilities shifted from normative comparison to criterion-referenced, individualized standards (e.g., the Brockport Physical Fitness Test). Explain the conceptual rationale, and evaluate the barriers to institutionalizing such standards in Taiwan's national fitness-testing system.", "身障學生的健康體適能檢測已從常模比較轉向效標參照的個別化標準（如 Brockport 體適能測驗）。請說明其概念基礎，並評估在臺灣全國體適能檢測制度中落實這類標準的障礙。"], ["Fitness testing can produce both information and harm (exposure, stigma, avoidance). Under what testing-design conditions does the information gain justify the social risk? Use both cases (Zong-han and Xiao-yan) in your analysis.", "體適能檢測同時產生資訊與傷害（暴露、污名、逃避）。在什麼樣的檢測設計條件下，資訊效益足以正當化社會風險？請同時分析宗翰與小晏兩個案例。"], ["Design a small validation study to develop criterion-referenced fitness standards for Taiwanese adolescents with CP. What criterion would you anchor the standards to, and what are the feasibility constraints?", "請設計一個小型效度研究，為臺灣腦性麻痺青少年發展效標參照的體適能標準。你會把標準錨定在什麼效標上？可行性限制為何？"]], "enTitle": "The 800-Meter and the Exemption Slip: Dilemmas of Fitness-Testing Week", "enSummary": "During national fitness-testing week, a student with CP is 'exempted' against his own wishes while an overweight transfer student is mocked mid-test and stops coming to school. The teacher asks what the testing system measures, and for whom.", "enScenario": ["Fitness-testing week at Minghua Junior High in Kaohsiung: the whole school is measured against national norms and the results uploaded to the system. Zong-han, a ninth-grader with cerebral palsy (GMFCS level II), is signed up for an “exemption” by his homeroom teacher — for safety. Zong-han quietly asks the PE teacher, Mr. Li: “Teacher, may I take the test? I want to know my results.” Mr. Li is caught speechless: an 800-meter time scored against national norms is meaningless for Zong-han and will flag him as “needs improvement” in the system; yet skipping the test tells him that fitness has nothing to do with him.", "The same week, Hsiao-yen, an overweight transfer student from Hualien, is laughed at by onlooking classmates during the sit-up test and stays home the next day. Mr. Li recalls a workshop on fitness assessment for students with disabilities — tools like the Brockport Physical Fitness Test use individualized, criterion-referenced standards — but the national system only accepts national norms. He begins to question what this testing week actually measures, and for whom."], "after": ["免測保護的是風險、剝奪的是資訊與身分——你的答案有沒有給宗翰第三條路（個人參照標準、替代項目）？", "制度只收全國常模時，教師層次仍有空間：班級內個人目標、進步曲線、私下回饋。", "小晏的問題不在測驗本身，在測驗的公開性——你的方案有沒有改變「誰看得到誰的成績」？"]}, {"no": 12, "title": "他的檔案裡沒有一句好話——優勢本位與缺陷取向的拉鋸", "cat": "評估與個別化文件", "source": "臺灣在地議題", "reading": "搭配閱讀：本集個案 36（缺陷清單式的訓練菜單）與 T3（三框架的層級）；neurodiversity 與 strength-based practice 相關文獻（如 Dunn & Andrews 對障礙語言與典範的討論、正向心理學的優勢評估傳統）。", "scenario": ["高雄市博愛國小新到任的適應體育教師簡孟哲老師，接手前調閱了自閉症學生樂樂的檔案：鑑定報告、IEP、轉銜資料加起來三十幾頁，現況描述清一色是「無法」「低於同齡」「固著」「缺乏」——包括「有旋轉物品之固著行為，建議逐步消除」。簡老師翻完的感想是：這份檔案裡沒有一句好話。他實際見到樂樂的第一週，看到的卻是另一個孩子：平衡感出色、對旋轉類動作有超乎常人的耐受與熱情、在水裡放鬆而協調、記憶動作順序幾乎過目不忘。", "簡老師重寫了體育領域的現況描述：從「平衡與旋轉耐受為明顯優勢，可作為體操與舞蹈課程之切入點」寫起，把「固著行為」改寫為「高強度興趣，可轉化為課程參與的引擎」，並據此設計了以平衡木、呼拉圈與韻律活動為核心的學期目標。IEP 會議上，資深的特教組長把他拉到一旁：「你寫得很美，但你知道鑑輔會和助理員時數是看什麼核的嗎？是看他有多需要幫助。你把優勢寫好寫滿，明年他的資源被砍，家長第一個找你。」簡老師突然明白：整個制度的語言，是用缺陷寫成的。"], "uni": ["「旋轉物品之固著行為，建議逐步消除」與「高強度興趣，可轉化為參與引擎」描述的是同一個行為——兩種寫法各自預設了什麼？各會導出什麼樣的課程？", "請把下面這句缺陷式描述改寫成優勢本位版本，並為它設計一個對應的課程切入點：「無法參與團體球類活動，丟接球能力低於同齡兩個標準差。」", "特教組長的提醒是現實的：鑑定與資源以「需求程度」為門檻。優勢寫多了資源被砍——這個兩難有解嗎？現況描述可以怎麼寫，才能同時「誠實呈現支持需求」與「以優勢定錨課程」？", "優勢本位有沒有變成「報喜不報憂」的風險？什麼時候「看見優勢」會滑向「否認困難」？請舉一個體育課的例子。"], "grad": [["Strength-based approaches draw on at least three distinct lineages - positive psychology, the neurodiversity paradigm, and the social model of disability. Disentangle these roots: do they converge on the same practice, or do they imply different versions of strength-based APE?", "優勢本位取向至少有三條理論根源——正向心理學、神經多樣性典範與障礙的社會模式。請梳理這些根源：它們會匯流成同一種實務嗎？還是各自蘊含不同版本的優勢本位適應體育？"], ["The case exposes a structural contradiction: eligibility and resource-allocation systems require deficit documentation, while best-practice planning calls for strength-based description. Analyze this as an institutional design problem, and compare how different documentation architectures (e.g., separating eligibility evidence from instructional planning) might resolve it.", "本個案暴露一個結構性矛盾：鑑定與資源分配制度要求缺陷文件化，最佳實務的課程規劃卻要求優勢本位描述。請把它當成制度設計問題來分析，並比較不同的文件架構（例如把資格證據與教學規劃分離）如何化解這個矛盾。"], ["Reframing perseverative behavior as intense interest is central to neurodiversity-informed practice, yet critics warn of romanticizing impairment and masking genuine support needs. Construct a decision framework specifying the conditions under which reframing serves the student versus the adults' comfort.", "把「固著行為」重新框架為「高強度興趣」是神經多樣性取向實務的核心，但批評者警告這可能浪漫化損傷、掩蓋真實的支持需求。請建構一個決策架構，明確指出重新框架在什麼條件下服務的是學生、什麼條件下服務的只是大人的舒適。"], ["The evidence base for strength-based interventions in adapted physical activity remains thin relative to its rhetorical popularity. Design a study comparing strength-anchored versus deficit-remediation programming for autistic students in PE, specifying outcomes that capture both skill development and affective-motivational change.", "相對於論述上的流行，優勢本位介入在適應性身體活動領域的證據基礎仍然單薄。請設計一個研究，比較自閉症學生體育課中「優勢定錨」與「缺陷補救」兩種課程取向，結果變項須同時涵蓋技能發展與情意動機的改變。"]], "enTitle": "Not One Good Word in His File: Strengths vs. the Language of Deficit", "enSummary": "A new APE teacher rewrites a student's deficit-saturated file — 'perseverative spinning behavior, to be eliminated' — into strength-anchored goals. A veteran colleague warns him: resources are allocated by documented need, and the system's language is written in deficits.", "enScenario": ["Mr. Chien, the new adapted-PE teacher at Bo-ai Elementary in Kaohsiung, pulls the file of Le-le, an autistic student, before taking over: thirty-plus pages of eligibility reports, IEPs and transition documents written entirely in “cannot,” “below age level,” “perseverative,” “lacks” — including “perseverative spinning of objects; recommend gradual elimination.” His reaction after reading: there is not one good word in this file. The child he meets in week one is someone else entirely: outstanding balance, an extraordinary tolerance for — and delight in — rotation, relaxed and coordinated in water, movement sequences memorized almost at a glance.", "Mr. Chien rewrites the PE present-level description, opening with “balance and rotation tolerance are clear strengths and an entry point for gymnastics and dance,” reframing “perseverative behavior” as “an intense interest that can be converted into an engine for participation,” and builds the semester around balance beam, hoops and rhythmic work. At the IEP meeting, the veteran special-education coordinator pulls him aside: “Beautifully written. But do you know what the eligibility committee and the aide-hour review actually look at? How much help he needs. Write his strengths up like that, and next year his resources get cut — and his parents will come for you first.” Mr. Chien suddenly understands: the entire system's language is written in deficits."], "after": ["兩種寫法導出兩種課程：你的改寫有沒有真的長出課程切入點，還是只是把負面詞換成正面詞？", "資源兩難的實務解法：支持需求寫實、教學規劃寫優勢——分段書寫，各自面對各自的讀者。", "檢查你的答案是否滑向「報喜不報憂」：優勢本位不是否認困難，是改變課程的起點。"]}, {"no": 13, "title": "從體育館到超商貨架——轉銜計畫裡的動作目標", "cat": "評估與個別化文件", "source": "", "reading": null, "scenario": ["彰化的和美實驗學校高職部，十七歲的多重障礙學生俊廷進入轉銜階段，ITP 目標是畢業後到連鎖超商擔任理貨助理。職評報告寫著：站立耐力不足二十分鐘、搬運五公斤紙箱時軀幹代償明顯、上下貨架的蹲站轉換緩慢。適應體育教師方晉維老師被找進 IEP／ITP 會議——這是他任教八年來第一次被邀請。", "方老師這才發現，俊廷過去三年的體育課目標一直是「提升投接球協調」與「參與團體活動」，與他的職涯目標幾乎無關。他重新設計了學期課程：以漸進負重、蹲站循環與搬運動作為核心的功能性體能訓練，並跟就業輔導員約好到合作的超商做一次現場工作分析。教務處有人質疑：「體育課變成職業訓練，這樣對嗎？」"], "uni": ["「投接球協調」與「搬運紙箱的體能」——同樣是動作目標，差在哪裡？誰的需求決定了過去三年的目標？", "體育教師第一次被邀進 IEP／ITP 會議——這個「缺席」在制度上是怎麼造成的？漏掉體育教師會漏掉什麼資訊？", "「體育課變成職業訓練，這樣對嗎？」——請正反各給一個最強的論證。", "現場工作分析（去超商看實際動作需求）對課程設計的價值是什麼？這在方法上像研究裡的什麼？"], "grad": [["Transition-focused motor programming reframes PE from sport skills toward ecological, community-referenced function. Trace the theoretical lineage of this shift (ecological task analysis, community-based instruction) and its evidence base for students with severe disabilities.", "以轉銜為焦點的動作課程把體育課從運動技能重新框架為生態的、社區參照的功能。請追溯這個轉向的理論系譜（生態任務分析、社區本位教學）及其對重度障礙學生的證據基礎。"], ["The objection “PE is becoming vocational training” raises a real curriculum-philosophy question: what is PE for students whose post-school life depends on functional capacity? Defend a position using curriculum theory, not just pragmatics.", "「體育課變成職業訓練」的質疑觸及真實的課程哲學問題：對離校後生活仰賴功能性體能的學生，體育課是什麼？請用課程理論（而不只是實用考量）為你的立場辯護。"], ["Design a goal-attainment measurement plan linking Jun-ting's PE-based functional training to workplace performance indicators. What are the threats to inferring transfer, and how would you mitigate them?", "請設計一個目標達成測量計畫，把俊廷體育課的功能性訓練連結到職場表現指標。推論「遷移」時有哪些威脅？如何降低？"]], "enTitle": "From the Gym to the Store Shelf: Motor Goals in Transition Planning", "enSummary": "Invited to an IEP/ITP meeting for the first time in eight years, an APE teacher discovers that three years of ball-skill goals have nothing to do with a student's supermarket job trajectory, and rebuilds PE as functional, work-referenced fitness training.", "enScenario": ["At the vocational division of Homei Special School in Changhua, seventeen-year-old Chun-ting, a student with multiple disabilities, is entering the transition phase. His ITP goal: shelf-stocking assistant at a convenience-store chain. The vocational evaluation reads: standing endurance under twenty minutes, visible trunk compensation when carrying five-kilogram boxes, slow squat-to-stand transitions at the shelves. Adapted-PE teacher Mr. Fang is invited to the IEP/ITP meeting — the first such invitation in his eight years at the school.", "Only then does Mr. Fang discover that Chun-ting's PE goals for the past three years — “improve throwing-and-catching coordination” and “participate in group activities” — have almost nothing to do with his career direction. He redesigns the semester around functional fitness: progressive loading, squat-stand circuits and carrying mechanics at its core, and books an on-site job task analysis with the employment coach at the partner store. Someone from the academic affairs office pushes back: “PE turning into vocational training — is that right?”"], "after": ["三年投接球目標的教訓是「目標的主人是誰」——你的答案有沒有讓轉銜目標倒推體育課目標？", "回應「體育課變職訓」：功能性體能本來就是身體素養的一部分，對俊廷而言它剛好通往生活品質與就業。", "現場工作分析是本案的黃金動作：把職場的真實動作需求帶回課程，這就是生態效度。"]}, {"no": 14, "title": "小宇的體育課——在場，就是融合嗎？", "cat": "融合經驗與同儕支持", "source": "議題探究", "reading": "本案為自編議題探究個案，無對應教科書章節；延伸文獻見本案文末。", "scenario": ["小宇是一名腦性麻痺、使用助行器的國中生，就讀普通班。體育課打籃球時，老師擔心他受傷，長期安排他擔任「計分員」。學期末，小宇告訴資源班老師，他最喜歡的其實是每週一次的抽離式適應體育小組：「那裡有人會傳球給我。」", "個案會議上意見分歧。媽媽堅持小宇應該留在普通班體育課：「他要學著跟大家一起，不能被隔離。」特教組長建議增加抽離式適應體育的節數：「他在小組裡才真的有在動、有朋友。」體育老師則說自己也想讓小宇參與，但一班三十幾人、又怕安全問題，「我真的不知道怎麼教他」。"], "uni": ["小宇「人在普通班體育課」但當計分員，這算是參與嗎？請用「好日子／壞日子」的概念描述小宇在兩種情境下的經驗。", "媽媽、特教組長、體育老師三個人各自的立場背後，是什麼樣的價值假設？你最同意誰？最不同意誰？為什麼？", "「有人傳球給我」這句話為什麼重要？在你的球類課經驗裡，決定一個人有沒有「真的在打球」的關鍵是什麼？", "如果維持在普通班，體育老師的課要怎麼改，小宇才能從計分員變成球員？請提出兩個具體做法。"], "uniAct": ["角色模擬個案會議：四人一組分飾媽媽、特教組長、體育老師、輔導主任，限時十分鐘為小宇下學期的體育課做出決議，並向全班報告決議與最大分歧點。", "用 STEP（Space、Task、Equipment、People）架構改造一節籃球課，目標是小宇全程以球員身分參與，完成後檢查：這些調整是「為小宇一人特製」還是「全班都受益」？"], "grad": ["Goodwin 與 Watkinson 的「好日子／壞日子」研究與後續系統性回顧共同指出：融合安置下的孤立、能力被質疑、參與受限是跨國一致的發現。這對「融合作為預設安置」的政策邏輯構成什麼挑戰？", "Pellerin 等人回報集中式體育課中的正向經驗，作者主張「不能假設隔離式安置必然不融合，一如不能假設融合安置必然融合」。這個主張如何重構 inclusion 的定義——從安置類別移向主觀經驗？定義移動之後，研究測量該怎麼跟著動？", "以 ableism 的視角重讀本個案：體育老師「怕他受傷、不知道怎麼教」的善意，如何反映課程以健全身體為預設的常規（normate）？問題出在老師個人，還是出在體育課的知識結構？", "台灣的 IEP 與安置決策機制中，學生本人的聲音（如小宇的「有人傳球給我」）在什麼位置？從兒童權利與自我決策的角度，程序上該如何補強？"], "gradTask": ["對照閱讀 Rekaa 等人（2019）系統性回顧與 Pellerin 等人（2020），撰寫一頁立場備忘錄：「融合式體育的研究應該把安置類型當自變項，還是把歸屬經驗當依變項？」", "檢索台灣近十年融合式體育實證研究，盤點有多少研究直接訪談身障學生本人，寫成簡短的缺口分析。"], "guide": ["大學部學生幾乎都會直覺選擇「當然要融合」——這正是可以操作的起點。呈現集中式安置的正向證據後，讓學生經歷「原則與證據打架」的不適感，是本個案的核心學習經驗。", "注意不要讓討論收在「所以隔離也不錯」的簡化結論——文獻的重點是：融合的品質才是變項，安置地點是不完整的代理指標。", "碩士班版可順勢帶出測量議題：belonging 如何操作化？台灣現有工具是否存在？這是可直接長出研究題目的縫隙。"], "refs": [["Goodwin & Watkinson (2000). Inclusive physical education from the perspective of students with physical disabilities. APAQ.", "https://doi.org/10.1123/apaq.17.2.144", "經典研究：好日子／壞日子的雙面經驗。"], ["Rekaa, Hanisch, & Ytterhus (2019). Inclusion in physical education: Teacher attitudes and student experiences. A systematic review.", "https://doi.org/10.1080/1034912x.2018.1435852", "系統性回顧：排除與缺乏歸屬是一致發現。"], ["Pellerin, Wilson, & Haegele (2020). The experiences of students with disabilities in self-contained physical education. Sport, Education and Society.", "https://doi.org/10.1080/13573322.2020.1817732", "集中式安置的正向經驗，挑戰主流假設。"], ["Alves et al. (2022). The 'normal' physical education classes: the ableism facing the inclusion of disabled students. Disability & Society.", "https://doi.org/10.1080/09687599.2022.2071679", "以 ableism 分析體育課的常規化結構。"], ["Alves et al. (2020). 'I didn't do anything, I just watched'. International Journal of Inclusive Education.", "https://doi.org/10.1080/13603116.2018.1511760", "巴西身障學生的旁觀者處境，與小宇的計分員角色直接呼應。"], ["Haegele, Wilson, Zhu, & Kirk (2020). Barriers and facilitators to inclusion in integrated physical education. European Physical Education Review.", "https://doi.org/10.1177/1356336x20944429", "適應體育專家指認的障礙與促進因素，教師因素居首。"]], "enTitle": "Being There Isn't Belonging: Hsiao-yu's PE Class", "enSummary": "A boy with CP spends inclusive PE as the scorekeeper; his favorite class is the weekly pull-out group 'where someone passes me the ball.' His mother, the special educator and the PE teacher collide over what placement really serves him.", "enScenario": ["Hsiao-yu, a junior-high student with cerebral palsy who uses a walker, attends a regular class. In PE, worried about his safety, the teacher has long assigned him the role of “scorekeeper” during basketball. At the end of the semester, Hsiao-yu tells the resource-room teacher that what he loves most is the weekly pull-out adapted PE group: “Someone passes me the ball there.”", "The case conference splits three ways. His mother insists Hsiao-yu stay in regular PE: “He must learn to be with everyone — he cannot be segregated.” The special-education coordinator proposes adding pull-out adapted PE periods: “In the small group he actually moves, and actually has friends.” The PE teacher says he too wants Hsiao-yu to participate, but with a class of thirty-plus and safety on his mind, “honestly, I don't know how to teach him.”"], "after": ["「在場」與「歸屬」的區分是本案的鑰匙——你的答案用誰的視角判斷融合有沒有發生？", "三方都對也都不完整：好方案同時處理權利（媽媽）、經驗品質（特教組長）、教學支持（體育老師）。", "「有人傳球給我」是可以被設計的：需要改變的是課程結構與任務設計，不是小宇。"]}, {"no": 15, "title": "老師的模範生——被展示的融合", "cat": "融合經驗與同儕支持", "source": "", "reading": null, "scenario": ["臺北市立文林國小的體育教師郭淑芬老師以推動融合聞名，曾獲教學卓越獎。她的課堂上，弱視學生育安使用高對比的黃色球，郭老師常在全班面前停下課程：「大家看，育安丟得多準！誰說看不清楚就不能玩？」她真心相信這是在為育安建立自信。", "育安的感受完全不同。他討厭全班的目光因為老師的表揚集中到自己身上，「好像我做到任何事都很神奇」。配置給班上的助理員大哥哥非常熱心，育安打樂樂棒球時他全程在旁邊喊「往前三步、左邊左邊、快撿」，同學漸漸不跟育安說話了——「反正都有大人在他旁邊」。育安開始在體育課前說肚子痛，去保健室的次數越來越多。導師提醒郭老師時，她愣住了：「可是……他在我的課堂上明明什麼都有參與到啊。」"], "uni": ["郭老師的三個「融合作為」（公開表揚、特製器材、助理員支持）分別如何變成了排除的機制？", "「參與到了」（老師視角）與「有歸屬感」（育安視角）的差距是怎麼產生的？誰有權定義融合是否發生？", "助理員的「過度支持」如何同時傷害學習與同儕關係？支持的「劑量」該由誰、依什麼調整？", "育安用「肚子痛」表達什麼？學生的迴避行為可以如何被當成課程設計的回饋訊號？"], "grad": [["Haegele and colleagues distinguish integration (placement) from inclusion (subjective experiences of belonging, acceptance, value). Apply this framework to Yu-an's case: which teacher behaviors targeted integration while undermining inclusion?", "Haegele 等人區分了「整合」（安置）與「融合」（歸屬、接納、價值的主觀經驗）。請以此架構分析育安的個案：哪些教師行為在追求整合的同時傷害了融合？"], ["Public praise of a disabled student's ordinary performance can function as micro-level ableism (“inspiration framing”). Connect this classroom phenomenon to the supercrip literature in disability sport media — what is the shared mechanism?", "公開讚美身障學生的平常表現可能是微觀層次的能力主義（勵志框架）。請把這個課堂現象連結到身障運動媒體的 supercrip 文獻——兩者共享的機制是什麼？"], ["Design an interview study capturing the subjective PE experiences of Taiwanese students with visual impairments. What methodological safeguards address power asymmetry between child participants and adult researchers/teachers?", "請設計一個訪談研究，捕捉臺灣視障學生的體育課主觀經驗。哪些方法上的防護措施能處理兒童受訪者與成人研究者／教師之間的權力不對等？"]], "enTitle": "The Teacher's Showcase: Inclusion on Display", "enSummary": "An award-winning teacher publicly celebrates a low-vision student's every success while an eager aide narrates his every move. Classmates drift away, and the student starts faking stomach aches — while the teacher believes he is 'fully participating.'", "enScenario": ["Ms. Kuo of Wenlin Elementary in Taipei is famous for championing inclusion and has won a teaching-excellence award. In her class, Yu-an, a student with low vision, uses a high-contrast yellow ball, and Ms. Kuo often stops the whole class: “Everyone, look how accurately Yu-an throws! Who says you can't play if you can't see well?” She sincerely believes she is building his confidence.", "Yu-an experiences it differently. He hates the way the entire class's eyes turn to him at the teacher's praise — “as if anything I manage to do is a miracle.” The classroom aide is extremely devoted: during tee-ball he narrates continuously at Yu-an's side — “three steps forward, left, left, quick, pick it up” — and classmates gradually stop talking to him: “an adult is always right next to him anyway.” Yu-an starts reporting stomach aches before PE, and his visits to the nurse's office multiply. When the homeroom teacher gently raises it, Ms. Kuo is stunned: “But… in my class he participates in everything.”"], "after": ["三個善意（公開表揚、特製器材、貼身協助）翻車的機制各不相同——你的答案有沒有分開處理？", "支持的劑量該由誰調整：育安的迴避行為本身就是回饋訊號，你的方案有沒有把學生偏好納入？", "「參與到了」是誰的判準？把老師視角的參與換成學生視角的歸屬，答案會不一樣。"]}, {"no": 16, "title": "老師的用心——為什麼小蓁寧願坐在旁邊？", "cat": "融合經驗與同儕支持", "source": "議題探究", "reading": "本案為自編議題探究個案，無對應教科書章節；延伸文獻見本案文末。", "scenario": ["高中體育老師陳老師的班上有一位視障學生小蓁。陳老師做了許多準備：買了鈴鐺球、每節課指定兩位「小天使」輪流協助小蓁、多數活動為她單獨修改規則（別人跑三圈她走一圈、排球改成她發球不用接球）。同事都稱讚陳老師是融合教育的模範。", "期末訪談時，小蓁對輔導老師說：「我知道老師很用心，可是每次為我一個人改規則，全班都在看我。小天使人很好，但我不想每節課都被照顧——有時候我寧願說自己不舒服，坐在旁邊就好。」陳老師得知後非常受挫：「我到底做錯了什麼？」"], "uni": ["陳老師的每一項做法（鈴鐺球、小天使、個別修改規則）分別出了什麼問題？注意：問題不在做法本身，而在哪裡？", "「我寧願說自己不舒服」——小蓁用裝病換取什麼？這個代價揭露了支持設計的哪個盲點？", "「被幫助」為什麼會累？同儕協助如何從平等關係滑向「幫助者—被幫助者」的階層？你有過類似經驗嗎（被過度幫助）？", "把「為小蓁改規則」翻轉成「為全班設計選項」：同一節排球課，怎麼設計成每個人都在選自己的挑戰等級，而小蓁只是其中一個做選擇的人？"], "uniAct": ["策略雙面性分析：全班列出適應體育教科書推薦的十個融合策略，逐一標注「什麼條件下促進參與／什麼條件下製造標籤」，產出一張條件對照表。", "訪談模擬：兩人一組分飾輔導老師與小蓁，練習「詢問學生偏好」的對話——重點是問出小蓁要什麼，而不是解釋老師的用心。"], "grad": ["Holland 與 Haegele 的現象學研究發現：每一種「融合策略」都同時產生融合感與邊緣化感，因此不應作為通用處方（blanket recommendations）。這對以策略清單為主體的教科書與師培課程構成什麼挑戰？", "「個別調整」與「全班取向設計」（如 UDL、STEP 的全班式運用）在理論上的關鍵差異是什麼？前者為何結構性地更容易產生凸顯效應（spotlighting）？", "自主與選擇在 Holland 研究中是學生最重視的主題之一——把「學生偏好」納入調整決策，與教師的專業判斷及安全責任如何平衡？決策權重該怎麼配置？", "若要在台灣脈絡下複製 Holland 式的研究（身障學生對支持策略的主觀經驗），你會如何處理招募、關係倫理與「說老師壞話」的社會壓力？"], "gradTask": ["對照閱讀 Holland 等人（2022）與 Qi 與 Ha（2012）的回顧，整理「同儕協助」在兩份文獻中的證據樣貌，寫一頁「同儕協助的使用條件」指引。", "把本個案改寫成一份師培工作坊的教案（九十分鐘），學習目標設定為「能區分個別調整與全班設計，並能執行學生偏好訪談」。"], "guide": ["這是六個個案中最貼近教學現場的一個，適合放在課程後段——學生此時已有「意圖／效果分離」（個案一、五）與「在場不等於參與」（個案二）的概念裝備，可以綜合運用。", "陳老師必須被呈現為值得同情的角色而非反派——重點是策略知識的缺口（沒人教過他策略的雙面性與偏好訪談），不是個人的失敗。這也保護班上未來的教師不產生防衛。", "收尾時把六個個案串起來：批判性思考在適應體育中的共同結構是——把善意當起點而非終點，把效果與經驗當檢驗，把當事人的聲音當證據。"], "refs": [["Holland & Haegele (2022). 'Everybody wants to be included': Experiences with 'inclusive' strategies in physical education. Journal of Developmental and Physical Disabilities.", "https://doi.org/10.1007/s10882-022-09852-x", "核心文獻：每個融合策略都同時產生融合與邊緣化。"], ["Qi & Ha (2012). Inclusion in physical education: A review of literature. International Journal of Disability, Development and Education.", "https://doi.org/10.1080/1034912x.2012.697737", "經典回顧：同儕協助與合作學習的證據基礎。"], ["Bertills & Björk (2024). Facilitating regular physical education for students with disability — PE teachers' views. Frontiers in Sports and Active Living.", "https://doi.org/10.3389/fspor.2024.1400192", "教師端經驗：先合作再競技、準備與心態的關鍵性。"], ["Ruscitti, Thomas, & Bentley (2017). The experiences of students without disabilities in inclusive physical education classrooms. Asia-Pacific JHSPE.", "https://doi.org/10.1080/18377122.2017.1345286", "健全學生端：融合課的接觸不必然改善互動意願。"], ["Zimlich & Giese (2024). Perspectives of students with intellectual disabilities on inclusive PE in Germany. EUJAPA.", "https://doi.org/10.5507/euj.2024.006", "physical inclusion 不必然帶來 social inclusion 的再證。"]], "enTitle": "The Teacher Meant Well: Why Hsiao-chen Would Rather Sit Out", "enSummary": "Bell balls, buddy helpers, one-person rule changes: every well-intended support makes a blind student feel watched and managed, until she would rather claim to feel sick than be helped through another class.", "enScenario": ["Ms. Chen, a high-school PE teacher, has prepared carefully for Hsiao-chen, a student with visual impairment in her class: bell balls, a rotating pair of “little angel” helpers, and individually modified rules for most activities — others run three laps, she walks one; in volleyball she serves but is excused from receiving. Colleagues praise Ms. Chen as a model of inclusive education.", "In the end-of-term interview, Hsiao-chen tells the counselor: “I know the teacher works hard for me. But every time the rules are changed for me alone, the whole class is watching me. The helpers are kind, but I don't want to be taken care of every single period — sometimes I'd rather say I'm not feeling well and just sit on the side.” When Ms. Chen hears this, she is crushed: “What exactly did I do wrong?”"], "after": ["每個支持策略都有雙面性：你的答案有沒有寫出「什麼條件下促進參與、什麼條件下製造標籤」？", "把「為她一人改規則」翻譯成「為全班設計選項」是本案的關鍵翻譯——你的重新設計做到了嗎？", "偏好訪談不是問「要不要幫忙」，是問「想要什麼樣的幫忙、什麼時候不要」。"]}, {"no": 17, "title": "從愛心小天使到同儕教練——把善意變成制度", "cat": "融合經驗與同儕支持", "source": "", "reading": null, "scenario": ["新竹市光復高中的體育教師兼適應體育業務承辦人趙心怡老師，長期看著各班用「愛心小天使」照顧身障同學——沒有訓練、沒有篩選，班導隨機指派，結果好壞全憑運氣：有的變成真朋友，有的變成寫在自傳裡的服務學習資歷。", "趙老師決定升級：她設計了「同儕教練」制度——公開招募、繳交申請書與兩封推薦信、接受三次課後培訓（障礙意識、溝通與提示技巧、回饋與增強、保密原則），通過情境測驗後授證，並在學期中接受觀察回饋。教務主任看到計畫書皺眉：「培訓要占三個下午，家長會不會抗議？這對考大學有什麼用？而且你確定身障學生想要被『配對』嗎？」趙老師發現最後一個問題她真的沒問過。"], "uni": ["隨機指派的「愛心小天使」與結構化的「同儕教練」差在哪？培訓的哪些成分是不可省略的核心？", "教務主任的三個質疑（時數、升學效益、被配對者的意願）各自反映什麼立場？哪個最有力？", "「被幫助的人想不想要」為什麼常常是最後才被想到的問題？制度上如何把身障學生的選擇權放進配對程序？", "同儕教學對「小教練」自身的效益有哪些？這些效益可以怎麼向家長與行政溝通？"], "grad": [["Peer tutoring is among the best-evidenced inclusion strategies in APE, yet its effects depend on training quality and reciprocity. Synthesize what the evidence says about the conditions under which peer tutoring benefits both parties.", "同儕教學是適應體育中證據最充分的融合策略之一，但其效果取決於培訓品質與互惠性。請整合文獻：同儕教學在什麼條件下能讓雙方都受益？"], ["The “helper–helped” hierarchy is the central risk of peer support. What design features (role rotation, mutual goals, student choice) convert a hierarchical dyad into a reciprocal one, and what does research say about each?", "「幫助者—被幫助者」的階層是同儕支持的核心風險。哪些設計特徵（角色輪替、共同目標、學生選擇權）能把階層式配對轉化為互惠關係？各自的研究證據如何？"], ["Propose a program evaluation for Ms. Chao's peer coach system with outcomes at three levels: tutees, tutors, and class climate. Which outcome is hardest to measure credibly, and how would you approach it?", "請為趙老師的同儕教練制度提出一個三層次成效評估（被指導者、小教練、班級氛圍）。哪個層次最難可信地測量？你會怎麼處理？"]], "enTitle": "From Angel Helpers to Peer Coaches: Turning Goodwill into a System", "enSummary": "A teacher upgrades random 'angel helpers' into a trained, tested, certified peer-coach system — and faces the dean's doubts about hours and college admissions, plus the question nobody asked: does the disabled student want to be paired at all?", "enScenario": ["Ms. Chao, PE teacher and adapted-PE coordinator at Guangfu High School in Hsinchu, has watched homeroom classes assign random “angel helpers” to disabled classmates for years — no training, no screening, assigned by the homeroom teacher at random, with outcomes left to luck: some become real friendships, others become a service-learning line in a college application.", "She decides to upgrade: a “peer coach” system — open recruitment, a written application with two recommendation letters, three after-school training sessions (disability awareness, communication and prompting, feedback and reinforcement, confidentiality), certification after a scenario test, and observed feedback during the semester. The dean of academic affairs frowns at the proposal: “Three afternoons of training — won't parents complain? What does this do for college admissions? And are you sure the students with disabilities even want to be paired?” Ms. Chao realizes that last question is the one she never asked."], "after": ["隨機小天使與同儕教練制度的差異在三件事：篩選、培訓、持續回饋——你的答案齊了嗎？", "被配對者的意願與選擇權是最常被跳過的一步：想想程序上怎麼把它放進配對流程。", "說服行政要用行政的語言：小教練自身的成長（溝通、領導、同理）本身就是課程成果。"]}, {"no": 18, "title": "體育課上的隱形人力——袖手旁觀的教師助理員", "cat": "專業協作與支持人力", "source": "", "reading": null, "scenario": ["臺中市西屯區的惠明國小設有兩班集中式特教班，多位重度障礙學生依 IEP 配有教師助理員。體育教師何雅萍老師上課時，助理員們習慣把學生帶到體育館後就坐在場邊：有人滑手機、有人批改別班作業，一位阿姨甚至固定利用這節課去福利社。學生在場上遊走、離開隊伍時，助理員的反應是「體育課就是讓他們放風啊」。", "何老師向特教組反映，得到的回覆是「助理員的工作說明沒寫到要下場」。她調出勞務契約與特教法規，發現助理員職責包含「協助學生學習活動」，體育課並非可以豁免的科目。她向主任爭取在期初辦兩小時的助理員研習，主任面有難色：「他們是時薪人員，研習算不算工時？誰出錢？」"], "uni": ["「體育課就是放風」這句話背後，隱含了對體育課、對特教學生學習權的哪些預設？", "何老師手上有哪些制度工具（IEP、契約、法規、研習）？各自能改變什麼、改變不了什麼？", "如果你是何老師，兩小時的助理員研習你會放哪三個最優先的內容？為什麼是這三個？", "助理員多是低薪、非正式編制的中高齡人力——把問題完全歸咎於他們個人，公平嗎？結構面的成因有哪些？"], "grad": [["Paraeducator support in PE is legally required yet practically neglected in many systems. Analyze this case as a problem of policy implementation rather than individual motivation: where exactly does the implementation chain break down?", "助理員在體育課的支持是法定要求、實務上卻常被忽略。請把本個案當成政策執行問題而非個人動機問題來分析：執行鏈是在哪一環斷裂的？"], ["Lieberman and colleagues advocate structured paraeducator training (roles, disability knowledge, UDL, communication). Design a minimal viable training for Taiwan's hourly-paid teacher assistants, and justify each component with evidence.", "Lieberman 等人主張結構化的助理員培訓（角色、障礙知識、UDL、溝通）。請為臺灣時薪制教師助理員設計一個最小可行的培訓方案，並為每個成分提出實證依據。"], ["What would count as evidence that paraeducator training changed student outcomes, not just adult behavior? Propose a feasible evaluation design for a single school.", "什麼樣的證據才能顯示助理員培訓改變的是「學生學習成果」而不只是「大人的行為」？請為單一學校提出可行的成效評估設計。"]], "enTitle": "Invisible Manpower: Paraeducators on the Sideline", "enSummary": "Teacher assistants treat PE as their break: knitting, phone games, errands. Armed with contracts, regulations and a two-hour workshop plan, a teacher tries to turn hourly-paid bystanders into instructional partners.", "enScenario": ["Huiming Elementary in Taichung runs two self-contained special-education classes, and several students with severe disabilities have teacher assistants assigned through their IEPs. When PE teacher Ms. Ho starts class, the assistants deliver their students to the gym and settle along the wall: one scrolls her phone, one grades another class's worksheets, and one regularly slips off to the co-op store for the whole period. When students drift off task, the assistants' response is: “PE is their break time.”", "Ms. Ho raises it with the special-education office and is told, “Assisting in PE isn't written in their job description.” She pulls out the service contracts and the regulations — assistant duties include “supporting students' learning activities,” and PE is not an exempt subject. She asks the director for a two-hour assistant workshop at the start of term. The director hesitates: “They're hourly staff. Does training count as paid hours? Who pays for it?”"], "after": ["把問題全部歸咎助理員是最容易的答案——你的分析有沒有到結構層：時薪制、無職前訓練、職責模糊？", "制度工具各有射程：契約講義務、IEP 講服務內容、研習給方法——你的方案用對工具了嗎？", "兩小時研習的優先內容：角色與界線、具體協助技巧（提示的層次）、以及「什麼時候該退開」。"]}, {"no": 19, "title": "一週只來一次——巡迴輔導的諮詢困境", "cat": "專業協作與支持人力", "source": "", "reading": null, "scenario": ["臺東縣試辦適應體育巡迴輔導計畫，具適應體育專長的許文彬老師負責七所偏鄉小校，每校每兩週到校半天。關山鎮的電光國小全校六班，體育課由代理教師吳佩珊老師擔任，班上有一位唐氏症學生與一位無口語的自閉症學生。吳老師是體育系畢業，但坦言在大學只修過兩學分的適應體育概論，「而且那時候都在背障別」。", "許老師第一次到校示範了分站教學與視覺提示，吳老師大為驚豔。但兩週後回訪，一切照舊——吳老師說：「你示範的那些我知道很好，可是我自己帶就是不行，而且我下學期可能就不在這間學校了。」許老師開始懷疑：巡迴模式到底是在建立學校的能力，還是在提供一場又一場的煙火表演？"], "uni": ["直接服務（許老師自己下去教）與諮詢服務（教吳老師怎麼教）各有什麼優缺點？在偏鄉每兩週半天的頻率下，哪種比較合理？", "吳老師「看得懂示範但做不出來」的落差是什麼性質的問題——知識？技能？信心？結構？對應的協助方式有何不同？", "代理教師的高流動率如何侵蝕諮詢模式的效益？有什麼制度設計可以讓「能力留在學校」而不是「留在個人」？", "師培階段的兩學分適應體育概論，最應該教什麼才能讓吳老師這樣的教師「開得了第一步」？"], "grad": [["Consultation models in APE assume a stable consultee who accumulates capacity over time. When teacher turnover breaks this assumption, what should the unit of capacity-building be — the person, the school, or the material environment (curriculum packages, visual supports)?", "適應體育諮詢模式假設有一位穩定、能持續累積能力的被諮詢者。當教師流動打破這個假設，能力建構的單位應該是什麼——個人、學校、還是物質環境（課程包、視覺支持）？"], ["Design a hybrid direct/consultative service allocation rule for an itinerant APE teacher serving seven schools. What student- and school-level variables should drive the allocation, and why?", "請為服務七校的巡迴適應體育教師設計一套直接／諮詢服務的分配規則。哪些學生層與學校層變項應該決定分配？為什麼？"], ["What outcome indicators would distinguish a consultation program that builds capacity from one that merely delivers episodic demonstrations? Sketch a two-year evaluation framework for Taiwan's pilot program.", "哪些成果指標能區分「建立能力的諮詢」與「一次次的示範表演」？請為臺灣的試辦計畫勾勒一個兩年期評估架構。"]], "enTitle": "Once Every Two Weeks: The Itinerant Consultation Dilemma", "enSummary": "An itinerant APE consultant delivers brilliant demonstration lessons in a remote school every two weeks, but nothing sticks: the substitute PE teacher cannot reproduce them and may not even be there next semester. Is the model building capacity or performing fireworks?", "enScenario": ["Taitung County is piloting an itinerant adapted-PE consultation program: Mr. Hsu, who has APE expertise, covers seven remote schools, visiting each for half a day every two weeks. At Dianguang Elementary in Guanshan — six classes in the whole school — PE is taught by Ms. Wu, a substitute teacher whose university preparation consisted of a two-credit adapted-PE survey course, “mostly spent memorizing disability categories.” Her class includes a student with Down syndrome and a nonverbal autistic student.", "On his first visit, Mr. Hsu models station teaching and visual prompts; Ms. Wu is amazed. Two weeks later, everything is back to the way it was. “I know what you showed me is good,” she says, “but when I run it myself it just falls apart — and I may not even be at this school next semester.” Mr. Hsu begins to wonder: is the itinerant model building the school's capacity, or delivering one fireworks show after another?"], "after": ["「看得懂示範但做不出來」是技能與信心問題，不是知識問題——你的方案是給資料，還是給陪伴式實作？", "讓能力留在學校的載體：課程包、視覺支持教具、示範影片庫——人會流動，物件會留下。", "直接服務與諮詢不是全有全無：高需求學生直接教、教師端逐步交棒，配比可以按學校條件設計。"]}, {"no": 20, "title": "二十分鐘的專業團隊會議——Rett 症候群學生入學", "cat": "專業協作與支持人力", "source": "", "reading": null, "scenario": ["宜蘭縣立順安國中即將迎來罹患 Rett 症候群的新生若瑜——不斷的重複性手部動作、行走緩慢需人陪伴、無口語、裝有胃造口。體育教師江承翰老師教書十二年自認什麼都見過，收到通知那晚卻上網查到半夜：她的手能接球嗎？跌倒會不會撞到胃造口？球場上被撞到怎麼辦？", "學校申請了專業團隊服務：物理治療師每學期到校兩次、職能治療師一次、加上特教教師與輔導室。開學前的專業團隊會議排了二十分鐘給若瑜，治療師建議「維持行走耐力、避免碰撞」，特教老師補充溝通輔具的用法，然後時間到了。江老師拿著兩行字的建議走出會議室，發現他真正的問題一個都沒問到：籃球單元她能做什麼？分組時同學要怎麼跟她互動？誰來教他判斷「累了」和「不舒服」的差別？"], "uni": ["江老師的焦慮清單裡，哪些是資訊問題（查得到答案）、哪些是協作問題（必須有人一起想）？", "「每學期兩次、每次二十分鐘」的專業團隊服務，結構上注定漏掉什麼？體育教師在團隊中的位置為何常是邊緣的？", "請把「維持行走耐力、避免碰撞」翻譯成籃球單元的三個具體教學設計。", "若瑜無口語——體育課上她的「意願」與「不舒服」要靠什麼被聽見？誰該負責建立這套溝通？"], "grad": [["Interprofessional collaboration in school settings often defaults to multidisciplinary (parallel reports) rather than transdisciplinary (shared goals, role release) practice. Diagnose the case using this continuum, and identify the minimal structural changes that would move it one step along.", "學校裡的跨專業合作常停留在多專業（各自平行報告）而非跨專業（共享目標、角色釋放）。請用這個光譜診斷本案，並指出往前推一步所需的最小結構改變。"], ["The PE teacher holds the most frequent movement-context contact with the student yet the least authority in the team. What does the collaboration literature suggest about repositioning PE teachers as data contributors (e.g., systematic observation) rather than recommendation recipients?", "體育教師擁有最高頻率的動作情境接觸、卻在團隊中權力最小。合作文獻對於把體育教師重新定位為資料貢獻者（如系統性觀察）而非建議接收者，有何啟示？"], ["For a student with Rett syndrome, safety concerns can easily crowd out participation goals. Construct a decision framework that weighs medical precaution against the dignity of risk in PE programming.", "對 Rett 症候群學生，安全考量很容易排擠參與目標。請建構一個決策架構，在體育課程設計中權衡醫療謹慎與「冒險的尊嚴」。"]], "enTitle": "A Twenty-Minute Team Meeting: A Student with Rett Syndrome Arrives", "enSummary": "A student with Rett syndrome arrives with a twenty-minute professional-team meeting and two lines of advice. The PE teacher's real questions — what can she do in the basketball unit, how will peers interact with her, who learns to read her signals — were never asked.", "enScenario": ["Shun-an Junior High in Yilan is about to welcome Jo-yu, a student with Rett syndrome — near-constant repetitive hand movements, slow walking that requires accompaniment, no speech, and a gastrostomy tube. PE teacher Mr. Chiang, twelve years into the job, thought he had seen everything; the night the notice arrives, he is still searching the internet at midnight: Can her hands catch a ball? What if she falls onto the tube? What happens if she gets bumped on the court?", "The school applies for professional-team services: the physical therapist will visit twice a semester, the occupational therapist once, plus the special-education teacher and the counseling office. The pre-term team meeting allots Jo-yu twenty minutes. The therapists advise “maintain walking endurance, avoid collisions”; the special-education teacher adds a note about her communication device; and time is up. Mr. Chiang walks out holding two lines of advice, realizing that none of his real questions were ever asked: What can she do in the basketball unit? How should classmates interact with her during group work? And who will teach him to tell her “tired” from her “unwell”?"], "after": ["二十分鐘會議
