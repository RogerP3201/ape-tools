let R=0, picked=false;
function renderR(){

  document.getElementById("rno").textContent=(R+1)+" / "+ROUNDS.length;
  document.getElementById("round").innerHTML=
   '<h1 style="font-size:1.2rem;color:#fbbf24;margin-bottom:14px">'+r.t+'</h1>'
   +'<div class="cards"><div class="pcard"><h3>'+r.a.n+'</h3><p>'+r.a.d+'</p></div>'
   +'<div class="pcard"><h3>'+r.b.n+'</h3><p>'+r.b.d+'</p></div></div>'
   +'<div class="qline">'+r.q+'</div>'
   +'<div class="opts">'+r.opts.map((o,i)=>'<button class="opt" onclick="pick(this)">'+o+'</button>').join('')+'</div>'
   +'<button class="rvbtn" onclick="document.getElementById(\'rv\').classList.add(\'show\')">揭示爭點</button>'
   +'<div class="reveal" id="rv">'+r.r+'</div>';
}
function pick(el){ document.querySelectorAll(".opt").forEach(o=>o.classList.remove("pick")); el.classList.add("pick"); }
function go(d){ R=Math.max(0,Math.min(ROUNDS.length-1,R+d)); renderR(); window.scrollTo(0,0);}

let H=0, flipped=false;
function renderH(){
  const x=HS[H];
  document.getElementById("hno").textContent=(H+1)+" / "+HS.length;
  document.getElementById("htag").className="tag "+(flipped?"sport":"insp");
  document.getElementById("htag").textContent=flipped?"運動框架":"勵志框架";
  document.getElementById("hline").textContent=flipped?x.s:x.i;
  document.getElementById("hask").textContent=flipped?"":"這則報導有告訴你，他比賽表現如何嗎？";
  document.getElementById("hnote").textContent=flipped?x.n:"";
}
function flip(){ flipped=!flipped; renderH(); }
function hgo(d){ H=Math.max(0,Math.min(HS.length-1,H+d)); flipped=false; renderH(); }
