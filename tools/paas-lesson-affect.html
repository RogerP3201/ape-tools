<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">

<title>這節課的感受｜課前課後對照（PAAS）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#0d4d43;--bg:#f4f6f5;--card:#fff;--ink:#22312d;--sub:#5a6a64;--pos:#2f8f6f;--neg:#c05c4a;--fat:#b08341;--tra:#4a7fb0}
body{font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--ink);padding:20px 14px 60px;line-height:1.6}
.wrap{max-width:640px;margin:0 auto}
h1{font-size:1.35rem;color:var(--green);margin-bottom:4px}
.tag{color:var(--sub);font-size:.88rem;margin-bottom:18px}
.card{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:14px}
.stepbar{display:flex;gap:8px;margin-bottom:16px}
.step{flex:1;text-align:center;font-size:.8rem;padding:7px 4px;border-radius:8px;background:#e4eae8;color:var(--sub)}
.step.on{background:var(--green);color:#fff;font-weight:700}
.step.done{background:#bcd6cf;color:var(--green)}
.q{padding:12px 0;border-bottom:1px solid #eef1f0}
.q:last-child{border-bottom:0}
.qt{font-size:1rem;margin-bottom:8px;font-weight:600}
.qt small{display:block;font-weight:400;color:var(--sub);font-size:.78rem}
.opts{display:flex;gap:5px}
.opt{flex:1;text-align:center;padding:9px 2px;border:2px solid #dde3e1;border-radius:9px;font-size:.75rem;cursor:pointer;background:#fff;transition:.12s}
.opt b{display:block;font-size:1rem}
.opt:hover{border-color:#9dbdb4}
.opt.sel{background:var(--green);color:#fff;border-color:var(--green)}
button.go{width:100%;background:var(--green);color:#fff;border:0;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:6px}
button.go:disabled{background:#b9c4c0;cursor:not-allowed}
button.ghost{background:none;border:1px solid #c6d0cd;color:var(--sub);border-radius:8px;padding:8px 12px;font-size:.84rem;cursor:pointer}
.lang{display:flex;gap:6px;justify-content:flex-end;margin-bottom:10px}
.lang button{border:1px solid #c6d0cd;background:#fff;border-radius:20px;padding:5px 14px;font-size:.8rem;cursor:pointer;color:var(--sub)}
.lang button.on{background:var(--green);color:#fff;border-color:var(--green)}
.bar{margin:14px 0}
.bl{display:flex;justify-content:space-between;font-size:.86rem;margin-bottom:4px}
.bl b{font-weight:700}
.track{height:12px;background:#e8edeb;border-radius:99px;position:relative;overflow:hidden}
.fill{height:100%;border-radius:99px;transition:width .5s}
.pre{opacity:.35}
.legend{font-size:.78rem;color:var(--sub);margin-top:2px}
.delta{font-weight:700}
.up{color:var(--pos)}.down{color:var(--neg)}.flat{color:var(--sub)}
.read{background:#eef4f2;border-left:4px solid var(--green);padding:12px 14px;border-radius:0 10px 10px 0;font-size:.92rem;margin-top:14px}
.note{font-size:.78rem;color:var(--sub);margin-top:20px;line-height:1.8}
.teach{font-size:.86rem;color:var(--sub)}
.teach h3{font-size:.95rem;color:var(--green);margin:12px 0 4px}
details{margin-top:10px}
summary{cursor:pointer;color:var(--green);font-size:.88rem;font-weight:600}
.hide{display:none}
.idrow{margin-bottom:10px}
.idrow label{display:block;font-size:.85rem;color:var(--sub);margin-bottom:3px}
.idrow input,.idrow select{width:100%;padding:10px;border:1px solid #cfd8d5;border-radius:8px;font-size:.95rem;font-family:inherit;background:#fff}
.sum{font-size:.78rem;color:var(--sub)}
.warn{margin-top:14px;padding:12px 14px;border-radius:10px;background:#fbf1ee;border:1px solid #e6cfc9;font-size:.84rem;color:var(--ink);line-height:1.6}
.warn b{display:block;color:#a8483a;margin-bottom:4px;font-size:.88rem}
.code{font-family:ui-monospace,monospace;background:#eef4f2;padding:8px 10px;border-radius:8px;font-size:1.05rem;letter-spacing:.1em;text-align:center;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="lang">
    <button id="bzh" class="on" onclick="setLang('zh')">中文</button>
    <button id="ben" onclick="setLang('en')">English</button>
  </div>

  <h1 id="title">這節課的感受</h1>
  <div class="tag" id="tagline">課前填一次、課後再填一次，看看這節課把你的感受帶往哪個方向。</div>

  <div class="stepbar">
    <div class="step on" id="s1">① 課前</div>
    <div class="step" id="s2">② 課後</div>
    <div class="step" id="s3">③ 對照</div>
  </div>

  <div class="card" id="idCard">
    <div id="idHint" style="font-size:.9rem;color:var(--sub);margin-bottom:10px"></div>
    <div class="idrow"><label id="lbName">學號後四碼</label>
      <input id="fName" inputmode="numeric" maxlength="4" placeholder="例如 2345">
      <div class="legend" id="codeErr" style="color:#a8483a;display:none"></div>
    </div>
    <div class="idrow"><label id="lbCourse">課程</label>
      <select id="fCourse" onchange="courseChange()">
        <option value="適應體育班">適應體育班</option>
        <option value="普通體育">普通體育</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="idrow hide" id="classRow"><label id="lbClass">班級</label><input id="fClass" placeholder="例如 二年 3 班"></div>
    <div class="idrow"><label id="lbUnit">單元（可不填）</label><input id="fUnit" placeholder="例如 排球墊球"></div>
    <div class="legend" id="idNote"></div>
    <button class="go" onclick="startPre()">開始填課前</button>
    <div class="warn" id="warnBox">
      <b id="warnT">已經填過課前，卻看到這一頁？</b>
      <div id="warnB"></div>
      <button class="ghost" style="margin-top:8px;width:100%" onclick="startPostOnly()">我填過課前了，直接填課後</button>
    </div>
  </div>

  <div class="card hide" id="formCard">
    <div id="who" style="font-size:.82rem;color:var(--sub);margin-bottom:8px"></div>
    <div id="phaseHint" style="font-size:.9rem;color:var(--sub);margin-bottom:6px"></div>
    <div id="items"></div>
    <button class="go" id="submitBtn" disabled onclick="submit()">送出</button>
  </div>

  <div class="card hide" id="waitCard">
    <div id="waitMsg" style="font-size:.95rem"></div>
    <button class="go" style="margin-top:12px" onclick="startPost()">上完課了，填課後</button>
    <button class="ghost" style="margin-top:8px;width:100%" onclick="resetAll()">重新開始</button>
  </div>

  <div class="card hide" id="resultCard">
    <div id="bars"></div>
    <div class="read" id="reading"></div>
    <div class="code" id="shareCode"></div>
    <div class="legend" id="codeHint">回報給老師時，只要念出這四個數字，不用說名字。</div>
    <div class="warn" style="background:#eef4f2;border-color:#c9d6d2">
      <b style="color:var(--green)" id="sendT">要把結果送給老師嗎？</b>
      <div id="sendB"></div>
      <button class="go" style="margin-top:10px" id="sendBtn" onclick="sendToTeacher()">送出給老師</button>
      <div class="legend" id="sendMsg" style="margin-top:6px"></div>
    </div>
    <button class="ghost" style="margin-top:14px;width:100%" onclick="resetAll()">再測一次</button>
  </div>

  <div class="card">
    <details>
      <summary id="teachSum">給老師：怎麼用、怎麼讀</summary>
      <div class="teach" id="teachBody"></div>
    </details>
  </div>

  <div class="note" id="foot"></div>
</div>

<script>
/* PAAS：Physical Activity Affect Scale（Lox, Jackson, Tuholski, Wasley, & Treasure, 2000）

   本工具不上傳任何資料，作答只存在使用者自己的裝置（localStorage）。 */

  {key:"pos", zh:"起勁想動", sci:"正向情感", en:"Feeling up for it", sciEn:"Positive affect", color:"var(--pos)", good:true},
  {key:"tra", zh:"放鬆安穩", sci:"平靜",     en:"Calm and settled",  sciEn:"Tranquility",     color:"var(--tra)", good:true},
  {key:"neg", zh:"難受挫折", sci:"負向情感", en:"Feeling bad",       sciEn:"Negative affect", color:"var(--neg)", good:false},
  {key:"fat", zh:"累了沒力", sci:"疲勞",     en:"Worn out",          sciEn:"Fatigue",         color:"var(--fat)", good:false}
];
/* 題序與向度對應完全依 Lox 等人（2000）附錄原文：
   正向情感 1, 3, 11；負向情感 6, 10, 12；疲勞 4, 7, 9；平靜 2, 5, 8 */
const ITEMS = [
  {sub:"pos", en:"Upbeat",       zh:"我心情很好",              hint:"（開心、輕快）"},
  {sub:"tra", en:"Calm",         zh:"我覺得很平靜",            hint:"（不緊張）"},
  {sub:"pos", en:"Energetic",    zh:"我覺得身體很有力氣",      hint:"（有精神、使得上力）"},
  {sub:"fat", en:"Tired",        zh:"我覺得很累",              hint:"（想休息）"},
  {sub:"tra", en:"Peaceful",     zh:"我覺得心裡很安穩",        hint:"（安心、不慌）"},
  {sub:"neg", en:"Miserable",    zh:"我覺得很難受",            hint:"（很不好受、很想離開）"},
  {sub:"fat", en:"Worn-out",     zh:"我覺得快沒力了",          hint:"（用完了力氣）"},
  {sub:"tra", en:"Relaxed",      zh:"我覺得很放鬆",            hint:"（身體是鬆的）"},
  {sub:"fat", en:"Fatigued",     zh:"我覺得很疲倦",            hint:"（身體沉沉的）"},
  {sub:"neg", en:"Discouraged",  zh:"我覺得有點灰心",          hint:"（覺得自己做不到、想放棄）"},
  {sub:"pos", en:"Enthusiastic", zh:"我覺得很起勁，想動一動",  hint:"（很想參與、很想試試看）"},
  {sub:"neg", en:"Crummy",       zh:"我覺得整個人很不舒服",    hint:"（悶悶的、不對勁）"}
];
const SCALE_ZH = ["完全沒有","有一點","中等","蠻強的","非常強"];
const SCALE_EN = ["Do not feel","Feel slightly","Feel moderately","Feel strongly","Feel very strongly"];
const T = {
  zh:{title:"這節課的感受", tag:"課前填一次、課後再填一次，看看這節課把你的感受帶往哪個方向。",
      pre:"① 課前", post:"② 課後", cmp:"③ 對照",
      hintPre:"上課前。下面每一個詞，請選出它形容你「此刻」感受的程度。沒有對錯，照實選就好。",

const TEACH_ZH = `
<h3>這個量表在測什麼</h3>
PAAS 測的是一次身體活動之後的感受，分成四個向度。學生看到的是白話名稱，括號裡是文獻用語：起勁想動（正向情感）、放鬆安穩（平靜），這兩個是我們希望往上走的；難受挫折（負向情感）、累了沒力（疲勞），這兩個要看脈絡。
結果頁同時給每個向度的平均（0 到 4）與加總分（0 到 12），加總分是文獻慣例的計分方式，方便你跟論文對照。
它量到的東西，是體適能測驗完全看不見的：同一堂課，兩個學生的心肺都練到了，但一個覺得被接住，一個覺得被看穿。
<h3>怎麼在一節課裡用</h3>
上課前發 QR，學生用自己的手機填課前 12 題（約一分鐘）。課後下課前再填一次，當場看到自己的四個向度往哪走。
學生只需要念出畫面上的四位數字回報，不必說出姓名，你就能在黑板上做出全班的粗略分布。
<h3>要看全班的資料</h3>
結果頁有一顆「送出給老師」按鈕（學生自己按，不按也可以）。送出的內容進到共用 Apps Script 後端的 <b>paas</b> 工作表：課程、班級、單元、學號後四碼、四向度的課前課後與變化，以及十二題的原始作答。<b>不送姓名，也不送完整學號。</b>
後四碼的用途是把同一個人的課前與課後配成一對，也讓你跨週次追蹤同一個學生。
請注意：這是<b>假名資料，不是匿名資料</b>，因為你手上有名冊可以回推。當課堂回饋用沒問題；要當研究資料用（例如先導研究），需先過 IRB 與知情同意，並說明對照表由誰保管、存在哪裡、何時銷毀。
<h3>怎麼讀</h3>
疲勞上升不一定是壞事，那可能只代表這節課的運動量足夠。真正該注意的是這兩個組合：
正向情感下降而負向情感上升，代表這節課讓他挫折了；疲勞沒動而正向情感也沒動，代表他這節課其實沒有真的參與。
<h3>用在融合式體育</h3>
把調整前後的同一個單元各測一次，你就有了「這個調整有沒有讓他感受變好」的證據，而不只是「他有沒有做完」。
這是課堂回饋，不是研究資料。要拿來做研究，需要先過 IRB 與同意程序。
`;
const TEACH_EN = `
<h3>What it measures</h3>
The PAAS captures how a single bout of activity felt, across four subscales: positive affect and tranquility (the ones we hope go up), negative affect and fatigue (read them in context).
<h3>Using it in one lesson</h3>
Students answer the 12 items before the lesson and again right after, on their own phones. It takes about a minute each time.
They report only the four numbers on the screen, never a name, so you can sketch the class pattern on the board.
<h3>Reading it</h3>
Rising fatigue is not automatically bad; it may simply mean the lesson was active enough. Two patterns deserve attention: positive affect down with negative affect up (the lesson frustrated this student), and fatigue flat with positive affect flat (this student never really joined in).
<h3>In inclusive PE</h3>
Measure the same unit before and after an adaptation, and you have evidence about whether the adaptation improved how the student felt, not only whether the student finished the task.
This is classroom feedback, not research data. Research use requires ethics approval and consent.
`;

function setLang(l){

}

  document.getElementById("warnT").textContent=ti.warnT;
  document.getElementById("warnB").textContent=ti.warnB;
  document.querySelector("#warnBox button").textContent = lang==="zh" ? "我填過課前了，直接填課後" : "I already did the pre-lesson form: go straight to the post-lesson form";
  document.getElementById("sendT").textContent=ti.sendT;
  document.getElementById("sendB").textContent=ti.sendB;
  if(!sent) document.getElementById("sendBtn").textContent=ti.sendBtn;
  document.getElementById("waitMsg").textContent = t.waitTitle + (preTime ? "（" + ti.waitAt + preTime + "）" : "");
  document.getElementById("who").textContent = meta.name ? [meta.name, meta.course, meta.cls, meta.unit].filter(Boolean).join("｜") : "";
  const scale = lang==="zh"?SCALE_ZH:SCALE_EN;
  document.getElementById("items").innerHTML = ITEMS.map((it,i)=>{
    const label = lang==="zh" ? `${it.zh}<small>${it.hint}</small>` : it.en;
    return `<div class="q"><div class="qt">${i+1}. ${label}</div><div class="opts">${
      scale.map((s,v)=>`<div class="opt${ans[i]===v?" sel":""}" onclick="pick(${i},${v})"><b>${v}</b>${s}</div>`).join("")
    }</div></div>`;
  }).join("");
  document.getElementById("submitBtn").disabled = Object.keys(ans).length<ITEMS.length;
}
function pick(i,v){ ans[i]=v; render(); }
function courseChange(){
  const c=document.getElementById("fCourse").value;
  document.getElementById("classRow").classList.toggle("hide", c==="適應體育班");
}
function readMeta(){
  const code=document.getElementById("fName").value.trim();
  const err=document.getElementById("codeErr");
  if(!/^\d{4}$/.test(code)){
    err.textContent=TID[lang].codeErr; err.style.display="block";
    return null;
  }
  err.style.display="none";
  return { name:code, sid:"",
           course:document.getElementById("fCourse").value,
           cls:document.getElementById("fClass").value.trim(),
           unit:document.getElementById("fUnit").value.trim() };
}
function startPostOnly(){
  const m=readMeta(); if(!m) return;
  meta=m;
  localStorage.setItem(KM, JSON.stringify(meta));
  phase="post"; ans={}; pre=null;
  document.getElementById("idCard").classList.add("hide");
  document.getElementById("formCard").classList.remove("hide");
  document.getElementById("s1").className="step";
  document.getElementById("s2").className="step on";
  render(); window.scrollTo(0,0);
}
function startPre(){
  const m=readMeta(); if(!m) return;
  meta=m;
  localStorage.setItem(KM, JSON.stringify(meta));
  document.getElementById("idCard").classList.add("hide");
  document.getElementById("formCard").classList.remove("hide");
  render(); window.scrollTo(0,0);
}
function score(a){
  const s={};
  SUB.forEach(x=>{
    const vals=ITEMS.map((it,i)=>it.sub===x.key?a[i]:null).filter(v=>v!==null);
    s[x.key]=vals.reduce((p,c)=>p+c,0)/vals.length; // 0 到 4 的平均
  });
  return s;
}
function submit(){
  if(phase==="pre"){
    pre=score(ans);
    preRaw = ITEMS.map((_,i)=>ans[i]);
    localStorage.setItem(K, JSON.stringify(pre));
    localStorage.setItem(KR, JSON.stringify(preRaw));
    preTime = new Date().toLocaleTimeString(lang==="zh"?"zh-TW":"en-US",{hour:"2-digit",minute:"2-digit"});
    localStorage.setItem(KT, preTime);
    ans={};
    document.getElementById("formCard").classList.add("hide");
    document.getElementById("waitCard").classList.remove("hide");
    document.getElementById("s1").className="step done";
  }else{
    post=score(ans);
    postRaw = ITEMS.map((_,i)=>ans[i]);
    showResult();
  }
}
function sendToTeacher(){
  const ti=TID[lang], btn=document.getElementById("sendBtn"), msg=document.getElementById("sendMsg");
  if(sent || !API_URL) return;
  btn.disabled=true; btn.textContent=ti.sending; msg.textContent="";
  const payload={ kind:"paas", code:(meta.name||"").slice(0,16), course:meta.course||"",
                  cls:meta.cls||"", unit:meta.unit||"", pre:preRaw, post:postRaw };
  fetch(API_URL,{ method:"POST", body:JSON.stringify(payload) })
    .then(()=>{ sent=true; btn.textContent=ti.sentOk; msg.textContent=""; })
    .catch(()=>{ btn.disabled=false; btn.textContent=ti.sendBtn; msg.textContent=ti.sendErr; });
}
function startPost(){
  phase="post"; ans={};
  pre = JSON.parse(localStorage.getItem(K)||"null");
  preRaw = JSON.parse(localStorage.getItem(KR)||"null");
  document.getElementById("waitCard").classList.add("hide");
  document.getElementById("formCard").classList.remove("hide");
  document.getElementById("s2").className="step on";
  render();
  window.scrollTo(0,0);
}
function showResult(){
  document.getElementById("formCard").classList.add("hide");
  document.getElementById("resultCard").classList.remove("hide");
  document.getElementById("s2").className="step done";
  document.getElementById("s3").className="step on";
  if(!pre){
    const t=T[lang], ti=TID[lang];
    const rows = SUB.map(x=>{
      const b=post[x.key], nm=lang==="zh"?x.zh:x.en, sc=lang==="zh"?x.sci:x.sciEn;
      return `<div class="bar">
        <div class="bl"><b>${nm}</b><span>${b.toFixed(1)} / 4</span></div>
        <div class="track"><div class="fill" style="width:${b/4*100}%;background:${x.color}"></div></div>
        <div class="sum">${sc}　平均 ${b.toFixed(1)} / 4　加總分 ${(b*3).toFixed(0)} / 12</div>
      </div>`;
    }).join("");
    const head = meta.name ? `<div style="font-size:.85rem;color:var(--sub);margin-bottom:10px">${[meta.name ? "代碼 " + meta.name : "", meta.course, meta.cls, meta.unit].filter(Boolean).join("｜")}</div>` : "";
    document.getElementById("bars").innerHTML = head + `<div class="read" style="border-left-color:#a8483a;background:#fbf1ee;margin:0 0 12px">${ti.postOnlyMsg}</div>` + rows;
    document.getElementById("reading").innerHTML = lang==="zh"
      ? "・只有課後的數字，看不出這節課把你帶往哪個方向。請把這四個數字回報給老師，並說明課前紀錄不見了。"
      : "・With post-lesson scores only, the direction of change cannot be read. Report these four numbers to your teacher and mention that the pre-lesson record was lost.";
    document.getElementById("shareCode").textContent = SUB.map(x=>Math.round(post[x.key])).join(" ");
    return;
  }
  const bars = SUB.map(x=>{
    const a=pre?pre[x.key]:0, b=post[x.key], d=b-a;
    const cls = Math.abs(d)<0.25?"flat":(d>0?"up":"down");
    const sign = d>0?"+":"";
    const nm = lang==="zh"?x.zh:x.en, sc = lang==="zh"?x.sci:x.sciEn;
    return `<div class="bar">
      <div class="bl"><b>${nm}</b>
        <span>${a.toFixed(1)} → ${b.toFixed(1)} <span class="delta ${cls}">${sign}${d.toFixed(1)}</span></span></div>
      <div class="track"><div class="fill pre" style="width:${a/4*100}%;background:${x.color};position:absolute"></div>
        <div class="fill" style="width:${b/4*100}%;background:${x.color}"></div></div>
      <div class="sum">${sc}　平均 ${b.toFixed(1)} / 4　加總分 ${(b*3).toFixed(0)} / 12（課前 ${(a*3).toFixed(0)}）</div>
    </div>`;
  }).join("");
  const head = meta.name ? `<div style="font-size:.85rem;color:var(--sub);margin-bottom:10px">${[meta.name ? "代碼 " + meta.name : "", meta.course, meta.cls, meta.unit].filter(Boolean).join("｜")}</div>` : "";
  document.getElementById("bars").innerHTML = head + bars;
  document.getElementById("reading").innerHTML = readOut();
  const code = SUB.map(x=>Math.round(post[x.key])).join(" ");
  document.getElementById("shareCode").textContent = code;
}
function readOut(){
  const d={}; SUB.forEach(x=>d[x.key]=post[x.key]-(pre?pre[x.key]:0));
  const zh=[], en=[];
  if(d.pos>=0.25 || d.tra>=0.25){ zh.push("這節課把你的心情往上帶了。記住是哪一段讓你有這種感覺，下次可以主動要求多來一點。"); en.push("This lesson lifted you. Notice which part did it, and ask for more of that next time."); }
  if(d.neg>=0.25){ zh.push("這節課讓你有些不好受。那可能不是你的問題，而是活動的設計還沒有把你放進去。可以告訴老師是哪一段。"); en.push("Part of this lesson felt bad. That may be the task design, not you. Tell your teacher which part."); }
  if(d.fat>=0.5 && d.pos>=0){ zh.push("你變累了，但心情沒有掉，這通常代表運動量夠、而且你是願意的。"); en.push("You got tired but stayed positive: usually a sign the lesson was active and you were willing."); }
  if(Math.abs(d.fat)<0.25 && Math.abs(d.pos)<0.25 && Math.abs(d.neg)<0.25){ zh.push("四個向度幾乎沒有變化。這通常代表這節課你其實沒有真的動到，也沒有真的參與到。這值得跟老師談一談。"); en.push("Almost nothing moved. That usually means you neither moved nor really joined in. Worth talking to your teacher about."); }
  const list = lang==="zh"?zh:en;
  if(!list.length) list.push(lang==="zh"?"你的感受變化不大。把這四個數字記下來，跟下一節課比比看。":"Little change this time. Note the four numbers and compare with your next lesson.");
  return list.map(s=>"・"+s).join("<br>");
}
function resetAll(){
  localStorage.removeItem(K); localStorage.removeItem(KM); localStorage.removeItem(KT); localStorage.removeItem(KR);
  ans={}; pre=null; post=null; meta={}; phase="pre"; preTime=""; preRaw=null; postRaw=null; sent=false;
  const sb=document.getElementById("sendBtn"); sb.disabled=false; sb.textContent=TID[lang].sendBtn;
  document.getElementById("sendMsg").textContent="";
  document.getElementById("resultCard").classList.add("hide");
  document.getElementById("waitCard").classList.add("hide");
  document.getElementById("formCard").classList.add("hide");
  document.getElementById("idCard").classList.remove("hide");
  document.getElementById("fName").value="";
  document.getElementById("codeErr").style.display="none";
  document.getElementById("fClass").value=""; document.getElementById("fUnit").value="";
  document.getElementById("s1").className="step on";
  document.getElementById("s2").className="step";
  document.getElementById("s3").className="step";
  render(); window.scrollTo(0,0);
}
if(localStorage.getItem(K)){
  meta = JSON.parse(localStorage.getItem(KM)||"{}");
  preTime = localStorage.getItem(KT) || "";
  preRaw = JSON.parse(localStorage.getItem(KR)||"null");
  document.getElementById("idCard").classList.add("hide");
  document.getElementById("waitCard").classList.remove("hide");
  document.getElementById("s1").className="step done";
}
courseChange();
render();
</script>
