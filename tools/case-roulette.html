<h1>🎡 抽案輪盤</h1><div class="sub">適應體育批判性思考個案・27 案內建</div>
<div class="box">
  <div class="meta" id="cat">—</div>
  <div class="slot" id="title">按下「抽一案」開始</div>
  <div class="qslot" id="q">討論題會出現在這裡</div>
  <div class="meta">回答組別</div><div class="grp" id="grp">—</div>
  <div class="row">
    <button onclick="spin()">🎲 抽一案</button>
    <button class="ghost" onclick="spinQ()">只換題目</button>
    <button class="ghost" onclick="spinG()">只換組別</button>
    <label>組數 <select id="ngrp"><option>4</option><option selected>6</option><option>8</option><option>10</option></select></label>
  </div>
  <div class="row">
    <div class="timer" id="tm">05:00</div>
    <button class="ghost" onclick="startT(180)">3 分</button>
    <button class="ghost" onclick="startT(300)">5 分</button>
    <button class="ghost" onclick="startT(480)">8 分</button>
    <button class="ghost" onclick="stopT()">停止</button>
  </div>
  <div class="hint">快捷鍵：空白鍵＝抽一案　Q＝換題　G＝換組　T＝開始 5 分鐘</div>
</div>
<script>

let cur=null, timer=null, left=300;
const $=id=>document.getElementById(id);
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function shuffleTo(el, list, final, ms){
  let t=0; const iv=setInterval(()=>{ el.textContent=rnd(list); t+=60; if(t>=ms){clearInterval(iv); el.textContent=final;} },60);
}
function spin(){
  cur=rnd(CASES);
  shuffleTo($("title"), CASES.map(c=>"個案 "+c.no+"｜"+c.title), "個案 "+cur.no+"｜"+cur.title, 900);
  setTimeout(()=>{ $("cat").textContent="▍"+cur.cat; spinQ(); spinG(); },950);
}
function spinQ(){ if(!cur)return; const q=rnd(cur.qs); shuffleTo($("q"), cur.qs, q, 500); }
function spinG(){ const n=parseInt($("ngrp").value); shuffleTo($("grp"), Array.from({length:n},(_,i)=>"第 "+(i+1)+" 組"), "第 "+(Math.floor(Math.random()*n)+1)+" 組", 500); }
function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}
function tick(){ left--; $("tm").textContent=fmt(Math.max(0,left)); $("tm").classList.toggle("warn",left<=30);
  if(left<=0){stopT(); $("tm").textContent="時間到！";} }
function startT(s){ stopT(); left=s; $("tm").textContent=fmt(s); timer=setInterval(tick,1000); }
function stopT(){ if(timer)clearInterval(timer); timer=null; }
document.addEventListener("keydown",e=>{ if(e.key===" "){e.preventDefault();spin();} 
  if(e.key==="q"||e.key==="Q")spinQ(); if(e.key==="g"||e.key==="G")spinG(); if(e.key==="t"||e.key==="T")startT(300); });
